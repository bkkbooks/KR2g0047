body:
  text: 中州人物考卷四容城孫竒逢撰清直孫尚書顯顯信陽人父䘮廬墓鄉里稱其孝洪武二十年以鄉舉授工科給事中峻潔明敏遇事能斷後累官至工部尚書坐事謫戍雲南遣人没其家止得水牛一隻草屋數間使者旋報上嘉嘆即召還復職顯至中途卒衡知府岳岳字世瞻汝寜西平人其先世家隨州人父通元季以武功累官百夫長典屯香山國初棄官歸過西平道梗不通遂留家焉岳少以俊茂補弟子員中鄉試遂升太學洪武三十年詔國子監選諸生通理道者赴詹事府議事六館之士咸推岳徃敷陳時政切而不迂所司以聞擢廣東潮州府同知約已惠民自常禄外餽遺一無取布衣蔬食不異寒士三十五年遷西安知府其清操善政如在潮時丁内艱去服闋改知慶陽民愛之如父母永樂十年入覲以言事忤㫖謫戌交趾慶陽西安二郡民千餘人詣闕請貰岳不報仁宗立下詔求賢御史袁錠運使何士英指揮范智交薦起岳南豐令禄薄不足自贍常于官舍種蔬自給家人或有愠色輒斥曰不猶愈于謫戌時耶正統四年秩滿欲告歸刑部侍郎何某疏薦擢桂林守在郡五年亷慎之操愷悌之政終始如一年踰七十致政景泰三年卒于家野史氏曰公在慶陽時僚友諸婦常以公事㑹皆金鈿綺繡公之内子荆􅁫布裙而已至今傳為美談嗚呼亷吏不聞于世久矣碩䑕之刺城烏之謡在古且然况後世乎今之所為亷者垢衣敝履以欺人而後房姬媵極珠翠之麗亦豈真亷者哉若公者乃真亷吏也齊都御史魯魯嵩縣人洪武初舉進士授監察御史性梗介敢言嘗因事進諌擊落二齒魯拾之謂上曰臣此二齒當送史館上黙然自是益重之歴遷都御史張知府鵬飛鵬飛唐縣人初名九萬洪武二十一年以耆宿徴詣京師奏對稱㫖遂賜今名字以九萬授戸部郎中清勤淳謹一日入朝有同里人餽鴨卵者强其家人受之及鵬飛歸笞其家人詣朝自劾上笑曰張郎中何乃至此賜鈔二十貫以旌其亷尋陞陜西平凉知府未之任卒劉縣丞幹幹字孟楨修武人洪武二十六年舉於鄉授長洲縣丞清修苦節民信愛之比卒邑人如失怙恃貧不能歸民為買舟資送留衣冠葬於虎丘山側立石表其上曰劉公墩嵗時致祭焉靳副使義義字原醴淇縣人洪武中以國子生授北平道監察御史永樂初出按北京糾治貪墨决疑獄滯訟皆得其情吏民畏服日恒蔬食毫髪無取於下時太子居守北京賜魚米以旌其亷且語左右曰靳義可謂真御史也未幾陞胡廣按察司副使首舉正憲使吳公恱都指揮王玉奸贓之罪風紀肅然昭皇即位方欲徴用㑹疾卒古尚書朴朴字文質陳州人也洪武中以鄉貢𨽻五軍斷事司理刑遂奏家貧願仕冀得禄養母太祖嘉之除工部營繕主事迎母就養京師居無幾母殁官給舟歸葬服闋改兵部歴陞武選員外郎郎中遂進兵部右侍郎文皇即位轉左侍郎上巡狩北京侍昭皇帝監國命署禮兵二部及詹事府事洪熙元年改通政使尋陞户部尚書先是主事劉良素行不檢朴考其績下良叩上之左右求最考朴曰貪侈之人幸未覺落不改終敗最考不可得也良遂誣奏朴他事既就逮文皇燭其誣竟釋之他日吏部奏授良誥昭皇曰良素亡行又嘗誣奏大臣若與誥即為善者怠矣屢請不許良後果以賕敗朴在朝三十餘年目郎署至六曹兢兢畏慎守身如處子所治職務退未嘗語其家宣徳三年卒朱睦㮮曰余聞古公嘗寢疾楊文貞入視見所居蕭然無它物几上惟自警編一帙此與韓魏公論語唾壺事頗𩔖嗟乎世稱古公亷信然哉信然哉陳都御史棐棐鄢陵人由進士任禮科給事中直諫敢言不避權貴因忤㫖謫大名長垣丞陞本縣知縣莅政寛平吏民畏服僅期年百廢俱舉政事日新歴陞寜夏巡撫都御史卒於官石尚書璞璞字仲玉臨漳人也永樂九年舉於鄉宣徳初授監察御史從上平漢有功遷江西副使按察使山西布政使璞剛介有治才所在著稱在江西時民娶婦三日矣壻往拜其家壻先歸婦後失之遍索不獲婦翁訟壻殺女壻不勝搒掠自誣服云棄尸前塘中官使人求之果得尸獄成獨璞疑曰殺其人而棄其尸非深怨者不如是也彼初婚方燕好胡乃爾爾出囚問曰爾辭信乎囚叩頭曰信速死公之賜也屢問皆然璞計無所出乃齋沐夜焚香祝曰此獄闗綱常萬一其婦與人私其夫既受汚名又枉死於理安耶天其以夢覺我夜果夢人贈一麥字璞思曰兩人夾一人也獄有歸矣比明械囚首令待時行刑囚未出璞見一童子竊向門内闚璞令人召入曰爾羽客胡為至此得非爾師令爾偵某囚事乎童子大驚吐實果二道士素與婦通見匿之槁麥中江西人號曰斷鬼石璞在山西其夫人與諸寮妻燕歸愠曰彼皆金珠綺綵吾布裙襖甚不稱布政妻也璞曰爾何座曰席首璞曰使吾墨干憲汝安得居此席且吾素不以妻子故宦彼金珠綺綵者後欲居汝席得乎明年其夫果有以墨罷者累進工部尚書正統十三年河決滎陽經漕濮至陽榖入漕河潰沙灣東隄入于海命璞治之河決口塞明年處州盗起命璞討平之景泰初也先㓂獨石命璞兼大理寺卿徃禦璞充餉勒兵修垣守險景皇使璽書曰爾勤善謀素為邊人信故爾命事寧加太子太保改兵部尚書七年湖廣苖叛民李珍魏縣冲徃為用道之冦掠作䜟文湖湘訛言沸騰民用大擾又命璞徃璞以計生得珍縣冲檻送京師苗平還治部事數年致仕見鄉人為縣尉歸者宴飲几上陳銀卣前列金杯十餘璞曰汝宦幾年矣曰未滿考也曰胡歸乎曰刁民訟吾貪奪職璞曰嗟乎使吾治汝汝焉能歸鄉里哉拂衣出天順四年睿皇召大學士李賢謂曰石璞純臣也聞其尚健然貧為我以璽書召来璞至京上召見文華殿璞服青袍繋角帶入上曰吾賜爾緋玉敝乎璞叩頭曰臣平生以孤忠奮無結納今臣自分填溝壑矣詔至臣自知亡他途必臣有罪當誅譴耳上笑是時璞㣲聵乃命掌南京都察院事成化初致仕歸彰徳無宅第假太僕行署居之後竟不能治第既卒有司令其家納金以行署長歸之野史曰石公居無宅第天子知其貧鄉後學仰其高天下後世傳頌之不衰彼甲第連雲而腴田千頃者轉盼塵跡耳較此真是雲泥王侍郎瀹瀹字子清左使鈍之子也弱冠舉進士文皇以其少遣歸卒業久之起授翰林庶吉士入文淵殿纂修永樂大典是年秋以外艱歸服除時昭皇監國選經明行修之士授諸皇孫經於是吏部薦瀹引見昭皇問曰汝非王鈍之子耶其學行吾所素知汝其勉之拜左春坊左司直郎賜衣一襲禮遇甚厚洪熙初封建親王瀹遂為鄭靖王左長史既就職靖王當祀不齋瀹諫不可王不恱宣徳四年王就國累月不視朔瀹又上書諫不聽頃之擬荀卿成相篇撰十二章以獻語尤激切而左右有不便者日又浸潤由是與王不合上聞之移書讓王王終不聽六年召還改行在户部郎中睿皇即位拜瀹户部左侍郎廵撫浙江未幾母卒上遣行人諭祭命瀹卒事起復瀹既辭弗獲復如浙罷力役寛賦斂舉亷能涖事五年督運京餉一千餘萬石招撫流移五萬餘户獄訟不興盗賊屏息兩浙父老感而嘆曰真先大夫布政子也㑹入覲王留攝部事明年春瀹以老乞歸卒年七十四有退菴集六卷耿清惠九疇九疇字禹範盧氏人也永樂二十二年進士宣徳間擢禮科給事中正統初遷兩淮鹽運司同知盡革宿弊條奏數事悉著為令八年丁母憂鹽塲數千人走闕下乞留乃進鹽運使廉聲振江淮間甞臨水坐有童子戯其傍九疇曰此水何清也童子曰尚不如使君之清因號恒菴以自勵亡何以詿誤逮至京師事白陞刑部右侍郎數辨疑獄有婦誣其夫所司擬斷異九疇不可杖其婦而歸之鳯陽嵗飢盗起命九疇徃視乃留英武飛熊諸衛軍且耕且守招徠流民七萬餘户一方晏寧兩淮鹺政自九疇去任多廢至是復屬九疇兼理之尋又奉勅巡撫江北諸郡景泰初命録諸郡大辟囚原免者二十六人有婦來何菊家既去死其家訟菊與弟殺之九疇辨其誣後果得殺婦者人服其明代還復鎮陜西初六部卿佐使外者文移不得徑下按察司多偃蹇不受約束九疇奏下之邊將請増臨洮諸衛兵下九疇議九疇言邊兵已足用在馭之何如耳將能􅃊紀律信賞罰絶侵漁訓練有方則人人敵愾矣不然雖増兵何益徒冗食耳竟如九疇議初邊民春夏出就田作秋冬輒入徙九疇奏言将所以禦冦衛民者也今民皆避冦失業將焉用彼將哉乞禁民入徙敵至將不能衛民者重罪之是年擢九疇為右副都御史仍鎮其地詔下有司買羊角以製燈九疇上疏曰昔宋神宗買浙燈蘇軾諫止之今買羊角無乃𩔖是乎書曰不矜細行終累大徳遂罷買災異求直言復上疏乞廣聰明别忠佞擇守令簡將帥上優詔答焉天順初睿皇顧謂侍臣曰耿九疇正人也今安在即日召為右都御史首疏五事多見采納時邊情不寧九疇以罪由石亨將帥諸御史廷劾事泄反為所誣出為江西布政使尋改四川上一日與李賢論人才曰耿九疇何如賢曰此人操行誠不易得未幾召還拜南京刑部尚書四年八月以疾卒諡清惠九疇性亷介自奉儉約敦崇古道慕趙清獻公為人嚴毅不撓權貴敬憚雖累遭䜛困而不變所守云子裕自有傳野史曰清操者不能濟事亦一拘曲士耳公善撫恤流民釋豁寃獄童子善其清亷天子知其清正有猷有為有守諡曰清惠宜哉軒介肅輗輗字惟行鹿邑人也性廉介不妄言笑讀書所羣狼馴卧其側不為害輗亦不以為異也永樂二十二年舉進士嘗催糧淮上冬日舟行墮水救出衣盡濕以棉被自裹有司亟為製衣一襲弗受徐待衣乾服之尋擢監察御史正統間以薦為浙江按察使清嚴整暇公庭肅然廨無僕妾妻執井爨嘗行郡縣至儀門會寮屬檢閱衣槖歸亦如之所至山岳動揺貪吏望風潜遁著一青布袍無間寒暑破則補綴所食不過蔬食或日啖燒餅一枚與僚屬約三日各出米止易肉一斤家口衆者甚不能堪故舊會晤止供一飯或烹一雞則人駭之以為盛饌不易得也自聞親䘮即日就道僚屬有未及知者服除陞副都御史總理南京糧儲清操愈厲僚友設宴或有看席即拒不受景泰初浙人吳金八等作亂命輗經畧未幾斬俘逆㓂八千有竒餘黨悉降㨗聞康定帝降勅褒諭㑹額森入冦京師戒嚴少保于謙數薦于朝復命還南京居守加從二品俸是年特命考察其屬御史吳節等十六人臺綱肅然天下想望其風采睿皇復辟召為刑部尚書居數月以疾致仕陛辭之日上曰昔聞浙江憲使秩滿歸僅攜二竹籠非卿乎輗頓首上欲留用輗懇辭始許明年上復念之以問李賢賢曰輗之素行海内共知再召為左都御史復總理南京糧儲歴六年前後上三百餘疏皆切中時弊上多採納七年四月以疾卒輗律已甚嚴居南都閉門謝客嵗時詣禮部拜表慶賀屏處一室撤去侍燭朝服端坐寂無一言待皷嚴而出終事竟歸不告于同事者同事者聞其來亦不樂與處皆避去平生俊偉之節惟恃公牘之存間令吏寫數十大册以為他日考此足矣紀載之文一無所好及卒朝廷修睿皇實録從其家求輗行實無有也惟寫生卒年月送官耳野史氏曰耿公清而温軒公清而冷温則人樂與居冷則人思為避此冬日夏日之别也然不冷不到足色處古人有極詣孤絶之行徃徃如此未可過督其偏至而借口中行也王大理宇宇字仲宏祥符人也㓜頴悟絶人永樂間異人張三丰見之摩其頂曰此兒他日必貴顯稍長受書於長史鄭義正統三年舉鄉試第一明年登進士授南京户部主事秩滿陞撫州知府下車首塞郡治小門而封鑰之又實前守養魚塘以為倉商繻錢累萬宇不取悉屬之官或題其壁曰闗節一毫無地入公亷兩字有天知居頃之聞處士吳與弼甘貧樂道足跡不至城府宇薦于朝後數年上遣行人禮聘語在李賢傳金谿知縣劉綬貪虐耆老羣訴宇即日白法司黜之有黠吏挾奥援盗庫金自若宇亷知竟寘之法宜黄山中虎為患宇為文告神而虎乃逺徙景泰初金谿飢民聚衆掠富室錢糓宇聞單騎徑趨擒其首釋其羣從巡撫都御史韓雍薦宇治行第一天順改元擢山東右布政使明年進右副都御史巡撫宣府頃之大同缺巡撫復屬宇兼理之時石亨與其姪彪驟遷崇爵恃寵驕肆而大同乃舊鎭之地索取尤横人不敢言宇抗疏劾之以為大蠧大奸莫甚于此乞正典刑以銷外患未幾亨彪果敗上嘉宇忠直㑹罹内艱還起復改授大理寺卿累疏乞終制不許宇在大理數年精研獄情平反甚衆年四十七卒於官所著有厚齋集三卷朱睦㮮曰余聞王公赴撫州時所攜者朝祭燕居服一篋律令數卷比歸不増一物其在大同方上疏劾忠國公亨其家子姓環泣請止以為䟽入禍不可測公苐笑不應於戯若人豈富貴死生能動之乎使假以歲年竟所設施其功業曷可量哉李運使璵璵字廷瑞祥符人也父節永樂中為州判官操持清苦坐汚衊免官璵䀌傷之振厲志節景泰五年登進士授户部廣西司主事勅𣙜濟寧舟稅未幾積羡金數萬璵盡輸之官因是擢四川司員外郎復命稽察畿内諸郡縣府藏所至先封其倉庫按籍覈之典守者弗得容其奸叅劾罷去者若干人居無何璵墜馬傷足朝謁弗便時盧氏耿裕為吏部侍郎與璵同舉進士雅重之遂奏擢長蘆鹽運使璵嚴立條格錙銖無所取其得俸金恒頒諸宗族里閭之貧者及致仕還篋笥無長物惟故人某贈赤壁圖一幅時人比之李及白集云璵既歸田廬弗増益尺寸乃課士自給林居二十年未嘗一謁官長嵗惟春冬鄉飲再入城宴畢即返村舍年踰七十卒黄都御史紱紱字用章封丘人生之夜其母夢老人抱嬰兒曰送蹇尚書為汝子長依舅氏張生學春秋曽祖思豫事孝陵掌太常事以罪編氓沅州又徙戍平越紱以故為平越諸生舉雲南鄉試成進士授行人歴南刑部郎中為人亷直遇事飈發即重忤時貴不恤譚千戸者江左大猾任俠結權貴顯人嘗奪民蘆塲萬畆屢勘人即知民枉不能直紱竟盡法直蘆塲歸民歴四川叅議督松茂諸倉兼飭兵備釐革宿弊擒豪富數百人邊賴以寧轉本司叅政如崇慶忽旋風起輿前紱曰即有寃且散吾為若理風遂止抵州沐而禱於城隍夢中若有神言州西寺云云紱訪州西有寺當孔道倚山為巢夜殺投宿人沉塘中衆共分其囊貲有妻女則分其妻女匿妻女隱窖中盡得奸狀按律殺僧毁寺倉吏倚王親侵没官糧萬計王曲庇倉吏紱竟按如法紱為錢糓吏精律比輒能發摘奸伏威行川中青神令聞風解印綬去右使時奏閉建昌礦為左使湖廣妖僧繼暁至紱曰繼暁以妖術故不離上左右今且得罪雖名掃墓實逆賊也檄武昌府錮之後堂陽尊禮之俄事敗檻送京師伏誅進副都巡撫延綏劾叅將郭鏞等擒豪奸張綱乃於是㧞才能察幽隐問疾苦飭廢墜申號令修噐械嚴警邏節候望邊政為新紱行道望見川中飲馬婦片布遮下體俯首嘆息曰健兒貧至此我何面目臨其上乎亟令豫出餉三月人人感泣願出死力為黄都堂一戰已為南戸部尚書威稜截然盡革財賦内外諸積弊改左都紱自以歴仕中外五十年戇直崖異常忤人獲伏禍又盛滿宜戒請老去卒年七十有一史氏曰旋風起輿前人訝為神恠夫人而清直無欲則精氣相感天人合符况諸賊惡貫滿盈鬼神有必發之覆此却是實理實事延綏人感願出死力知人則知天矣滕侍郎昭昭字自明黄州知府霄之子也正統六年以鄉舉授監察御史巡按順天福建俱有聲績天順初擢左僉都御史佐理院事踰年以憂去純皇嗣位詔起復巡撫遼東昭謹斥堠嚴訓練備芻粟明賞罰凡數年敵不敢近塞昭乃上疏言大明律乃一代定法而决斷武臣獨舍律用例以是武臣益貪縱不檢請一切以律從事不報成化二年進右副都御史總督漕運兼巡撫淮揚昭奏建吳二庻人宜移本城舊中書省居之或安置有城池軍衛之所稍便出入亦聖王罪人不孥之意也疏下禮部議不可遂止五年召還復遣巡視福建上杭有紫雲臺者鄧茂七之黨嘗據為亂昭乃相要害請立歸化縣治未還改視蘇松而馬䭾沙最繁盛寄治江陰民苦徃返昭復請分置靖江縣上俱報可七年拜兵部右侍郎復轉左侍郎時汪直管西厰刺事僣横日熾中外累足而立于是兵部尚書項忠倡義草疏約九卿㑹劾詔罷西厰而御史戴縉久不得調乃言直所行皆公直不宜革罷于是上復命直管西厰縉遂進用直既司厰事首發忠過廷鞫遂坐贓罷去語在李震傳昭亦以忠故致仕年五十九卒于家李御史堅堅字景義唐縣人正統十三年進士改翰林庶吉士景泰初拜南京監察御史精研律令聽斷明决臨事毅然自任一時豪貴斂跡三年六月長洲飢民許道師等竊掠富室之粟時吏部尚書王文賑濟江南欲彰大已功奏道師等謀逆詞連數百人檻送京師下法司㑹鞫堅乃上章辨其誣詔誅罪首數人餘置不問賴以生全者甚衆未㡬上購翠羽於南中逺邇騷繹堅復上疏請止上嘉納四年坐事謫典吏尋擢桐廬知縣值歳凶堅捐俸以食餓者又建義倉設鄉社諸廢俱舉威惠並行少保姚䕫謂為江南循吏第一㑹入覲卒於道劉中丞潺潺字宗瀾安陽人天順丁丑進士授刑部主事四時著一布袍出止乗驢湖廣都御史翁世資與都指揮訟詔潺徃㑹御史焦顯治顯欲歸獄于指揮潺曰如公言何名為法卒坐世資遷郎中京師有兄弟争襲者各重賂累年不决至是賂潺潺持金白于司冦乃竟其事晉浙江叅議進士盧某暴其鄉潺按問除名再改陜西叅政鄜民冦氏闗中大猾也部民冦扁頭與其祖戍者冦扁都名相近遂竄軍籍潺閱籍疑之卒驗實軍歸冦氏遷叅政再遷四川布政使却宣慰楊氏金召為順天府尹道出褒城流民入蜀就食守闗吏不許潺令弛禁遷都御史巡撫遼東𢎞治初致仕歸自課童僕耕時兩子舉于鄉日校誦讀春秋祭墓必泣諄切質直無華言雖幼賤與均禮𢎞治乙丑疾革遺命毋干恩澤作墳擾鄉里年七十八野史氏曰都御史與都指揮訟誰肯為指揮伸法進士暴其鄉遂按問除名只此二事非冰心鐵靣未有不稍徇情靣者國家法吏得公數人豈有寃獄哉李侍郎和和字本中安陽人天順丁丑進士授吏科給事中嘗論事忤㫖廷杖幾死遷都給事中通政司参議右通政成化末李孜省以左道進而大臣競樹黨中官梁方等用事最後萬安有寵士大夫躁進者各擇所從朝合夕遷静正淹滯鄉有齊姓者憫和久次謂曰公常恬如將俟河清耶今諸貴人亦素敬愛公持二帕贄造請食頃耳而卿佐可得和謝曰吾譬之􅄔黒髪守節皓首乃求聘乎後歴官南京户部右侍郎卒和豐貎恢量雖倉卒言色罔躁喜愠莫顯然内含獨朗事低昂及人賢不肖不失分寸父光道得痿疾彌年和自奉養躬上溺器久益䖍儉薄不計生産善説中庸姚䕫常稱之曰不競不激含蓄光景如澄淵亡波珠玉自瑩李文逹耿清惠皆與和善謂和量如韓忠獻野史氏曰公當倉卒言色不躁喜怒莫顯此其徳量有大過人者至内含獨朗事低昂及人賢不肖不失分寸非中正精宻未易語此古大臣其人與未可以忤㫖廷杖而獨以清直歸之也潘侍郎禮禮字嘉㑹歸徳衛人天順進士授户科給事中剛直敢言中外震慴累遷工部左侍郎奉命理易州厰厰故有園圃果蔬之利為守者所侵漁嵗時餽遺中貴人禮取其直需國用絶饋遺中貴人疾之禮乃累疏乞休歸篋惟敝衣數襲圖籍數卷而已巡撫都御史韓邦問以禮清節純行疏於朝武廟命有司月給米三石特加慰問年八十四卒或問廉吏於太史崔銑曰軒公輗潘公禮其人也公歸有田一夫躬稼以生城亡居四時棲田廬盗夜掠之祗粟數升敝裘爾盗驚嘆叩頭曰使在官皆若公我軰安敢亂公亷不治名又難能也野史氏曰公之亷至此而盗猶夜掠之耶蓋公潔身不治名故鬼神借盗之掠以彰其亷耳孫府尹春春字一元尉氏人性剛直寡合獨嗜學不倦成化戊戌進士以户部郎陞知鞏昌府鞏昌地鄰畨族號難治春職無不舉副使王雲鳳御史王凱奏春仁愛如亷范勸課如龔遂撫字如陽城清直如包拯給白金綵幣以旌之陞貴州左参政督理糧儲三載轉廣西布政御史陶煦言其事體練逹才識老成陞應天府尹嵗餘言官以浮論中之具疏自陳始末懇乞致仕還汴治城南草堂集諸耆艾為㑹日巾車徃來觴詠談笑其精明剛大之氣老而不减平生不蓄姬妾壽七十有四野史氏曰宦途之毁譽是非殊無確論不難誣伯夷以為貪不難諛盗跖以為廉春以剛直寡合之人其中於浮論也固宜賈中丞錠錠字良金安陽人成化戊戌進士從汶水縣擢御史風裁栗栗行囊蕭蕭民有包老之稱巡撫陜西丁内艱聞訃即歸時逆瑾恣横羅織百司以直戅不阿坐事罰米千斛輸邊傾家償之瑾敗累起辭不赴世宗初詔晉秩二品卒年七十有六沉靜宏雅貎若遲鈍臨事毅然有為雖甚難處者無不曲中敭歴中外㡬三十年始終一節其居林下十六年自處一室無媵妾暇則課子讀書惇行孝弟絶口不及時事物論高之野史氏曰瑾敗銓部累起力辭不赴優游林下者十有六年此其識量過人逺矣愛做官者不知幾多技癢郭叅政緒緒字繼業太康人成化辛丑進士端簡沉黙勤苦自勵觀工部政有事楚府却贐餽楚王賢之授户部主事督運銀二十萬於陜西既給軍而主者以羡告曰羡以正支法也歸之藩司歴官皆以清直聞戊午陞雲南叅議单騎抵任鶴慶地山水暴發漂流廬寨見途號者哺之野暴者瘞之大理䝉化諸土官侵賦銀數萬蓋久且隱訪而追之其分守所至克殄久叛巨盗楊才軰數十人先是迤西有夷曰思六越金沙江界據地千里積二十年拒不受撫至辛酉嵗勢益猖獗鎮巡合議以勦請事下公卿議撫之便詔與按察副使王同行旬餘抵金齒盧叅將和統軍距所據地二程許而次遣官持檄徃者皆被留不報盧還軍語其故且戒勿廹緒曰吾受國恩報稱正在此如公言若臣節何昔蘓武入匈奴十九年尚得生還况此夷非匈奴比萬一不還亦分内事也或謂曰蘇君以黒髪去白髪而還君今白矣將以黒還乎正色不答单騎從數人行旬日至南甸岩突不可騎乃斬荆徒歩繩挽以登又旬日至一大澤戞都土官以象與乗之上霧下沙晦淖迷躓而行愈力又旬日至孟頼去金沙江僅二舍茇次手為檄遣官持過江諭以朝廷招徠之意夷人相顧而驚曰中國官今亦至此乎即發夷兵率象馬數萬夜過江抵其所持長槊勁弩露刀環之數重有譯者泣走報曰賊刻日且焚殺奈何久此曰爾譯雖㣲亦世受國恩不以死報乃為間耶因㧞所佩劍指示曰明日我渡江敢復言者斬衆皆股栗因賦詩見志思六既見檄諭禍福明甚又聞其志决即遣酋長數十軰來請聽令及所餽土物供具悉却去之乃奉宣勅榜且與語云云大畧先叙其勞次伸其寃然後責其叛罪思六等聞之皆俯伏泣行下請歸侵地緒曰此固我聖天子意也宣言許之皆稽首稱萬歲歡聲動地因詰盧叅將先所使人出以歸之盧曹得報馳至則已撤兵歸地受緬書矣是夏五月歸至㑹城鎮巡以下皆極稱與鎮巡以狀聞詔予奏事者官一級餘功伺覈以録所著有學吟稿撫夷録野史氏曰緒忠憤沉毅臨事不避意氣壯偉有如金沙之行非知勇天植能當此而不縮恧者乎越三年考績僅加俸一級陞四川督儲参政雖爵賞不足酧勞而緒盡力轉輸勤苦備至可謂無愧矣崔叅政陞陞字廷進安陽人父居貧諸兄各出自營獨陞業儒至為專篤母勸令易業弗聽踰冠未有室給事中李和賢焉妻以女明年舉鄉試成進士授工部都水主事改兵部復除禮部主客司畨人踰格請業賂鈞樞許之日趨上議陞執不僉名畨人夜持名貨來餽叱出之旦聲其事遂寢再補武選遷職方員外郎雖歴三部階五品然僦屋以居出則瘠馬布袍猶寒士也先是星變求言陞與餘干蘇章同奏竪閹干政妖僧蠱惑援庇憸壬竄逐忠良所致又言尚書王恕今之伊傅不宜置之留都不報時他言者頗及宫秘上怒書言者姓名于屏遷則絀其級或予逺惡地吏部故遲陞之遷陞篤實朴簡性剛少容凡締交者雖狎不敢玩嘗曰吾小心謹慎人也入仕三十餘年自蜀歸始有屋一區瘠田二夫笥無麗服家無飾銀之器晚好讀易暨綱鑑有得標識簡端卒年八十有八子銑另傳野史氏曰陞自郎署時風采已著知延安剖疑决難不動聲色所得深故開文敏道學之傳楊御史璡璡字用章祥符人成化十一年進士初授丹徒知縣㑹中使如浙所至縳守令置舟中得賂始釋將至丹徒璡選善泅水者二人令著耆老衣冠先馳以迎中使怒曰令安在汝敢來謁我耶令左右執之二人即躍入江中潛遁去璡徐至紿曰聞公驅二人溺死江中方今聖明之世法令森嚴如人命何中使懼禮謝而去雖歴他所亦不敢放恣牟都御史按部丹徒以索饌器不得誣以它事免官璡奏辨得白陞南道御史郎中李諒以事謫静寜知州持尚書黎淳陰事率家人竊取公帑物淳不敢詰璡并劾罷之給事中某等言事忤㫖衆懼禍出叵測璡疏救之曰諫官乃天子耳目若以盡職獲譴則天下事誰復敢言者是陛下自塞其耳蔽其目也奏入上悉宥之總制兩廣都御史秦紘劾安逺侯柳景不法諸事勘實得㫖景罷紘亦致仕璡奏曰景之罪既明是紘之劾不繆也今俱免者何也且紘忠實有大畧不宜擯棄從之隨起紘為户部尚書璡又奏建宗忠簡公祠於丹徒如岳忠武杭州故事給卒守墓春秋祀饗上俱如所請云𢎞治初擢山東按察僉事以疾卒年四十九所著有絃齋藁數卷野史氏曰璡心靈口敏大是用世之才不受中使之窘辱雖渉知術却得權變疏奏諸事言下了然胸有成畫惜不得盡究其用也王都御史嵩嵩字邦鎮汲縣人也成化十一年進士明年授太湖知縣丁母憂服除再授青城未幾拜監察御史嵩恥苛察崇忠厚務持大體初按遼左遼之將領弊端百出嵩悉為裁汰其開原鐵嶺諸衛前按遼者多不至其地嵩盡歴之一時邊備為之肅清繼按江右㑹巨盗楊九龍者聚嘯山林㠯千數吉安迤南俱為騷動嵩處㠯方畧不踰時而盗就擒上聞降璽書文綺旌之盗平又㑹時飢人多轉于死嵩曰救飢恤困勢不可緩若待取勘事無及矣廼令郡縣長吏即發廪賑之所活甚衆𢎞治四年嵩遷大理右寺丞進左右少卿指揮某母再以不孝告法凡再告者不復訊其犯稱寃不已嵩疑其母與人通而疾其子又據律有父母誣告之欵遂駁之諸刑曹皆笑以為再告無駁者及復訊其母於囚棚下産一女翌旦舉朝聞之咸嘆服以為不可無大理云内府匠申能格殺人法當抵命匠廼夤縁權貴得上㫖與之辨勘者欲希順上意嵩獨不然廼言曰生殺予奪君上之權也奉公執法臣下之職也匠兇殺人甚惨若生者得㠯倖免死者何辜覆奏以為不可上從之由是嵩名益著十一年擢都察院右副都御史巡撫延綏其地武備久廢且兼鎮守貪暴嵩至頓革其弊而邊務始振後坐邊警謫叅議致仕正徳中逆瑾擅政求賂于嵩嵩弗從遂誣嵩在延綏時侵尅官銀矯詔下獄籍其家而償乃戍于鄰嵩雖為瑾所誣而怡然自處不以夷險易節後四年事白瑾棄市復嵩爵而所没之産仍命有司給焉年八十四卒嵩生平重孝弟故凡祀先之禮靡不誠慎兄三人嵩事之甚恭所得祖産悉讓之李都御史興興字伯起嵩縣人也成化十一年進士授冠縣知縣以憂去百姓遮道泣留起復改鄒平尋擢監察御史忠鯁敢言每上疏訣别妻子不復留意家事及按陜西大振風紀所至奸盗屏息是時叅將郭鏞怙勢違法諸司皆畏之間有劾奏者鏞即令人刼于道并其奏章奪之興乃宻疏罪狀請按誅之上俞其奏興搆之戮于市百姓稱快又儀賔樊某者嘗毆父父愬之官莫敢有理者興亷知以計縳至階下杖死其它鋤强戡暴皆𩔖此布政韓某素與興不合及轉都御史即撫闗中因郭樊二氏子愬遂奏興逮至京師坐以重辟吏部尚書王恕乃上疏論捄其畧曰邇者御史興巡按陜西克盡憲職所至秋毫無犯其有益於地方多矣今之所傷雖有數人蓋欲懲治奸頑初非有意挾私法當擬徒今若處之以死臣恐天下後世以為陛下用刑任情弗以法豈不有累至仁至明之徳耶且天下貪官汚吏强軍豪民所忌憚者惟御史爾今若此是使御史垂首喪氣而貪汚豪强者無所忌憚欲小民獲安四方晏然難矣疏入上薄其罪謫戍嶺表而興名益振㑹赦歸所著有西巡奏議嵩南野録若干卷子尚當父興被誣論死三上章乞代及興謫戍賔州遂從行𢎞治十一年尚由賔州學生中鄉試徐御史憲憲字振綱安陽人成化十四年進士授松江推官松江天下稱饒而民習頗狡憲以約已推誠為治民稱曰徐青天有盗牛者以火刀更其角莫辨也憲令縱牛入野牛奔主家門中乃治盗罪已而拜監察御史出按甘肅畨貢獅子憲令守闗者勿納上疏言獅子異物受之則夷生玩心况日食羊牛百夫守之邪昔武王受獒召公戒之曰不矜細行終累大徳徃者夷貢獅子受之故敢再貢彼蓋窺我相尚矣却之便時例杖贖頗重憲奏流罪三贖米四十石而止雜犯死罪不踰五十石今増贖杖法則三年者米至四十五石矣是雖輕於死而實重于流也疏上憲以親老謝病歸卒年五十一曹中丞鳳附孫尚書亨鳳字鳴岐新蔡人生之先一日母自外暮歸見火光如車輪當其前明日鳳乃生生而靈異比就外傅畧加訓說即了大義甫冠舉子業精粹尤以撿身斂心為務時天台陳選督學中州甚器重之成化十七年登進士為祁門令擢御史𢎞治改元之初持風裁崇論正議多所嘉納偶奏事失儀鴻臚糾舉上特宥之謂左右曰此曹御史也好官當畧其細過按江北劾罷大吏貪墨望風解綬以抗直不容出守蘇州蘇富饒甲天下俗尚奢靡為定昏喪禮不過制一切務從儉素法在必行巡撫延綏正徳初召還逆瑾方用事賄賂公行諸部院見者多長跽稽首鳳故不見及見又長揖不拜一無所贈逆瑾問曰都御史知回院故耶鳳曰聖恩也瑾曰何以報稱鳳曰振肅紀綱激揚淑慝耳時瑾嚴勘天下錢榖以中傷不附已者勘官希瑾意言延綏布糧浥爛過縁主者乃罷其官聽勘誣償布五百疋粟千石鳳鬻産完納瑾怒猶未解也鳳積忿一日無疾端坐而逝明年瑾誅朝廷憫其忠遣官諭祭給金營葬事亨字伯貞都御史鳳孫也嘉靖乙未進士授刑部主事素諳法家語奸吏無所措手亦未嘗一徇豪富之請名稱籍甚出守兖州用嚴為治奏最為天下第一㑹有紅羅女者以妖術惑衆至數萬人官兵莫敢攖其鋒亨提兵徃勦乗風縱火以萬弩射其後賊敗走至曹坡集驚曰坡者破也亨姓當之遂就擒巡撫真定適夷人犯大原羽檄夜至亨即貫甲出鎮師進及挽其轡亨曰我雖老猶辦殺賊即馬革裹屍公能無恙乎將吏咸奮躍破敵龍泉闗下進兵部侍郎協理戎政營伍一新穆皇大閲賜緋魚廕一子尋陞南京工部尚書織造大璫嵗冐水衡錢不貲亨奏劾之不報遂求去卒年八十有二賜祭葬贈太子少保亨逡巡若木訥人而當幾能斷凛不可當生平未嘗受一私餽干一私事遇有寃抑黙為之解又晦其跡不以見徳所居舍僅避風雨朝野咸重之野史氏曰清直與殘刻相對清直者忠厚為心鬼神福之克昌厥後殘刻者貌清直而衷險譎鬼神惡之矣未有不殄厥世者都御史受瑾之摧折無疾而逝正人被禍天心憫惻而尚書公能黙解人之寃抑又晦其跡不以見徳祖孫輝暎一脉相承後嗣之興其未艾乎柴少保昇昇字公照南陽人也少受經于郡守叚堅成化二十三年舉進士擢工科給事中𢎞治三年彗見東井詔求直言昇首疏十五事皆切中時弊上嘉納明年山東河南大水復求時政得失昇言四事上亦從之七年詔建昌國公張延齡第延齡敬皇后同産弟也勢熖薰灼人莫敢言昇上疏論止八年四川番僧領占竹夤縁行取禮部御史諫不聽昇乃入奏大畧以恤人言杜無益反復乎孟軻韓愈之義亹亹幾萬言上讀之大悟即命停罷又疏止度僧徴畫工咸切直語多不録十三年改兵科適大同敵逼昇乃劾平江南銳玩冦殃民師久無功宜罪之以勵邊士上即罷銳偏禆以下各置之法累擢廣東右布政使平十三村賊賜銀牌紵衣復遷山東左布政使舟還荆襄先是州縣盛設供張以俟及昇至行李蕭然無異寒士觀者興嘆正徳二年擢右副都御史巡撫江西已改陜西時革總制三邊率聽制于昇紀律嚴明先聲所至敵不敢犯歴陞吏部左侍郎㑹尚書被逮昇攝部事凡病國紊法者一切釐正之無何陞南京禮部尚書復改兵部叅賛機務以父喪去位服闋改工部昇辭不允居數月復上疏請老詔始從之乃給月廪輿夫乗𫝊還鄉歸八年當嘉靖改元之初言官屢薦特加榮禄大夫遣官存問二年八月卒贈太子少保昇性至孝嘗分禄養親及親殁前後廬墓六年哀毁踰禮鄉人稱之潘布政鐸鐸新鄉人𢎞治乙未進士為兵科時雍泰巡撫宣大亷厲稜峻嘗縛叅將李傑撻之傑有内援奏泰擅打將官罷職鐸亢章力諍泰有敢死之節克亂之才為逆瑾所忌尋以都給事中出知漢中府公議韙之歴官浙江右布政使野史氏曰許襄毅云西望二高一華山一雍泰也其名流推重如此而潘鐸抗章力諍不問知為泰之一流人雖以此見忌實以此得伸乃知臧人否人者自臧自否者也可不慎諸李給事光翰光翰新鄉人也𢎞治己未進士任南户科給事中正徳間逆瑾擅權光翰抗疏力諫言甚切直瑾激上怒逮下錦衣衛獄廷杖革秩逆瑾嘗以諫諍諸臣姓名榜奸黨於朝堂頒示天下光翰亦在内世宗即位詔復原官尋陞台州府知府政暇輒進諸生躬課教之士𩔖翕然化焉所著有定疑諸書野史氏曰𢎞治人才之盛中州為最歴觀諸君子有一不為逆閹所摧折者乎榜列朝堂指為奸黨廷杖幾死惨極矣竟不能奪其節亦烈矣哉愚嘗謂逆賢亦猶之乎瑾耳而夏御史之外無聞焉夫豈賦才爾殊耶人有巧拙此可卜世運矣熊尚書翀羽翀羽字騰霄光州人嘗讀書南壇從遊者數人忽夕覩一絶色女立松樹上衆皆錯愕走翀畧不為意女㓕焉遂以刀刮樹皮大書曰作怪風雷折成形斧鋸分夜半雷劈之𢎞治乙丑進士初授武進令無毛髪㸃染稱循吏擢御史按陜西武臣强横發其甚者如指揮王昶置之法按江西墨吏望風解去釋死刑之寃者為多刷卷南畿考最詔以天下官員都照依熊翀其受知於朝廷如此分巡冀北道擒白蓮教謀不軌者萬衆惟戮其首王良輩而脇從者免督工張秋多被欽賞節鎮陜西刺奸植良紀綱振肅夜見寳氣上矗命掘之得古玉璽一顆文有受命於天既夀永昌八字納之上以工侍召入耆穉泣下遮留立朝抗顔多建白時大司空馬文貞名籍甚而侍郎有左熊右熊京輦有兩熊夾一馬天下太平之謡孝廟呼熊鬍子而不名一日奏事鼻帶液上曰鼻液乃膝寒耳以宫繡䕶膝賜之家居無玩好但藏古書千卷有止庵集行於世野史氏曰翀之制妖風雷聽命又能夜識玉璽之氣此非有他術也總見其清直足色處張副使士隆士隆字仲修安陽人警敏過人書再經目不忘竒文奥㫖覽即通解為孝廉時業太學與馬理崔銑為友講學京師嘗言須於事為騐其實身與世為二理與事相乖非聖人合外内之道也𢎞治乙丑登進士授廣平推官涖政嚴明民畏憚之擢御史時朝臣多黨附大臣交為權利士隆惡之光禄卿李良諂事劉少師健得右職又以女字少師孫健去位良詐言女死絶婚士隆劾罷良出按河東鹽法運使劉瑜貪恃奥援已遷叅政士隆劾罷之抑豪右均支給嵗課倍入暇建正學書院選士授經鑿青石槽開茅津皆為大衢民甚便之内宫災上疏切諫時弊不報再按鳳陽織造中官史宣酗酒作威大括財賄行荷二梃曰賜杖撻拒令者自都御史以下不敢禁士隆劾其貪横還理道事有張順者京猾也隨中宮鎮雲南毆門子死潛回匿京師雲南守臣移文逮之急乃出以二𨽻押送至桃源重貨二𨽻竊取病丐斃之二𨽻告順死勘實給文歸已三年士隆閱案疑之宻偵得順坐殺二人罪時錢寜大有寵廖鵬附之自師保元臣相與接席交驩士隆率同僚疏其罪鵬寜大恨罷職御史薛鳯鳴殺人為巨盗被逮又夜自殺二婢置朝門外懐牘訴寃鳯鳴兇愎且富當按者即遜去累年不决都御史彭澤以獄付士隆及御史許完掠治取服鳯鳴知事急重貨錢寜上其愬下士隆暨完獄俱謫外任士隆晉州判教民耕桑滹水决為數縣災臺檄士隆塞之績成晉人紀焉世宗即位復士隆御史尋陞副使兵備漢中其地居終南太白間長廣數千里有良田美隩宜牧竹木之利淘沙得金逋逃者擅以為業嵗與官軍交通則吞併弱小藏大盗伺便出掠報仇殺人官不敢捕士隆初涖任首按官軍殛貪用良舊習變革巨㓂王大王二閻仲良軰通回回為患所在皆立親識號曰賊主士隆諭令擒賊吾賞汝功否則率軍焚山衆叩頭曰願効力居數日各獻賊賊主怙惡者十餘家㓕之境遂大安乃堰響水溉田千畆立隄防溢又修雲霧水未成功而卒年五十一野史氏曰仲修官御史直言敢諫彈劾津要固其職事然其所不可及者更在能取友知學故三原馬子理見而欣然曰仲修昔者之言聖學也吾軰其亟從事焉後渠崔子又亟稱之曰爾徳無瑕可謂君子此足知仲修矣馬中丞卿卿字敬臣林縣人𢎞治乙丑進士廷試䇿問道未行法未守卿對曰政事之柄握於司禮刑法之權移於厰衛大學士劉健閱卷竒之改庶吉士授戸科同考㑹試時主考學士靳貴奴洩試題於外卿請究之竟坐奴罪靳愧恨吏部出卿為大名知府僉都御史寗果已除名厚賂閹永求復官擒賊永諷言官薦之時卿在工科同考有及之者卿奮袂曰世果無人寜用駑如卿者畿内可復令渠壊之耶已而傳㫖復果官巡撫真定討羣盗果欲中以危法至郡威脅語侵卿不為動亦無從得間乃令供軍需二千金卿謂必得印移乃可卒如請御史張存仁按治屢示意索賂卿不内張每罔事以動之未久二子俱敗他郡守以下多坐罷卿益著名提學山西發揮理學敦重行誼遷右叅政妖民張鉞欲乗晉府發喪入城為亂卿先知有備鉞不得發遷浙江布政中官張志聰等造幣於杭自擅權利久不訖工卿及御史歐珠協心裁抑色料招商平價悉委杭守查仲道公私稱便中官奏卿及查守抗命逮錦衣衛獄卿及仲道各自引罪歐疏救之有㫖俱降秩卿降鶴慶府知府逺郡事少民樸卿才優夷俗一變土官鳯朝文安銓據境叛殺官攻城且逼省㑹或指間道可逸卿厲色曰丈夫不死國而死家耶麗江土官木公朝文姊夫也兵力甚强二酋陰藉為助卿約木公㑹兵境上且諭以利害木感泣出兵徃援省城二兇失助瓦解三遷擢副都督漕運巡撫鳳陽與都御史劉天和協力疏導未幾漕利賜白金綵幣以勞瘁得疾遂不起年五十八卿性度𢎞博接人和易處事詳慎學以古人自期志于用世在鶴慶嘗為文示諸生言舉業之弊詩文之弊道學之弊謂皆非古切中時病父圖沁州知州歴官有循聲弟豫貢入太學博學有高識一門父子兄弟自可師友卿所著詩文有馬氏家藏集行於世野史氏曰卿之歴官以清直著然論理學之弊曰晚宋陋儒浚伏羲之畫轉濓溪之圈不反身心但求毫楮今又嚌其糟粕以自迷或有已不學專以非人凡人之善曲為巧詆此等語不為無見故能卓然自立也李副使夢陽夢陽字獻吉其先扶溝人也國初徙居慶陽父正以阜平訓導補封丘王教授遂家大梁母高氏夢日墮懐中寤而生夢陽十八舉鄉試第一明年為𢎞治六年登進士授户部主事是時海宇清寜部寺多暇諸薦紳先生雅事文墨夢陽與信陽何景明姑蘇徐禎卿鄠杜王九思濟南邊貢倡為古文辭以變衰陋之習斷自秦漢以上六代以下弗論也居久之轉員外郎外戚夀寧張鶴齡怙寵驕縱人莫敢問夢陽乃應詔陳其二疾三害六漸語稍侵中宮詔下錦衣衛獄拷掠備加無所撓屈敬皇一日御文華殿召大學士劉健李東陽謝遷問李夢陽宜何如處健對曰夢陽狂直不足深罪上色變東陽不敢對遷乃從容言曰夢陽雖狂直然其心無他實欲效忠于陛下上曰謝先生言是及獄具詔夢陽復職已而獨召兵部尚書劉大夏問曰日來外間事如何大夏曰近釋李夢陽中外歡呼聖徳如天地之大上曰朕初欲輕譴此人而左右者曰輕莫若杖而釋之汝知渠意乎杖必送錦衣衛渠拴闗節杖之必死也于渠輩則誠快矣如朕殺諫臣何大夏曰陛下此事即堯舜之心也明年為正徳改元夢陽遷郎中逆瑾軰導上鷹兎狗馬舞唱角牴漸廢萬幾給事中劉􅉅陶諧相繼奏劾不報于是户部尚書韓文每退朝對屬吏輒泣下夢陽聞説之曰公大臣也義同國休戚徒泣何益文曰奈何曰比諫臣有章入交論諸閹下之閣矣夫三老者顧命臣也聞持諫官章甚力公誠及此時率諸大臣殊死争事或可濟也文乃毅然改容曰善即事弗濟吾年足死矣不死不足以報國翌日文入密扣三老三老許之而倡諸大臣諸大臣又無不踴躍從者文乃大喜退而召夢陽令具草及疏入瑾知韓疏出夢陽手蓄憾不已矯㫖奪其官尋又黜健等四十八人榜為黨人然瑾必欲殺夢陽以攄其憤明年羅織他事誣奏械繫詔獄夢陽兄孟和及内弟左國玉者間徒從謁修撰康海及瑾嬖人姜逹曲捄得免放歸大梁四年瑾誅五年起夢陽江西提學副使勅許舉聞重事夢陽振學造士外復時時大有建白臺使及同官者疾其侵官而御史江萬實㑹按江西與夢陽不合夢陽䟽其事萬實亦論劾天子命大理卿燕忠徃勘是時忌者咸欲擠入不測之淵獨少傅楊一清為力解夢陽遂獲末减初宸濠懐逆招致文學之士凡吏江西有才名者即㗖以厚利否則威刼之知夢陽不可撼佯下之而布政使鄭岳適為濠所䧟夢陽素與岳不相能岳既得罪謂夢陽傾之也及濠敗辭連夢陽頼刑部尚書林俊奏辯始白嘉靖即位都御史王廷相學士霍韜及知者相繼論薦竟不用嘉靖十年迎醫京口還遂卒年五十九所著有賦頌樂府古今詩三十六卷書疏碑誌記序雜文二十七卷空同子八篇行于世子枝舉進士為南京工部主事左遷海州同知才藻宏麗千言立就有父風云野史氏曰海内孰不知有空同子哉文章氣節明代當不居第二人也余㓜而讀公之文慕公之人因康子對山出公于瀕死之際並慕康子之文之人議者咎其失身於瑾也余謂康子若從此借瑾之力濟已之私則登友于彼岸而溺已于深淵誠為不可康子既全空同之生又以救空同獲罪經也而不迂權也而不譎康子何媿于心乎何栢齊謂為古之狂庶乎知康子者使空同子而不足為當代重康子有載胥及溺耳又曰空同子慶陽人而籍于大梁者也則慶陽不得而私之籍固以人重哉薛文清亦河津而籍于鄢陵鄢陵豈忘哲人之徳至薛西原則偃師人而籍于亳州亳固重矣偃師發祥之地烏容冺乎因並表出張太僕衍瑞衍瑞字元承汲縣人也祖傑監察御史父經湖廣左叅政衍瑞舉𢎞治十八年進士明年為正徳改元授清豐知縣以勘事執法為逆瑾所惡矯㫖下詔獄楚毒備嘗瀕于死者數矣瑾誅赦出歴陞吏部文選司郎中十四年毅皇自榆林還復欲南狩時寧藩逆上下以為憂大臣科道交疏留不聽江彬軰又從更詔以三月壬子駕出衍瑞曰即畏罪不言寧不為宗廟朝廷所乎乃抗疏率同官六七軰赴闕上之大畧言巡游費財動衆州縣騷然而隐憂伏禍且不可測上亦不許明日諸曹屬各又上疏諫前後百有七人詞益亟切上怒罰跪門五日而京師忽風霾晝晦禁内海子水溢高四尺許橋下七鐵柱折有金吾衛指揮張英者以是為變之明騐乃肉袒戟刃于胷以死諫上大驚詔諸言事者各杖三十倡之者謫外衍瑞得平陽府同知世宗即位召復原秩尋擢太常寺少卿踰年卒于是言官疏衍瑞負性忠直兩遭困阨宜加褒恤以勵臣工詔可贈太僕寺卿仍賜祭葬廕其子王光禄相相字夢弼光山人也正徳三年進士授沭陽知縣值嵗荒相設法賑捄全活者甚衆秩滿拜監察御史巡按山東訪除民蠧擿伏如神至臨清捕監官稔惡者數軰悉付于法權倖震懾及還朝又劾錢寧江彬風采益著無何乃竟搆陷被逮謫高郵州判官卒相博聞有精鑒初少師張孚敬以落第候除相遇于逆旅之舍與之談竒之謂孚敬曰子相甚異它日所就奚翅科第而已因厚貽以歸後孚敬舉進士授南京刑部主事嘉靖初議尊親禮孚敬所言上多采納累進大學士乃上疏白相以忠鯁罹誣宜有恤典詔贈光禄寺少卿仍遣官諭祭馬御史録録字君卿信陽人也正徳三年進士授固安知縣邑當南北衝劇頗號難治録明習政體周察人情廉明惇信士民恱服踰年冀冦作亂襲破固安録被執入見卧内無長物冦賢而釋之再踰年徴拜監察御史督理山東馬政以内艱歸免喪出按江南時上改元嘉靖之初也遣使捕高唐州官屬連坐者五百餘人中外大駭録上疏止之其畧曰夫法者公器天子不得而私也昔漢文帝欲重懲驚馬之人張釋之為廷尉執法不可文帝從之故千載以為美談我祖宗監古為治内設三法司外設撫按官無非刑清獄平使天下無寃民耳先帝時劉瑾專權於前錢寧竊柄於後張雄等依附作威於其中蠱惑朝廷動差錦衣官校四出提人天下洶洶幾壊國事幸賴陛下登極祛除舊弊人始安堵不意復有高唐之命人情且驚且疑當此新政之初恐非所宜有也伏望陛下自今以後擴𢎞人之度慎法令之施遇有罪人内則付三法司外則付撫按官即無不可治之人亦無不可行之法矣惟陛下垂察以杜將來多事之漸上從之六年按山西妖人李福逹事覺録捕抵法初福逹以丹術干武定侯郭勛勛竒之相與頗密及被繋勛乃移書請貰録大怒劾勛庇奸亂法勛皇懼入辯上疑復屬法司於是刑部尚書顔頥夀都御史劉文莊大理卿湯沐等㑹鞫俱如録擬而給事中王科等御史高世魁等二十五人各又奏論勛先後十餘疏上以人言衆愈疑而左右又有為勛言者乃令福逹并勘官俱至午門覆審以兵部左侍郎張璁署都察院禮部右侍郎桂蕚署刑部少詹事方獻夫署大理寺璁等鍜鍊傅㑹盡改原擬録等坐故入俱謫戌頥夀文莊沐等坐推按不實俱落職科等坐挾私彈劾俱編氓福逹釋歸勛置不問詔俱報可璁等降勅奬諭各賜衣帶銀帛有差録即戍南丹講學授徒四方之士雲從暇則娛情詩酒無少怨尤歴十七年以疾終年六十有八党中丞以平平字守衡其先自平陽徙禹州正徳甲戌進士管倉淮安餉事清簡日與諸生講學論文東南高士多從遊者時閹宦用事屢犯其怒使校日夜踪跡無所得乃已武宗新收家將朱乾等六百名直入臺基厰取馬草平禁之責發兵馬司獄提督太監江彬靣奏上朱乾率數十人執平至豹房彬又奏上上竟釋之所涖諸差盡心職守加意民瘼大司徒秦公嘆曰爾才十倍某不能及吏部擬提學外補秦公留之曰某老矣部事全賴此官整理䟽上中止冡宰廖公招與相見避嫌不徃廖益重之轉浙江温處兵備副使清節表表貪汚者望風遯去温處軍素驕因餉激變教塲中樹旗幟為亂平徃諭之曉以恩信衆皆首伏即日解散倭夷讐殺為地方患獲海賊五百人憲臣欲以為功喜謂平曰我列公功以聞於朝例當封侯平訊其為海中漁人為賊所掠悉縱之曰殺無辜以幸賞吾不為也以副都御史協理院事家居三十四年權門要津不通一字太監黄錦南行過訪許以起用比歸再過不復出接語人曰刀鋸之餘薦天下豪傑司馬子長之所恥也元􅍬晚依閹宦而相得豈如白居易之為全節耶内外臺諌前後薦舉二十二疏若罔聞知亦有大臣以書勸之起者反貽書勸其歸既而大臣被譴人咸服其高識野史氏曰公忤朱乾江彬而不動自不肯殺無辜以幸賞定亂軍係夙昔風采有所以見信於衆者非取辦於臨時也家居三十餘年其品望自是鳯翔千仞楊御史來鳳來鳳字從儀汝陽人正徳甲戌進士授㑹稽縣知縣擢監察御史上將南巡來鳯同諸御史疏諫上怒杖於闕下幾危出按陜西事未竣以病告歸林居布素猶然一寒士也汝人高其節云張光禄原明原明字孟復儀封人正徳六年進士授刑部主事清嚴明慎江彬錢寜嘗以事謁原明悉峻却彬寜銜之毅皇南巡衆情洶洶原明與郎中陸俸等合疏入諌意指近倖蠱惑上怒罰跪門五日杖三十奪俸六月及彬寧事敗原明補四川按察副使世廟嗣位旌其忠加正三品俸後遷陜西左布政以疾乞休詔進光禄寺卿孫鹵另有傳孔知府輔輔初名孟富字道充汝陽人㓜以神童稱登正徳戊辰進士授中書舍人遷刑部員外鞫刑明允上覽其䟽賜名輔蓋以公輔期之也己卯上將南巡輔偕同舍郎孫鳯等伏闕諌被杖幾死尋出為松江守丁内艱復補辰州世宗改元大褒諫臣得進俸一級以外艱歸起補廣西便道抵里卒輔天資頴異所著詩文甚富惜子姓零落不少概見云郭太僕五常五常字大經西平人正徳辛未進士授大理寺評事武宗南幸上書切諫罰跪門五日杖八十謫通政司知事嘉靖初復原職恤刑陜西多所平反陞萊州知府亷介自持萊人繪像楊震祠中起補鄖陽累陞山西晉太僕寺卿調停馬政屢奏邊功欽賞有鏹金文綺之賜野史氏曰君之舉動如此使立朝諸公啞無一言何堪自對以對君父惜未有奏格心之益者而流毒縉紳一至於是可為扼腕潘知縣中矩中矩澠池人舉人正徳十年知内黄恬淡樂易與民道疾苦藹然如家人一切儉約時有公出嘗囊金以自給纎芥無取於里胥每歲首疏其錢糓之可緩及工役之可已者停止之河道修築歲費新揵萬計毅然為請於上竟得蠲豁百姓至今思之曹布政嘉嘉字仲禮扶溝人正徳丁丑進士由庶吉士授御史建言謫大名府推官嘉靖元年起補原職復謫禹城知縣尋降茂州判官復御史指摘宫闈上欲賜死嘉復舁柩以諫十二年陞山西提學副使累陞江西布政致仕孫尚書應奎應奎河南衛人正徳己未進士為户兵科左右給事中時嚴嵩當國殺楊繼盛等以閉言路應奎疏爭廷杖下獄及從寛釋旋上慎名器一疏中時忌再下獄應奎遂舁二柩于長安門外曰一以備臣奎一以備奸嵩以謝天下廷杖謫高平縣丞累官尸部尚書熊叅政榮榮字以仁光山人授行人上將南幸衆情洶洶榮與郎中陸俸等各疏諫留杖謫國子監學録尋擢御史出按山東平礦賊之亂復按雲南協征岑猛功業赫然累官至叅政李通叅秦秦字仲西臨漳人嘉靖十四年進士由庶吉士為刑科左給事中條陳時政六事上嘉納之著為令陞禮科都時分宜任禮部尚書子蕃已放縱納賂秦抗疏劾之分宜訴辨疏雖留中而秦望大著後竟遭中傷調倅大名分宜屢因考察欲罷秦奪于公論不果秦在郡聴斷明允屢白疑獄歲飢上官委秦施賑旬日徧歴十一邑給散有法全活甚衆郡守載之守魏録永為荒政式陞同知久之陞戸部侍郎又久之補武選即陞通叅自嚴氏專政淹滯外内二十餘年竟為其黨所排歸來結廬洹上名曰知止時與朋舊吟咏灌蔬種芋此外無所事也卒時七十野史氏曰公得考終幸矣分宜豈輕饒人者哉張副都鹵鹵字召和儀封人嘉靖乙未進士由知縣歴官副都御史英毅慷慨多大畧持論侃侃無所避官給事中時值穆宗踐祚疏請勤視朝蒞經筵廣顧問以隆新政上嘉納之時神宗甫六齡即引累朝立東宫故事以請已復上言慎選内臣給事東邸宦官孟冲以内㫖有所罪極言祖宗家法輔臣無不與聞之政法司無不詳讞之刑中㫖可邀置廷尉何為庚午晉太常少卿命未下而内江相請更兵營制猶草疏極言其不可或勸云已遷官矣願少巽鹵曰未拜命猶諫官也疏入竟從議營制皆如故辛未遷右通政九月拜南京右僉都御史撫浙江以養母棄官歸戊寅詔守舊秩撫保定已加右副都御史鹵自銀臺擢中丞三領節鉞在金陵殱叛卒馬應祥在河道獲妖人王後溪在保定修三闗險阨數百里保障功為多大璫馮保乞為建坊不許以為勞百姓力媚士大夫尚不可况内璫乎保目攝之而未發也江陵以材望相推每與談膝輒前席既别與之約事可否具以書相聞鹵益自發杼引當否無所詘有所薦進及論刺皆獨行其意不阿相君㫖久之漸不能平嗾言官論之左遷南京太常寺卿乞休歸後江陵敗凡再薦起用竟不果以壽終於家野史氏曰余於儀封得兩名公集於浚川集獨録其慎言一編以其發明理學讀滸東集獨録其奏議一編以其發杼意氣各取其所重者以概生平公門人王安仁謂公忤時相抗權璫遭䜛屢變百折不回不獨見公之文章並見公之氣節也王尚書惟儉惟儉字損仲祥符人萬厯乙未進士累遷山東巡撫氷蘗自持節餘金七萬悉以疏聞尋授工侍以直忤魏璫欝憤而卒賜祭葬贈尚書有俊才能詩文周侍郎之綱之綱字冲白固始人萬厯甲辰進士户科左給事中時逆璫魏忠賢肆虐之綱憂其漸特疏糾之歲甲子例副陳太史子壯典試浙闈已辭矣㑹副都御史楊漣疏列魏忠賢二十四大罪之綱為停装諸同僚謂已奉差出詎又言事耶不顧乃拜㣲臣今已陛辭權璫終難緘口一疏疏上整衣冠坐聽處分奉㫖閒住崇禎中陞南京兵部右侍郎卒王郎中繼康繼康字季寧光州人自為諸生便以名教自任以忠孝誨人讀書至忘寢食聞一善言即録之於册孜孜汲汲日不暇給萬厯己酉舉於鄉天啓癸亥授松滋知縣署枝江監利二縣皆有惠政民安其教而誦其功興利除害不可殚述嘗却藩産委查三千金之餽崇禎戊辰舉卓異第一授尸部主事已已解餉寧夏叱賊使知朝廷之尊庚午監楚漕平交際様米常例及包攬諸弊五十餘萬金更題疏入告欲以澄清天下先期用濟軍國之需辛未紀録漕運第一連轉員外郎中雖疾勢已危猶匪躬而報命不攜家屬卒於部署衣履蕭然上賜官符馳驛還長子轔以光州城破罵賊死子婦方氏周氏馮氏吳氏皆以不屈罵賊死仲子霽仁孝異常薛宷誄曰其人高介淄塵不染為令松滋鳩形飫饜進厥譽髦授以鉛槧執法不避襲彼獫晉秩地曹益憫疲墊氷霜荼蘗初終靡忝野史氏曰王郎中介節士也徳浮于位士人惜之然真學真品躬行無愧秩禄崇卑奚問焉其門人以勤學愛民危身奉上私諡曰文忠竊附於朱穆王通之義殆近代實稱之事也中州人物考卷四
