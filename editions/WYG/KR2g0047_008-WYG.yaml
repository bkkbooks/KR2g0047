body:
  text: 中州人物考卷八容城孫竒逢撰補遺王待制僎僎字幼度祥符人元末為國子助教洪武初徴為修撰四年開科取士僎與典試又命於大本堂授呉王經尋遷待制同宋濂修輯洪武正韻昭鑒錄諸書八年秋上憫其老賜致仕歸後以子宏為龍江遞運官忤丞相胡惟庸寘之理惟庸敗僎來京師授徒自給上忽問僎安在左右告以故上即召見慰勞甚至賜以綺帛仍給舟車送還僎為人質直嚴重年七十餘終於家秦從龍從龍字元之洛陽人也仕元累官和林行省左丞改江南行臺侍御史㑹兵亂避居鎮江丙申王師下金陵遣大将軍達下鎮江上謂達曰鎮江有秦元之者才器老成當詢訪致吾欲見之意達至鎮江物色得之時從龍有從孫永為達部軍因遣還報上喜甚命兄子文正及朱文忠以白金文綺聘之從龍遂與妻陳氏偕來上親至龍江迎入時上寓王綵帛家因邀同處朝夕訪以時政從龍盡言無隠既而上即元故御史臺為府居從龍西華門外事無大小悉與諮謀密書漆板問答左右皆不知上稱先生而不名每嵗從龍生日上與太子皆有贈遺或親至其家與之燕飲禮遇甚厚乙未從龍從子澤死告還鎮江上出郊握手送之是年十二月從龍卒年七十餘上聞驚悼未幾督兵至鎮江親臨哭之命有司厚卹其家郭揮僉雲雲南陽人有勇畧值元季之亂雲起義兵保鄉郡元聞之授以平章事太祖既定中原河南諸郡皆下雲獨守裕州累諭不服志在興復久之勢孤援絶軍敗被執終無一言自分必盡為所守者慎羈不獲遂械至京師上嘉雲忠義命解其縛且慰撫之授以親民之任無何政舉民服上竒其才擢南陽衛指揮僉事雲築城建衛撫綏軍民咸得其所以疾卒上悼惜親製文祭之子洪特授宣武将軍僉飛熊衛親軍指揮使司事世尚書家寳家寳者臨潁人也其先出䝉古姿貌豐整有文武才本姓李初仕元賜姓世至正末以集賢院學士守膠東登萊諸郡洪武元年大将軍下山東遣㕘政傅友徳取萊陽正月丙子家寳籍車馬之數同僉院王世隆等詣降上嘉納授大理寺少卿是年八月始設六部以家寳為禮部侍郎二年陞刑部尚書未幾坐事貶知廬陵召還授兵馬指揮司副指揮改兩浙運鹽使司同知十五年進知臨安府秩滿賜致仕還後復召至京師遣賑廣東興寧長樂二縣飢民所活甚衆二十七年冬卒於家子寧以軍功授泗州鎮撫張編修唯唯者永豐人也寓南陽洪武六年以尚書舉第一是年上開文華堂於禁中以為儲才地詔擇解額内雋異者俾肄業其中唯等凡十有七人實與選正月甲寅命題賦詩詩成稱㫖唯等皆擢翰林國史院編修以贊善大夫宋濂太子正字桂彦良分教之上謂曰昔許魯齋諸生多為宰輔卿其勉之聴政之暇輒幸堂中取其文親評優劣命光祿日給酒饌每食皇太子親王迭為之主唯等侍食左右冬夏賜衣及弓矢鞍馬恩禮甚厚濂輩雖司啟迪顧諸生皆上所親教不敢以師道自居一日侍燕閒詢及肄業進益濂對曰無如張唯者因備述其雋才請錄為弟子員上笑而許之三月上命唯等各歸展墓皆攝監察御史以行尋還任其時同進者又有祥符王輝河内李端洛陽張翀禮雖不及唯然侍從車駕應制被顧問未始異也答祿修撰與權與權者永寧人也其先本遼人博學強記善諧謔仕元為河南北道亷訪司僉事以故官入朝洪武六年為秦府紀善改監察御史上疏言堯舜禹湯文武相承為道統孔子顔曽思孟相𫝊為道學宜崇祀典七年八月復上疏言王者立始祖之廟又推始祖所自出之帝祀之於廟故曰禘祭今受命已七年矣而禘祭未舉甚為匪彛也上皆納之無何出為廣西按察僉事未到官召還八年三月擢為修撰降典籍轉應奉致仕自稱洛上翁上親為說辯之文多不載王布政鈍鈍字士魯太康人也至正間舉進士授猗氏縣尹元亡隠居教授河津洪武六年徴至京師奏對稱㫖除禮部主事遷吏部總部郎中出為福建左㕘議轉右㕘政使麓川回遷浙江左布政使期月以母喪去詔徴詣闕諭之曰浙江非卿不可治襄事後勉起就任以副倚注之懐命禮部厚加賻贈鈍懇請終制不許在浙先後十年四境晏然當是時太祖宵旰圖治藩憲重臣能勝任而久於其職者惟鈍與雲南布政使張紞太祖常稱於朝以勸庻僚革除間召紞為吏部尚書召鈍為戸部尚書又明年靖難兵至鈍潜出城欲亡為邏卒所執文皇即位召紞與鈍諭曰卿二人久事先皇習知典故今皆老矣其解職務月給尚書半俸居京師視時政有戾舊制並向朕直言之無隠庻稱厚望老成之意已而紞自經於部之後堂鈍承制廵視北畿山東事竣乞骸骨上命以布政致仕鈍既歸欝欝不樂遂卒所著有野荘集六卷刻於家子瀹自有𫝊郭忠襄資資字存性武安人也洪武十八年進士改庻吉士授户部主事以尚書郁新薦選北平左布政使文皇在潜邸時數見知後靖難南下属資居守撫兵輯民給粮餉不乏永樂初論功進户部尚書仍掌布政使事賞賚視伯已而改刑部尚書復改户部昭皇即位加太子太師蹇義夏原吉數短於上謂資偏執常格恩澤請罷資上意不然間以語楊士竒曰先皇興義旅及吾昔居守皆得資力其人亦材且誠今必如二臣請是吾危則任人安即棄之吾誠不忍士竒對曰故舊無大故不棄此皇上盛徳顧資彊毅人不得干以私但詔勅所蠲租資必責有司依嵗額徴此太過誠如二臣言上曰吾在此復有原吉與同事彼雖偏執莫能行也已竟罷政賜璽書歸武安資歸踰月上念之不已又謂士竒曰無使大臣怨乎不以資其謂我何命户部給半俸復其家章皇嗣位詔起資為户部尚書免朝謁資視事勤雖大風雨不避僚吏敬憚性木彊意所安者雖刀鑊無能屈所居頽垣朴舍未嘗治第城府卒之日家無餘貲年七十三追封湯隂伯諡忠襄子佑以資故仕至户部主事魏給事敏敏字好學鞏縣人洪武二十一年進士授吏科給事中以母病謁告歸省未至而母卒敏即之墓所哀慟水将水不入口者五日廬墓三年旦夕衰服哭奠如初喪鄉里稱其孝二十六年以守臣請甄表其門羅㕘政義義者河南人也革除間謫戍山西時議舉兵伐燕義詣闕上書乞罷兵息民以敦親恩不報及靖難師起義又詣軍門上書其畧曰昔者武王崩成王幼周公乃叔父也而輔相焉管叔流言間王室周公誅之大王聰明英武博通經史今之周公也宜以周公之心為心謹守燕土則天下皆以為周公之聖復生於今日矣又謂古之夷齊以國相讓去隠於首陽山矧聖賢欲成天下之事必先明逆順之理成敗之勢禍福之機又得天道之宜人心之安然後可書上文皇怒下獄及嗣位即召為户科給事中尋遷湖廣布政司左㕘議復轉陞陜西右㕘政劉太僕進附孫知府繪曽孫贊畫黄裳進字文升光州人景泰四年舉於鄉釋褐為太平府通判聞父卒即日解任比至母遘疾亦篤進日夜侍側衣不解帶湯藥必嘗及母殁水漿不入口者三日既塟遂廬墓側哀慕食澹毁瘠骨立手植栁柏五百餘本踰年枝葉繁茂烏鵲馴集不去有司白於朝特賜褒異及免喪拜太僕少卿卒繪字子素進之孫少以豪自負舉鄉試第一成進士官給事中不避權倖後為貴溪黨人論劾出為崇慶知府尋令致仕歸與楊用修唐應徳康徳涵何太華為詩酒之㑹所著有通論詩文若干卷黄裳繪之子也十嵗隨父入官為京都賦奕奕動人諳諸邊形勢有用世之志成進士贊畫宋司馬經畧河防斬獲甚多所著有元符圖藏東征雜記等書行世孫襄敏賢賢字舜卿杞縣人也景泰五年舉進士第一授翰林修撰七年預修寰宇通志成轉侍講天順初為㑹試同考未幾改左中允侍東宫講讀三年考最推恩封父如其官及母妻俱授安人純皇即位遷太常少卿兼侍讀成化六年乞歸省上念侍從舊勞特命乗𫝊且有金綺寳鏹之賜滿三月還朝㑹修睿皇實錄成進太常卿兼侍讀學士十四年以家艱還盡以遺産畀其二弟服除以學士命掌翰林院事時皇儲未建乃上疏請且引疾乞休示無希覬意章並上上皆允之皇子立是為悼恭太子賢歸六年卒年五十四贈禮部左侍郎兼翰林學士諡襄敏所著有鳴盛集若干卷劉尚書璟璟字徳輝鄢陵人為四川㕘政漢川軍叛殺人璟擒其首惡亂遂定改山西宗室抽刀截耳以脅御史衆皆走避璟挺身入諭以禮法引臂出之血浣其衣聞者壮之在刑曹廷臣㑹鞫逆瑾有㣲斥瑾者輒反唇璟厲聲斥曰朝廷有大法在尚爾私懟耶次訊諸奸惟允子訒正徳丁丑進士初授寧國府推官武廟南幸繫詔獄後歴官工刑二部尚書曽孫賁卿監察御史胡副使賓賓字汝觀光州人嘉靖壬辰進士放榜後以母病亟歸不與殿試為兵科時論列臨難避事不忠之大臣三人皆罷譴畿内飢荒疏請和糴發粟十數萬全活甚衆因大計劾山東布政某時宰庇之尋推撫遼東賓歴詆其罪語侵時宰謫判亳州賓矢志勿欺絶無倚附好徳如飴聞善即拜海内士樂與之交蔡知縣光附子尚書毅中光字汝謙光山人年十三從其父與王文成論良知力行不合從旁曰能行詎非知也文成異之嘉靖己酉舉於鄉授江華令以卓異調寧逺乞終養其學以靜而入以敬而存無愧西山文肅之裔一日㣲疾衣冠拜家廟朗吟而逝邑人為立黙齋先生祠祀之子毅中毅中字中山萬厯辛丑進士由庻吉士官禮部侍郎署國子監祭酒時璫賢柄政楊漣疏二十四罪請誅忠賢上不報毅中遂四疏請告命留總裁實錄后兼侍讀學士致政崇禎三年進呈六經註疏上奨其研心實學卒贈禮部尚書朱藩王端清載堉鄭藩世子以父恭王原係四支長支次支無嗣三支盟津王得罪庶母父東垣王以四支襲至恭王載堉上䟽仍讓三支不允七䟽懇辭乃允其請以世子終諡端清奉㫖建坊著有天文樂律諸書考定雅樂審音制器生時以秘篋貽子孫云俟有急難啟視甲申闖冦遣偽将軍劉方亮陷郡城開篋有借問将軍誰姓劉之句葢前知云朱宗正睦㮮睦㮮字灌甫周藩鎮平恭靖王四世孫髙祖七世孫也嘉靖中以學行聞為周藩宗正早嵗講業水竹居之西學者稱為西亭先生生而端穎李夢陽一見竒之受經學六經悉通大義讀漢以來諸家經解所發明多得之於世儒箋註之外尤精於易春秋博古通今而文復雅馴有至性事父母甚備居喪不御内寝先世遺産盡予諸弟自奉儉樸若儒生卒年七十所著有陂上集五經稽疑授經圖河南通志文獻志中州人物志若干卷弟睦號西園為之編校鋟行能承兄志云李修撰叔允叔允字叔允鈞州人洪武三年任國子博士尋入東宫兼伴讀六年奉詔纂修昭鑒錄擢修撰八年修洪武正韻亦與焉年七十以老乞歸許之賜白金百兩綺衣一襲皇太子親王又各賜錢萬八千兼以酒饌寵賚至渥縉紳榮之鄭中丞二陽二陽號潜菴鄢陵人萬厯己未進士歴官至廵撫由徳安推官行取入京璫賢私人嗾以劾楊漣居家不法事可立登要津二陽謂楊公居家清謹實無過遂授南工部主事備兵淮揚鹽漕軍門大璫楊顯名聲勢赫灼欲府道以属禮見二陽謂兵道不與鹽筴且勅書無提衡監司語屹不為動平生篤於宗親欲倣行文正公義田事晚好竺典陳御史士舉士舉衛輝人洪武三年有司以儒士舉時四方被薦者頗衆詔禮部復試之其中選者士舉暨桐廬魏潜等凡十九人㑹入謝太史奏文星見上喜士舉等皆擢監察御史邢編修恭恭字克敬鄭州人宣徳二年進士授翰林院編修母歿自京徒步歸不入城府既塟結廬墓側屢有祥應有司言状詔特旌焉栁揮同宗宗鹿邑人永樂三年以都指揮同知從征交阯與吕毅同死於難郭御史欽欽字子敬獲嘉人永樂甲申進士授行人擢御史嚴毅清簡吏民憚服其鑿吕梁監獲軍皆以風力見稱馬恭襄昻昻字景髙祥符人慷慨有志節永樂癸卯舉人授鴻臚寺序班擢御史累遷兵部尚書天順辛巳曹欽反變起倉卒都御史冦深恭順侯呉瑾俱遇害昻率官軍圍欽等於其宅盡誅之進太子少保年七十致仕卒諡恭襄李尚書遜學遜學字希賢上蔡人成化丁未進士歴官直閣禮部尚書有作人厲俗之功極被恩遇賜賚甚厚李僉事濓濂宇川父祥符人鄉試第一成進士李獻吉締為忘年交見嵩渚集祥符文獻志杜僉都柟柟字子木臨潁人正徳辛巳進士與何景明李夢陽王廷相崔銑等並稱有研崗集行世朱恭節冠冠字仲瞻固始人正徳戊辰進士按兩淮以清正著聲流賊陷固始屠其家聞變慟絶回籍不仕終身服䘮嘉靖元年起江西僉事不就卒諡恭節孫堦甲辰進士令臨晉有循聲授御史簡静持大體吕知州文文延津人正統甲子舉人初授江潜令後守沔陽及朔二州氷檗之操終始不渝入覲吏部考為天下清官第一書名部門以勵士風張太常漢卿漢卿字元傑儀封人正徳辛未進士嘉靖初為户科都給事中時議大禮漢卿抗䟽謂上當嗣孝皇䟽三上皆㐲哭於午門外上怒杖於庭罷歸卒於家隆慶中追贈太常少卿扶侍郎克儉克儉光山人官刑部侍郎以直著有講學功張都御史祉祉固始人嘉靖戊戌進士歴官陜西廵撫有築城功人稱其守郡籌邊似尹晉陽持身約已似婁師徳張副使景景字光啟汝陽人嘉靖癸未進士授御史出按陜西䟽陳邊務十事薦吕涇野於朝按浙建天真書院祀王文成買田數百畆給肄業諸士廵視京營絶請托與嚴世蕃相左遂出為漢中副使尋罷歸所著有泰華集六卷喻侍郎時時宇中甫光州人嘉靖癸未進士為御史劾相嵩險而獪久之且亂天下䟽上即素服候訊北闕上心動於時之言而嵩難卒去因勿究時有邊功劉主事訓訓汝陽人嘉靖壬辰進士為温州推官有權貴子怙勢恣睢從惡少數十軰横行州里漁色罔利欲奪友人妻不得乃毒殺友人郡守莫敢問託病推印務於訓訓故以好延至㕔宻勅訟者至獄成即杖殺之置惡少於法一郡稱快權貴陽令陞户部主事即挂冠歸陳給事耀文耀文字晦伯確山縣人幼稱神童嘉靖庚戌進士為給事中感時觸忌忤時相謫魏縣丞卒年八十二博極羣書著述甚富有天中記正揚學林諸書張廵撫九一九一字助甫新蔡人嘉靖癸丑進士在吏部與王世貞交善㑹世貞父得罪分宜下獄九一數過問坐是出外且謫後廵撫寧夏有功受金幣之賜趙尚書賢賢字良弼汝陽人嘉靖丙辰進士官户部兩司錢榖風清弊絶出守荆州攝服大盗楊勝徳黄中軰地方以寧撫楚時江陵秉國常繩其親識僕從及其奪情罪言者又移書規諌稱為知己然卒為所波及後子祖籌為安慶守上章白状詔復原官准致仕宋冢宰纁纁號栗亭商邱人嘉靖己未進士歴官吏部尚書是時銓部之權久歸内閣纁風節自持矯矯有為惜未竟其施陳郎中璋璋字公獻光州人七嵗舉竒童弱冠登第孝友貞介官司冦郎所在有功績緣不阿時相未䝉顯陟著述甚富王世貞李攀龍等甚服之有星湖漫稿葆光堂别集陳氏世範太平事畧行於世王侍郎教教字庸之祥符人嘉靖二年進士及第授編修甞三為㑹試考官衡鑒精明為時所稱累遷國子監祭酒上薛文清瑄從祀議㑹慎簡宫僚以祭酒兼右春坊右諭徳而祭酒兼春坊自教始後遷南兵部侍郎卒有文集若干卷梁給事問孟問孟新鄉人嘉靖乙丑進士歴兵科都給事中事荘皇特䟽改折本色種馬撫寧夏收孛逆兵柄引河開田嵗獲儲四萬石捐貲建學宫號房贈副都御史蘇教授時霔時霔號仁軒汲縣人醇謹著聲以明經教授開封士服其教文風為之大振靳滋昻滋昻尉氏人字昻昻别號笨伯尚書於中長子工書弱冠辭廪餼買大騩山薙茅築舍起仙岩别墅居焉後遇流賊交訌四方投居者存活以萬計昻清心味道著有黄庭心印諸解獨撰龍沙一線一卷世咸崇為𤣥門直指夀七十三書訣辭曰泰山頽兮吾安所適隂陽疣贅死機元活我將棲遲天地為宅端坐黙黙如平常属纊體柔不僵人咸異為尸解云張光祿同徳同徳河南人任工科給事中萬厯二十三年論定國公徐文璧以代祭加銜太師革職為民冡宰張問達總憲鄒元標題覆贈光祿少卿李侍郎若星若星息縣人兵部侍郎死難貴州費光祿必具必具河南人南禮科給事中萬厯二十四年因申救耿隨龍落職張問達等題贈光祿少卿張㕘政尚明尚明字湛若太康人萬厯己丑進士官陜西㕘政官評輿論稱之鄉人為立剛方正直碑呉侍郎阿衡阿衡裕州人萬厯己未進士廵按浙江大振紀綱貪吏歛跡歴官兵部侍郎總督薊遼以失墻子路殉難死王㕘議則古則古字維則禹州人萬厯癸丑進士為兵部主事力薦馬世龍為遼将當道疾之中以察典起工部主事調兵部時魏璫專政指東林為邪黨則古從趙南星遊株連削奪璫敗起南禮部主事歴員外郎中冀北㕘議余知府若南若南號郁六汲縣人乙卯舉人刑部員外遷龍安知府有政績喬尚書允升允升字吉甫孟津人萬厯壬辰進士累官刑部尚書崇禎初魏璫一案允升甄别雖首輔不少假詞臣文震孟經筵進講引允升為喻曰以道事君在廷大臣惟喬允升為無愧焉汪侍郎煇煇號柱河嵩縣人萬厯辛丑進士以庶吉士累官禮部侍郎㑹魏璫生祠徧天下有欲得煇文記其事者不可即日削奪歸里璫敗詔起原官呉布政三樂三樂洛陽人進士由庶吉士歴湖廣四川提學山西左布政序何文定瑭集能發明其記李靖宗延宗延字景喆汝陽人進士授御史同御史李本固給事費必興建册立東宫削籍歸光宗即位特召大理寺卿晉吏部尚書諡靖王知縣士俊士俊祥符人崇禎辛未進士官知縣壬午闖冦圍汴决黄河灌城士俊見水入勢不能支遂墜樓投水死子繼之妻與母又繼之汴人稱其行誼惜之周尚書士樸士樸字纉唐商丘人以進士歴諌議官至工部尚書常抗論内監李實忤魏忠賢又折幸璫張彛憲不肯與共坐最后以争駙馬齊賛元事侃侃天子之前挂冠去彭御史鯤化鯤化字飛仲汝陽人進士為御史魏璫煽虐吏部郎蘇繼歐忤璫下獄鯤化餉之削籍歸劉苑馬濟濟缺人官至苑馬司少卿英宗時以廬墓旌表趙御史時中時中缺人官至監察御史英宗時以廬墓旌表張㕘政文佐文佐缺人官至布政司㕘政英宗時以廬墓旌表續補姬知府敏敏孟津人通儒書明律筭徳行純備節操過人洪武中以材幹舉授西安知府于知府潜潜字彦昭鄢陵人少倜儻有志操永樂初為建昌知府性亷介不避權勢待吏卒甚嚴撫黎庶以恩不踰年政平訟理百廢俱興郡人懐之元吏部本本武陟人父子英仕元為河陽尹本至正間進士除邠州判官攝褒城安塞三縣尹俱有治績洪武初有司以明經舉授懐慶府學教授遷察言司令史官至吏部郎中致仕樊布政鎮鎮考城人賦性剛直博通經史洪武中登進士第授監察御史振揚風紀有能聲歴官山西右布政使所至㢘幹勤敏大得時譽安參政徳徳汝州人幼警敏涉獵經史習詞賦舉元進士隠居授徒洪武初郡守舉為州學訓導兵燹之餘家無藏書徳手錄以授生徒後以明經徴起入對稱善擢湖廣左㕘政髙大理敏敏安陽人由太學生擢禮科給事中處事公正官至大理寺左少卿張侍郎春春許州人才器淵宏洪武中由國子生推刑部郎中陞都察院右僉都御史永樂中入為户部右侍郎郎知府敏敏濟源人洪武初以國子生授御史擢饒州知府樂平有詣闕妄愬大姓千餘謀逆者詔統兵捕之敏自往察視耕牧如常兼得愬者以假貸不得怨諸大姓故重誣之奏聞詔釋之乃誅妄愬者凌知縣文質文質固始人洪武間知趙城縣重建縣治學校功成而民不擾劉尚書逵逵項城人性寡黙善書翰家世以忠孝相承鄉邦稱之洪武間以人材舉薦累官至刑部尚書劉長史醇醇祥符人能詩善屬文洪武末以儒士起家累官周府長史致仕年九十餘號菊先生有菊集若干卷武㕘議友諒友諒偃師人少貧有才行敏於問學洪武中以賢士舉授湖廣左㕘議解都御史敏敏陽武人性剛勁務學明敏以古人自期洪武中進士積官浙江按察使政聲著聞超拜右都御史趙尚書好徳好徳字秉􅃔汝陽人博學多才器宇宏敞有志民事洪武初以儒士扈從車駕渡江授陜州同知尋遷安慶知府召為吏部尚書改陜西行中書省㕘知政事趙尚書瑁瑁宜陽人喜讀書博學洽聞洪武間由儒士任河南府學訓導陞廣東瓊州知府再遷吏部尚書夏尚書恕恕洛陽人謙和有智畧居鄉閭以徳行稱洪武間由賢良舉累官刑部尚書宋布政賓賓洛陽人性剛直遇事果决洪武間為太學生才能為衆所推授清紀郎遷真定知府為政有方吏民信服秩滿陞陜西右布政使宋副使文文祥符人性資醇厚學行兼備洪武中河南㕘政鄭居貞以隠士薦送京師授山西按察司副使在任㢘能著稱風紀肅然華布政士瞻士瞻偃師人性淳篤節操堅確洪武初以賢士舉授湖廣布政使尚布政廸迪獲嘉人儀度殊常才識越人洪武中由太學生歴官刑部郎中永樂中陞四川左布政使孟布政禎禎息縣人聰敏力學處事知大體洪武中以儒士舉累官四川左布政使岳布政岫岫宻縣人嗜學博通經史容貌魁偉氣岸卓越洪武中以人材舉累官至雲南右布政使石侍郎璞與四卷石璞異璞字仲玊陜州人好讀書不事華靡以吟咏自娯樂洪武間以儒士薦授教職後陞户部侍郎元知府亮亮湯隂人永樂進士景泰初知襄陽府誠心涖政深知民隠亷而不苛寛而有制十縣之民感恩懐徳從容樽俎㕔事寂然焦布政宏宏字克明葉縣人永樂進士累官户部待郎為御史時甞按貴州平反疑獄全活者數百人及為布政小民咸被其澤弟寛亦舉進士歴官㕘政刁知府鵬鵬祥符人永樂中知荆州府賦性耿介立志清苦涖任九年門無私謁囊無贏帛凡所設施調度卓有條理且勞來安集政教大行軍民稱頌曹知州銘銘新野人以進士授香河知縣上䟽建言宋儒胡瑗等八人皆有功道學當從祀孔子廟廷上賜允行之尋陞儋州知州卒祀鄉賢祠曹府尹庭訓庭訓靈寳人性資聰敏處事果决鄉里曲直悉求判正洪武間以人材薦授應天府尹名指揮義義祥符人永樂八年征迤北有功陞都指揮使侯布政軏軏安陽人登永樂乙未進士拜監察御史有能聲歴遷福建按察司副使復陞四川左布政使政績著聞逺知府志志遂平人永樂中以刑部員外調同知永昌府事明習政典决事如流勢豪斂避夏知府忠忠字思誠睢州人宣徳初累知大名府忠厚㢘平修學勵俗吏士承之不威而化焉宣徳五年抗䟽歸岳知府濬濬字文玉祥符人宣徳進士歴任湖州府知府博學善辭令襟懐宏廓民樂其寛婁都御史良良字至善河南人正統進士授刑部主事己巳從駕北狩酋帥脅以刃辭色益厲帥重其節釋之歴官右副都御史凍知縣泰泰睢州人正統間知利津縣亷明仁恕振士風革吏弊百姓懐服至今稱為能吏戴布政珙珙字廷璧河南澠池人景泰甲戌進士任御史天順三年按治真定存心忠厚斷獄詳明吏民至今懐仰歴布政使鄧主事存徳存徳新鄭人成化進士任刑部主事有右善世道堅盗賣度牒存徳鞫實治罪尚書董方芘之欲緩其事存徳奏聞方上言存徳率意妄為遂詔存徳道堅俱下獄存徳降調道堅釋放給事中雷澤等上言當宥存徳而罪道堅不報隂主事盈盈字克復汝陽人𢎞治己未進士正徳初任知縣臨政威嚴聽訟明决强横屏跡善良安業凡賞罰期㑹信義勿爽下車未及半載陞主事去闕知府清清河南人𢎞治舉人知平涼府天性純孝為政務本愛民髙光祿尚賢尚賢字大賔鈞州人正徳庚午鄉試第一丁丑進士累官山東提學僉事以身為教士習翕然向風遷光祿少卿子㨗都御史拱大學士商同知賔賔洛陽人以吏科給事中改知銅陵䟽請聽民開墾荒田民無不業者任滿民請留進府同知仍知縣事任都御史洛洛字仲伊鈞州人進士正徳初知桐鄉明敏公㢘吏民敬愛之居三年以憂去行装蕭然後遷監察御史歴都御史察同知童童陳州人正徳中貢士任朝城知縣志稱其才具通敏政多善舉遷府同知樊僉事鵬鵬字少南信陽人嘉靖丙戌進士官至按察僉事常師何仲黙為詩文有聲稱所著有樊氏集十卷秋知縣逢慶逢慶河南汝寧人舉人嘉靖三十年任遂寧知縣嚴於馭吏門禁肅然孟府尹淮淮字豫川祥符人嘉靖戊戌進士歴官都御史廵撫山西改應天府尹性抗直忤時歸素好詩歌有入蜀稿戴副使冠冠字仲鶡號䆳谷信陽州人正徳戊辰進士户部主事言事謫驛丞清修自勵簡靜以居素位而行累無怨尤歴山東提學副使師事何大復仲黙有時名其詩聲調宏邁語意勁峭慷慨激烈有古國士風擬入無傳韓政睢州人東平侯見吾學編開國異姓諸侯傳楊本中牟人鎮撫見吾學編遜國臣記劉原弼字良輔扶溝人官主事楊應龍杞縣人教授王資杞縣人指揮劉伸杞縣人金有聲河南人侍郎以上五人俱遜國樊鵬字士南信陽人陸柬字道函大梁人李蓘字子由内鄉人弟䕃見叙天中記李宗木字繼仁蓘之父有杏缺集王三善永城人號彭伯丁魁楚字光三永城人熊緯字子文號南坡光山人李時春光州人熊驂固始人劉堉光山人國初創法劉可法商城人執法而清范守已缺人有郁龍子集田維庸缺人郎中常自裕鄢陵人給事中李汝華字茂夫睢州人諡恭敏李孟暘字時雍睢州人尚書周寧睢州人王慕祥字承休睢州人孔貞字道原杞縣人大理秦夢熊杞縣人萬厯甲午舉人為户部郎中督餉寧武殉難䘏贈太常寺少卿練國事字任鴻永城人司馬葉廷桂字青來商丘人司馬袁可立字禮卿睢州人司馬劉淮睢州人㕘政薛蕙字君采籍亳州偃師人所著有約言五經雜說劉逴字石孔鄢陵人中州人物考卷八
