body:
  text: 中州人物考傳記𩔖三總録之屬提要臣等謹案中州人物考八卷國朝孫奇逢撰奇逢字啟泰一字鍾元容城人前明萬厯庚子舉人入國朝年八十餘乃卒是編乃其移居河南蘇門山時所作備載中州人物分為七科一理學二經濟三忠節四清直五方正六武功七隠逸而文士不與焉盖意在黜華藻勵實行也所録皆明人惟忠節之末附元蔡子英一人人各為𫝊贊多者連數紙少或僅一行云無徵者則不詳不以詳略為褒貶也後一卷曰補遺曰續補不復以七科標目盖不欲入之七科中故托詞于補續云爾然猶與七科一例雖布衣亦以公稱最後有名無𫝊者三十四人則直書其名矣其贊恕于常人而責備于賢者頗為不茍惟張玉𫝊贊最為紕繆考玉以元樞宻知院叛而歸明而奇逢以為善擇主是唐六臣奉璽歸梁皆善擇主也玉後輔佐燕王稱兵犯順歿于鐵鉉濟南之戰而奇逢以為得死所是李日月助李希烈隕身鋒鏑亦得死所也且蔡子英義不忘元間闗出塞卒歸故主奇逢既列之忠節而復奨玉之叛亂不自相矛盾乎至薛瑄本河津人李夢陽本慶陽人牽合歸之中州又其末節矣奇逢雖以布衣終而當時實負重望湯斌至北面稱弟子其所論著頗為世所𫝊誦非他郡邑𫝊記無足輕重者比故存其書而具論之俾讀是編者知其瑕瑜不相掩焉乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7748ed7d8e13ec1c82fa280b8f560405da57aa1147d92765f62a5cc67e5846b4
