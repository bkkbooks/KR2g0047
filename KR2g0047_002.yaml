body:
  text: 中州人物考卷二容城孫竒逢撰經濟開尚書濟濟字來學洛陽人以明經舉為府學訓導歷國子助教與胡丞相善以疾罷歸訓徒里中洪武十四年御史安然薦濟有治才召試刑部尚書未幾為真嘗奏令司置考功圖日書所行事稽核勤怠上喜賜第甚宏麗曰有司以此為式十五年謂濟曰秀才今徴致數千人宜嚴試受職濟等條議一經明行修一工習文辭一通曉四書一人品俊秀一言有條理一曉達治道六科備者為上三科已上為中三科已下為下一科不通者不在擢中上從之濟敏慧有才辨凡國家經制田賦徭訟工役河渠事衆莫能裁定得濟一算畫即有條理品式可為世守得上信任益奮勵效職他部事輒兼理人忌其才高又見上每召與議事謗言遂起竟暴卒野史氏曰經果明矣行果修矣不能工習文辭通曉四書曉達治道而言無條理此必非明經修行之士人品俊秀天賦之質不可強也餘五科實乃同源深造自得當自不滯于一隅耳宋尚書禮禮字大本永寧人也父彬知儀隴縣有惠政禮以明經充貢補國子生是時諸生以才能選者皆待以不次洪武中授禮山西按察僉事持法嚴峻鋤奸剔蠧無少貸文皇即位纍擢工部尚書九年二月命禮開濬㑹通河㑹通者即元之故河也初元都燕漕運江南糧有海道由蘇州太倉至直沽入京歲約三百餘萬石然風濤不測損失頗多又自東平州安民山開河北至臨清引汶絶濟直屬衛河建閘以節蓄泄名曰㑹通河當是時河道初開岸狹水淺不能負重載每歲不過運數十萬石不若海運之多也故終元之世海運不罷國初㑹通河故道猶在洪武二十四年河决原武漫過安山湖而㑹通河遂淤自是南運不通舟楫而立陸路遞運所往來者悉由德州入河永樂初改立運法自海運者踵元人之舊由直沽達京自河運者由江入淮由淮至陽武山西河南丁夫陸運至衛輝入河舟運至京而海險陸費耗財溺舟不可勝紀至是濟寧州同知潘叔正上言舊運河四百五十餘里其淤塞者三之一浚而通之非惟山東之民免遞運之勞實國家無窮之利從之遂命禮及刑部侍郎金純都督周長發山東六郡丁夫十餘萬以復故道禮乃築壩于汶上之戴村橫亘五里遏汶勿東流令盡出于南旺分為二水四分南流以接徐沛六分北流以達臨清又相地勢高下增修水閘以時啓閉自分水至臨清地降九十尺為閘十有七而達于漳御南至沽頭地降百十有六尺為閘二十有一而達于淮自是河成而平江伯瑄亦疏鑿維揚一帶南北遂通矣禮等還京上嘉勞賜寶鏹二百錠文繡二襲其分董役者爵賞有差十四年營建北京命禮取材川蜀又六年卒于官𢎞治間大學士李東陽經㑹通河有尚書宋公富經略世上但識陳恭襄之句人始知禮之功若此於是主事王寵上疏以祠祀請上允之建祀于南旺以金純周長配野史氏曰公治河之功最大然一用同知潘叔正䇿一用侍郎張信圖䇿一用御史許堪䇿真能集衆思廣衆益相與以有成者乎彼剛愎者自賢自智未有不敗乃公事者趙尚書羾羾字雲翰祥符人也其父自邢臺遷汴元季兵亂羾方在襁褓抱匿林莽間卒遇虎置于地虎熟視而去稍長英偉多才善屬文洪武二十年舉于鄉入為國子生又三年兵部主事命核天下兵馬諸路屯戍補其缺而增其所宜置具圖以進太祖以其能升員外郎尋升浙江右參政文皇嗣位命使交趾宣揚德意酋長欵服歸以金寶竒貨餽之一無所受使還升刑部右侍郎尋改工部再改禮部未幾升本部尚書賜宴於華蓋殿羾辭免文皇面諭曰卿國家大臣輔佐有道無辭也命撤御筵饌羞以遺其母士林榮之永樂六年敕建仁孝皇后山陵初文皇擇吉壤久不得乃遣羾相之羾又薦江西人廖均卿與之偕至昌平遍閲諸山得縣東黃土山最吉文皇即日臨視定議封為天壽山命武義伯王通董役授均卿官賜羾寶鏹文綺十年復命羾督開隆慶保定永寧諸州縣撫安新集之民十五年改兵部尚書明年丁內艱起復專理塞外兵政二十年上北征羾給饋餉不絶昭皇嗣位復改刑部宣德間以疾乞致仕歸年七十三卒所著有傖父集子愚舉賢良方正仕終邱縣知縣劉知州綱綱字文紀鈞州人也洪武三十三年舉進士初授府谷知縣治行卓異擢寧州知州寧在邊鄙民夷雜居號稱難治綱至墾田助耕教以樹畜暇則聚士授經崇奬節義不拘拘于簿書期㑹之間一郡翕然化之無何以母喪免郡中吏民數百人詣闕乞留詔勉起後數年復以父憂去郡人又上疏請許之綱在寧三十二年凡經訊鞫者靡不悅服囹圄幾虛民不忍犯嘗署臬司事不旬日釋寃獄者數十人仁宗朝特賜璽書并四品服以褒異每入覲上臨軒問勞且給酒饌時人榮之正統改元年七十屢請始得歸歸之日攀送者哭聲振野郡舊有祠祀良刺史狄仁傑而下六人至是增綱榜曰七君子祠云王都御史彰彰字文昭鄭州人也洪武二十年舉于鄉明年補國子生使山東平糴以益軍儲同行者受賄慢事彰數讓之不從竟坐敗彰遂以此知名擢為吏科源士踰年革源士改給事中再升刑部員外郎升都給事中執法嚴明人不敢干以私居未幾出補山西左參政永樂改元召為禮部右侍郎以憂歸服闋改户部命祀西嶽還上疏言陕州及新安民有鬻子女償負租者遂下詔蠲負租官為贖所鬻子女十一年彰改都察院右副都御史從上北狩時母年八十特命歸省且諭之曰君子居官不忘親居家不忘君凡所過民之安否吏之賢不肖汝宜用意咨訪歸悉以聞既還奏上嘉悅升右都御史十九年春有誣衊周藩不法者復命巡撫河南以察之以二御史從行彰至跡其事無有乃上疏辨且曰臣以百口保王無它上疑乃釋是歲河南大水民多流亡而長吏不恤遂奏黜其貪剋者九百餘人罷不急之徴十餘事詔復流移幾五萬家發廪賑貸賴全活者不可勝紀先是賊張大聚亡命嵳峨山行劫商賈為之不通妖尼宋繼善與其徒數百人煽衆作亂彰悉捕斬之事寧省母母具食頃有丐者至母以餕與之明日至府御史以餕獻即丐者也其伺察之密類如此昭皇嗣位彰進資政大夫推恩封贈三代如其官宣德初或言邊備不謹命彰按問自山海以至居庸還奏各關指揮而下擅離所守之地若干人上令械至訊鞫仍命兵部三月一遣御史給事中㸃視遂著為令明年四月彰以疾卒上賜棺且命兵部給舟車歸其喪有司營治葬域彰性至孝以父早世事母甚謹在京師所得四方珍味必遣人馳獻然後敢嘗所入俸祿必分其族人嚴于家訓子弟有違禮者必痛責之俟其改悟乃已朱睦㮮曰余聞王震澤云鄭州公為人恂恂而謙恭莊重至于臨法雖親故不貸善伺察當按河南時嘗令其屬為微行郡縣吏有奸狀者輒置以重辟人情震讋嗚呼今安得若人而一洗濁穢之風乎安中丞然然者祥符人也元季為山東行省左丞守萊州大軍下山東然率衆歸附洪武元年授起居注轉給事中尋擢山東行省參政明年召還為工部尚書五年除河南行省參政時蔡河壅塞自開封抵陳州漕為之不通然督工疏導不踰月漕成八年春河决開封大黃寺堤百餘丈命然復集民夫三萬人塞之九年改行省為布政使司擢然浙江布政使十二年復召為御史臺右大夫再改左中丞夏五月癸巳坐事免官還未幾復召為四輔官每論事賜坐多所禆益十四年八月卒年五十有八芮知縣翀翀字子翔郾城人也洪武二十七年進士擢崑山知縣首擯祗候諸蠧治者舊有催租勾軍官校久事邑中籍官屋為牢禁里甲輩多淹滯死翀上章論劾上屬御史李嶽究治械送京師凡二百餘輩邑中晏然永樂元年坐事謫遵化治鐵老人王榮率衆伏闕懇請詔遣乘傳還任後奏除事故包荒年租十八萬有竒復以澤潦請開蘇松淤塞二十里許上遣户部尚書夏原吉太常少卿袁復臨視翀復陳疏新塞舊之策原吉多采用五年翀以母憂去未幾陕西按察僉事馬祥薦翀才堪理劇吏部言崑山固劇邑翀素得民俾還舊治徒之又九年以父憂去翀為人雅正寬平務存大體略近名赦小過故治績甚多莫可指數仕至監察御史張都指揮信信字彥實輔從兄也洪武二十二年舉鄉試第一永樂初拜禮科給事中尋遷刑科都給事中九年擢工部右侍郎㑹河决壞民田廬上遣信來視信乃繪圖馳奏曰臣訪得祥符魚王口至中灤二十餘里有舊河岸與今河面平浚而通之俾循故道則水勢可殺詔從之發河南民夫十萬相度濬治工竣信還京時昭皇監國遣人勞視居頃之浙江守臣奏江塘潮决昭皇復使信往治不數月修築如故洪熙初轉兵部左侍郎賜賚金綺甚腆輔以信為同族奏乞改授武階于是調懷逺將軍錦衣衛指揮同知尋擢昭勇將軍本衛指揮使宣德改元都督蔡福叛交趾命信帥兵往勦事寧擢四川都指揮僉事未幾進驃騎將軍都指揮使在蜀十五年紀律嚴整羌夷莫之敢犯正統十年六月卒于官年七十一歲上賜祭仍命有司歸葬祥符縣東之白塔原許侍郎廓廓字文超許州襄城人洪武三十二年鄉舉永樂五年授錦衣衛經歷未幾遷工科給事中復遷鴻臚寺丞十年以薦拜工部右侍郎十二年文皇北征廓督餉明年營建北京廓提督神木厰工竣特賜宴勞時交趾已入職方户口田賦未有定額遣廓往理及還條奏數事上皆嘉納昭皇即位進左侍郎宣德五年河南民饑流徙者甚衆命廓拊循上親制詩送之曰河南百州縣七郡所分治前歲農事缺始旱潦復繼衣食既無資民生曷由遂顧豫位民上日夕懷憂慮爾有敦厚資其往勤撫字徙者必綏輯饑者必賑濟咨詢必周歷毋憚躬勞勩虛文徒碎瑣所至見實惠勉旃罄乃誠庶用副豫意廓至旌廉黜貪榜示有司勿得復有科擾凡夫匠雜役及諸采辦積逋租物悉奏免于是復業者數萬戶廓還上褒賚備至六年行在兵部尚書張本卒以廓代之本嚴厲詳察廓承其後濟之以寬人心大悅年五十六卒魏副使清清鈞州人性資明敏識見過人洪武中以國子生拜監察御史能聲藉藉尋升四川按察使副使永樂宣德中歷升山東山西所至有亷能幹濟之譽邱經歷鳳鳯字鳴岐河南新安人世居方山故號方山少就文無害補臬司吏於案牘中得陳天台先生名跡遂自為師法為開府掌書記得洪武正韻見字下注古人善跡者日籍記之某辨當落職以百金賂公求隂解公却不受又辭某開府銀牌不領驛票滿役當赴京故事以狀乞路費公獨不為狀某憲使贈金亦不受於是一鄉稱為邱清吏入京辦虞衡歲例千金勿染也歸省二親色養最善墾田有弟田蕪怨分磠也公即易之弟田又蕪又易之歲時以文公家禮修祀事終養十年銓獻縣丞蒞官愈清謹一僕一衾外無長物署任邱篆又署文河供應勿濫愛民如子不取民間一錢陳司徒瓉每語人曰邱丞我師也有先達贈以詩曰門掩苔花依舊貧千載清亷第一人而馬院特揭銓部為佐二中清官第一亡何超擢南京龍驤衛經歷將謀歸養郡守陳公遺俸五金促之行再拜使者而却其餽陳嘆曰昔溫公每嘆劉祕丞不受冬褥云于光不受况他乎乃今見邱丞矣抵南京但閉户彈琴讀書既考績封父母如其官遂仍歸方山焉公好讀書如大學中庸禮記論語尤加意而小學中如汪信民咬菜根諸葛淡泊明志諸條尤亹亹不置居常以輕負人輕怒人輕談人過為日省每念性氣動處恨學力不實又以朱墨二圈記别理欲念起分數大抵公坦然醇龎無異山叟而修潔名行體認名理有士君子所難而公易之者公嘗遇江中大盜公徐告之曰我邱某也盜驚曰此邱清吏也鞫䩯而去海內名公過多式其廬而尤西川孟雲浦兩先生尤見重焉公沒邑人公舉祀鄉賢而雲浦先生又特與尤西川並祀于川上書屋周御史濟濟字大亨洛陽人也永樂十二年薦于鄉歷事都察院先是蠡縣豪民毆殺人賂同行者坐一老人屬濟訊有疑居二日得豪民奸狀濟以此知名除江西都司斷事正統初擢監察御史明年鎮守大同太監郭敬以儧橫聞敕一御史往詗不得復以濟往乃微行代負芻者入其宅盡得敬隂事上竒之命按四川時威州土官董敏王允仇殺纍年不解濟令人賫榜宣諭允讀榜沉思久之書囮字于榜尾令持還衆不解濟曰囮鳥之媒也意謂榜而殺之耳復釋此意示以誠信允大驚即以馬數十令子弟入貢敏亦愧服踰年安慶告饑廷臣薦濟出守濟設法賑救所活不啻萬計後卒于官六縣吏民為之罷市巷哭執紼至洛者數十人邱布政陵陵字志髙蘭陽人也宣德四年舉鄉試第一明年授咸陽教諭遷平鄉知縣凡所施設不憚勞苦有漳水暴悍衝决數為民害地卑且無城郭陵築城又築長堤數十里以障水民得播種堤上復植雜樹以固基土木之變民恃以無恐故至今目其堤曰邱公堤云山西歲饑流民入境陵拊循之給以閒田使食其力民歸之者千餘户先是廟學傾圯陵撤而新之又為諸生嚴立課程時加考閲其後偉者則别館之日給薪米膏燭以朂其能邑之鄉社十二亦各立學擇師以教之于是絃誦之聲達乎閭里在邑數年百廢皆舉值家艱歸民攀留不得乃預計服闋之日詣闕請復任從之又數年景皇即位以廷臣薦擢淮安知府天順四年陵入覲以政績卓異特賜錦衣寶鏹仍命張宴禮部以示褒勸纍擢山西左布政使成化初李秉為吏部尚書執法不阿學士彭華從子求京秩不得憾秉嗾同鄉給事中蕭彥莊誣劾陵坐逮乃上疏奏辨事白彥莊免官陵亦致仕後二十年平鄉百姓思之為立碑出資相事者如市淮民亦追念相率設主于名賢祠歲時致祭焉又採諸善政民謡撰遺惠集刻於郡中陵性清約未嘗有姬妾之奉好讀書老而不倦所著有嬰教聲律二十卷藝菴集二十卷藏于家子輅山西布政司左參政羅副都綺綺字尚絅磁州人也宣德五年進士授監察御史遷大理少卿刑部左侍郎使北庭還時松潘蠻叛董卜韓胡都指揮克羅俄監粲攻下雜谷奪其安撫司印土豪王永陷關堡殺人取貨都御史寇深不能治上降璽書命綺代之綺雄偉有謀能斷出竒取撻十不失一開示恩信臨以兵威木期克羅俄監粲悔過獻印擒永族之松潘皆山嶻嶪羅立番得利即奔岩洞匿木箐深不可測餉道出兩山間絶艱險民負載僦五致一羣番伺隙出輒掠去綺曰不大威之不懲招募材武得禪師智中國師綽領牌頭尤弄柯皆豪健各令統兵夜銜枚分道搗賊巢綺亦介胄從之火且攻破擈爬諸寨擒劇賊卓勞阿兒十餘人戮之綺志在招降自是破剔體面一切以簡易為治與接以酒歡番人畏慕終綺任不敢叛後召還改副都御史佐理院事時忠國公亨太監吉祥恃翊戴功竊弄威福綺諷使十三道御史劾之給事中王鉉潜詣以告亨等訴于上以綺主之坐謫參政無何竟以是罷歸綺博學多識能屬文然少繩檢既還磁滏水西作緑野堂號煮詩道上與鄉民王俊不相能俊如京告綺怨望前在松潘受番人金暨器具詔奪綺官籍其家朱睦㮮曰松潘古蠻夷之地漢武時始通中國至我明悉歸版籍矣然夷情諼詐叛服靡常羅公治松潘崇簡易明恩威待以不疑故夷人畏服至今蜀士猶頌其功云夫以羅公之智數能服逺夷而不能免于羣小之口詩曰讒人罔極可不畏哉李文達賢賢字原德鄧州人生有異質讀書目數行下宣德七年舉鄉試第一明年登進士使山西時河東薛瑄以御史在告賢往造叩質所疑瑄亟稱其英悟淳確非流輩可及正統元年授吏部主事歷升郎中十四年秋睿皇北狩扈從官多預其難賢瀕死而還景皇即位上正本十䇿凡數千言上嘉納亡何給事中李侃等言賢忠實宜賜覽納上命翰林繕寫置左右九月北警窺伺詔廷臣議備邊䇿賢請備戰車及火鎗若衛青之武剛車可以禦敵命將臣採行之十月擢兵部右侍郎癸酉額森殺其主併吞諸部落遣使入貢廷議撫和賢奏彼欲無厭不宜終徇宜奮勇勵武臣以挫長驅之勢振中國之威少保于謙謂此言誠為正請下其章以勵邊臣甲戌改吏部右侍郎擇君鑒録中善可為法者二十二君各擇最切要三四事集為鍳古録以上上納之丁丑英宗即位命兼翰林學士直內閣參典機務衆議謂賢宜入閣石亨聞之密謂賢曰請子入閣賢即固辭曰不可亨言于上曰吏部尚書王翺老矣賢其代之賢曰朝廷不可無老成人翺雖老精力未衰以賢輔之可也從衆論命入閣尋進吏部尚書兼學士廷試㑹試中式舉人命賢代草問䇿因石亨招權納賄文武諸臣多出其門奔競成風不知禮義廉恥為何物乃以求賢安民為問止奔競敦士習山東大饑發內帑三萬金賑濟有司奏不敷閣臣徐有貞欲止之賢勸上從其奏上增銀四萬兩全活數十萬石亨擅令守關官軍放歸賢與薛瑄徐有貞言于上别選兵以戍石亨銜之給事中王鉉等劾都御史耿九疇阿附有貞及賢主使御史排陷石亨逮賢與九疇有貞于獄謫賢福建參政謫二日上謂王翺曰李賢在朕前未嘗有妄言今與有貞同謫于心不堪命翺留賢為吏部侍郎石亨聞之愕然愧恧已而復吏部尚書兼學士直閣辦事上知石亨張軏勢太盛故親信賢凡左右薦人必召問其可否嘗曰先生有文書整理每日當來總兵官非有宣召不許擅入上遣行人聘江西處士吳與弼至上問賢曰與弼如何對曰與弼儒者之高蹈自古聖帝明王莫不好賢下士徴聘隱逸實陛下盛舉戊寅皇太子出閣讀書命賢定擬講讀等官令其時常照視上念建庶人無辜淹禁將五六十年一日諭其意賢對曰陛下此一念天地鬼神實臨之太祖在天之靈實臨之堯舜存心不過如此建庶人出居鳯陽悲喜交集人心感服曹吉祥石亨等大干政賢勸上人君之權不可下移惟在獨斷其私既不行趨附者亦漸少宦官蔣冕讒間後宫賢力請逺絶之己卯亨誅上一日論迎駕奪門之功賢曰迎駕則可奪門二字豈可示後况景泰不諱陛下宜復位何必奪門假使景泰左右先知此事亨輩何足惜不審置陛下于何地彼時亦有邀臣與其謀者臣不從以臣愚見景泰不起陛下復位安用如此勞擾雖欲升賞以誰為功老成耆舊依然在職豈有殺戮降黜之事上以為然庚辰賢奏以迎駕冒報升職許令自首免罪改正四千餘人天下大水田盡淹沒賢乞令户部行被灾州縣灾重者全免稍重免半輕者免三分甲申上不豫賢受顧命議處軍國重事憲宗即位上周貴妃子欲尊所生為太后賢以錢太后在宜遵遺詔正綱常為請內傳㫖以宣德自有例彭時復以此言爭之兩宫同尊為宜命賢草詔賢與時議曰正宫須例加二字不然無分别錢太后加慈懿而貴妃止稱皇太后同議懼忤㫖二公竟持此議頒詔天下尋加少保丙戌丁父憂詔奪情起復公乞終制不允命中使輔行襄事即促上道歸京師未幾感疾上遣使問疾賜尚食及命醫診視報疾狀無何卒于賜第上震悼輟視朝一日贈太師諡文達所著有古穰集三十卷續集二十卷行世野史氏曰文達得君之知作相之久據其言議其事既不違乎天理又不拂乎人情可謂通達治體者矣惜也奪情一事相業不光羅倫詣私宅告以不可始以其言為然乃不能引决及倫抗疏極論遂落職則過矣後王翺引文彥博留唐介故事請賢留倫又曰潞公市恩歸怨朝廷吾則不敢則尤過矣總之休休有容未免遜古一介臣耳此豈小失也神廟時江陵才相復蹈此轍沈懋學之上書與羅倫之抗疏可稱明朝二嶽焦御史寬寬字仲容南陽人正統九年由進士知崇德縣事蒞政明敏撫綏有方首興學校齊堂學舍葺理一新公餘詣學與諸生講論經史每給油燭資其夜誦至于橋梁壇社廨宇罔不葺修歷任六載以考最擢湖廣道監察御史劉文靖健健字希賢洛陽人父亮華州司訓母白氏感異夢而生健骨相瓌偉稍長嗜學無間晝夜嘗與閻禹錫論學禹錫改容禮之謂人曰伊洛淵源且有人矣天順四年進士授編修成化甲午進修撰升春坊丁酉進左庶子丙午升少詹事凡三任皆職輔導丁未孝宗録輔導功升禮部右侍郎兼學士入內閣參預機務戊申改元𢎞治知經筵事辛亥進禮部尚書文淵閣大學士尋加少師兼太子太師自戊午以來孝廟御極已十餘年益明習機務勵精求治而健亦身任天下事凡進用大臣及政事臧否反覆侃侃竭忠悃上未嘗不嘉納也健又引李東陽謝遷入同輔政上數御文華殿及平臺召健等至則屏左右俾莫得聞但聞上數數稱善而已乙丑上寢疾召健等至大內進御榻前執手歔欷令太子侍立具言軍國重事命健等悉心匡輔健等皆泣受命莫能仰視詳載祕史武宗即位健以顧命大臣翼新政舉故事百度振肅海內晏然屬逆瑾竊柄奸黨盤據國事日非健率同官自劾上奏其略曰陛下即位之初詔書一下天下延頸想望太平而朝令夕改迄無寧日非唯廢格不行抑且變易殆盡建言者以為多言幹事者以為生事纍章執奏則謂之煩擾查革舊弊則謂之紛更憂在于民生國計則若罔聞知事涉于近幸貴戚則牢不可破以一二人之私恩壞百年之定制而不顧以一二人之邪說破滿朝之公論而不恤臣等叨居重地徒擁虛銜或㫖從中出略不預聞或有所擬議經行改易似此之類不能備舉不報健又率同官上奏政令十失極其剴切上付各該衙門查奏革之未幾户部尚書韓文首倡九卿共劾劉瑾太監王嶽范亨徐智共為內應健等助之獨焦芳媚瑾以健不附已力攻健希入閣致上震怒傳㫖捕嶽等繫獄令劉瑾入司禮監瑾等先嘗奏內閣納賄行私欺壓內官軍職形于劇戲上已信之至是遂令健與謝遷自陳致仕又榜示天下指為朋黨矯詔奪其官肅皇嗣位詢謀遺老意欲召用而健年已九十矣乃降詔存問明年遣撫臣就其第致束帛餼羊上尊酒終時壽九十四贈太師諡文靖野史氏曰健之論列所關朝政國體如詔遣中官于武當山設像修醮因健等上疏已之詔建寺塔於朝陽門外因健等上疏罷之又罷撰真人杜永祺誥命及封號凡浮圖異端蠧財惑衆一切擯不得逞直曰我祖宗相傳以治天下堯舜周孔之道而已庶幾乎古之大臣以道事君者與至上問李夢陽言事若何輒對曰此狂妄小人耳亦未免失言其不為同鄉徇情靣亦當另有說如事在當從而必不從以示公則偏亦甚矣祁奚舉子未嘗有咎其私者春秋責備賢者之意馬端肅文升升字負圖鈞州人生而頴異七歲讀書日記數百言性介特寡言笑不尚華侈舉止嚴重修髯偉貌望之知為異人景泰二年舉進士授監察御史巡按晉楚所至有聲升福建按察使乙酉擢南大理卿尋巡撫陜西時反賊滿四甫平土達有反側之意文升親詣固原檢其戶數諭以生生之樂釋其驚疑衆皆叩頭俯伏曰誓不敢為亂遂奏給衣糧農具選丁壯千名隨軍皆樂從效死以報修茶政易畨馬八千餘以給士卒賑鞏昌臨洮饑民撫安流移績甚著擢陜西總制兵務陳時政十事及禦邊三䇿甲午岷州番人叛率兵勦平之乙未擢兵部侍郎丙申八月滿達勒竒木嘉色稜犯宣府甚急命文升整飭遼東邊備九月抵邊遍歷險要繕城堡利兵甲練軍士選精壯敵知有備不復來犯丁酉二月詔回京上邊務十五事戊戌邊警敕文升復整飭遼東邊務時太監汪直熖方熾謂往撫可邀大功欲同往僉言彼既有使入貢却又屠其家今若之何或言宜以大官酬之文升曰官不足以釋忿且宋以李繼遷為京官遂至西夏之患尋傳㫖著兵部侍郎馬文升大通事詹升前去撫安已而奄人王英來謂喻汪意欲請與俱文升謝絶之即行汪深以為恨文升至撫順諭以朝廷意各衛酋長纍纍皆至以牛布給慰之復加飭備以待反側比文升至開原果數路入冦伏兵發斬首二百餘級生獲數十人及馬器仗無算邊人且感且懼遣其長入京事遂平己亥遼撫陳鉞至京原賂權璫汪直奏邊人皆以文升禁不與農器交易故屢冦邊誣其妄興邊釁激變敵人命定西侯蔣琬刑部尚書林聰同直往勘比至二人憚直竟勘如直言執文升下獄謫戌四川重慶衛癸卯奄直罪罷都御史李裕等疏文升寃始復官致仕尋命巡撫遼東丙午召為兵部尚書貴州都勻黑芮弗靖守臣倚內援請發雲南川廣兵勦之文升持不可奏差郎中御史各一員往勘果無他虞忌者營內㫖調南兵部戊申孝廟御極召為右都御史掌院事提督十二團營上在東宫知文升名感殊遇益自奮勵知無不言上特倚重因水灾天鼓鳴地震具奏正心謹始以隆繼述以弭灾變言極剴切復請選老成淳謹之士以資啓沃不宜雜以浮薄之流恐虧盛德上嘉納之文升留心邊計奏處甘凉兵馬糧糯以備外患北人和碩詭計日深乞命大臣總制大同宣府偏頭關及延綏便宜設防以星變乞致仕不允尋晉少𫝊火篩入河套文升乞命朱暉等練兵以待且令各邊謹斥堠修戰具既而火篩引去改吏部尚書各王府蕩制踰規疏選輔導以全宗室奉上靣諭計察天下官員汰去不職者三千餘員正德改元太監王瑞以大婚禮欲用儒士七人篆刻番字文升不從瑞慚憤誣奏抗拒賴諸大臣力辨得白屢乞致仕章疏二十上乃允賜璽書褒之卒年八十五贈太傅諡端肅所著有西征石城東安東國興復哈密三記及奏議若干卷野史氏曰經濟亦難言矣真理學方有實經濟夫子志在東周孟子欲以齊王聖人原以濟世為心曲儒不能用世借獨善以藏拙遂有厭薄功名狹小事業之念愚謂真儒自有實用投之事則事辦投之節則節見庶足以祛腐儒曲學之陋端肅事功不可泯而立朝風裁正不可及李恭靖敏敏字公勉襄城人也景泰五年進士授監察御史明習律法有名稱嘗按畿內力革宿弊以運餉薊州者必由海口多遭覆溺敏建議别鑿三河直抵薊州以避海道軍民便之成化初升浙江按察使尋以憂去讀禮之暇屏居紫雲山中生徒雲從簦笈至不能容於是遂建書院取程朱許薛四子之書立為條約乃日與諸生講習勵勉期在躬行故久之襄許之間彬彬然多德藝之士服闋改湖廣轉山西布政使拜都察院左副都御史先是巡撫大同邊人俟守墩軍下取水輒肆戕害敏至伏擒之自是不敢犯又上禦戎數事進兵部右侍郎已而卧病為言者所論遂乞歸久之起為右副都御史巡撫保定改總督漕運召為户部尚書遇事不避有貴戚怙勢者乞畿內入官隙地已有㫖許敏執奏而止其餘建白亦多中事理上甚重之復以疾乞歸特命官屬一人護行卒于內黃年六十七贈太子少保諡恭靖許襄毅進附子文簡讃恭襄論進字季升靈寶人成化丙戌進士授御史出按甘肅岷州土人利番人貨潜相結姻遂因為冦進相險要設橋塞分兵防守諭令罷婚邊乃寧按山東參政某役閘夫修華陽宫為燕逰所費又巨進劾罷之革濟寧諸閘濫役夫三千餘人究治貪吏豪徒餘望風奔息還京掌三法司事巡按遼東御史强珍劾幸閹汪直妄殺邊人冒賞兵部阿附奏行直誣訴珍下詔獄進抗疏伸珍擊直珍竟戍遼陽進奪俸數月道士以黃白術干湖總兵李經不售誣首經潜招叛軍為亂直奏逮李氏百口至京已成獄憲皇恐寃之改命法官讞衆皆惴避進發道士奸即日磔于市晉山東按察使監秋試有欲私貴臣子者進堅執不可東昌武人兒懷金與所厚生飲肆中是夜被殺且無首官坐生罪已誣服進察生不類凶人私計必酒人所為貧人得銀必易物遍閲市肆酒人正以所得銀易布一訊而得生得釋晉僉都御史巡撫大同小王子欲窺邊先以馬千匹入貢進請帑金二萬兩浹恩而飭備計遂沮庚戌冦入塞列營三十里號六萬進因事發謀馬行繫帚于尾塵翳障天烽火連日夜比解去不亡一鏃云劾奏鎮守中官石巗貪暴反被擠左官兖州知府甲寅晉陜西按察使乙卯甘凉邊患孔棘大臣往治勿任以進為僉都御史巡撫甘肅初文皇招降哈密封托克托為忠順王捍禦番戎後與吐魯番為仇謀殺哈密都督占據城阻塞諸番貢路哈密遺夷羈住嘉峪邊患幾二紀進曰以夷攻夷古云良䇿遣辨士說齊勤罕東諸番宣布朝廷威德厚撫嘉峪遺夷俱願效死進以總兵彭清將兵七千出嘉峪關調諸番為聲援入二千里攻哈密故城克斬吐魯畨數百級番首伊稜夜遁獲脅從者八百人總兵劉寧欲盡戮之為竒功進曰此即吾赤子綏輯是務豈計攻伐邪令𨽻遺夷給牛種耕器吐蕃與夷其勢孤西域遂定進副都御史詔巡撫陜西太監劉琅恃援恣橫進數禁之一日同舟進責其惡琅不遜進奮拳擊之墮琅水中丁巳召為户部侍郎太原周文端公為司徒協合大釐朝政不便者上章諌爭裁抑后戚田業命勘河間戚氏莊田抗疏言實皆民間地令照舊管業不得行令兼僉都提調宣大軍事貴臣子弟從軍幸功者不樂造飛語降㫖師老事拗勒令致仕自後羣臣薦章凡四十有八武皇即位起兵部左侍郎明年始詣闕進尚書疏勸武皇敏學止遊師古仁聖君而戒彼荒淫者一京衛官以賄來求公堂杖數十權要請託輒報罷晉吏部尚書已加太子少保進直聲久著風裁日峻御史某滿三考及部郎某某者奧援必覬京秩悉外補郎中某賂閹馬永成乃斥守黎平郎中李達忤太宰出守夷方乃改杭郡工侍某同里閈託奄營求改吏部進對衆語之曰君年尚未老秩亦不卑不為不貴乃託斯人速化乎逆瑾銜進日甚而輔臣畏其沮格所私積怒叢讒瑾謂進越選法矯㫖令致仕又摘進推薦雍泰為謬削爵為民二子在翰林者調外任庚午八月卒于家年七十四九月瑾伏誅詔致仕已遣官營葬贈太子太保嘉靖五年席文襄覆議諡襄毅子八人詩舉人誥另有傳讃論附後讃襄毅公第三子在吏部時上懲邊患未寧責在巡撫大臣專恣罪在言官各令讃考察讃乃參稽輿論擇巡撫脂韋骩法及苞苴自私者擬斥十餘人其科道素乖風紀并建白無聞冗牘可厭者擬黜調二十餘人擠棄及言事傷激遭變者前後薦起十餘人如南科給事中曽筠等以其資深敢言不次叙升其甄别流品南北各定所宜除目一下人人稱平方面以上或以儀通問監舉謁選或經營美缺必當衆發其私竟抑壓示懲每大計吏治雖慿考語猶跡行履若官常守素為上官所刺必留之有心險詐干清議雖考無貶辭不曲貸甲辰春考察外官有一二巧宦竊虛稱擬欲黜之都院不從讃指而言曰今為公等留此人異日害人誤國陷善類雖悔無及果如其言讃歷官五十餘年晚荷隆遇翼翼小心以不欺不怠為主子孫祇嚴訓閉門息囂無敢以私入僕從穿短衣如農家裝士大夫羡其家法平生寡欲年七十猶作細楷閲經史典籍老而不倦所著有松臯集續集諸史私論五經臆說諸曹奏議卒七十六贈少師諡文簡論襄毅公第八子初奉使餉榆林邊士氣勃勃自負直將長驅沙漠封狼居胥在禮部奉詔進九邊圖論世宗嘉納之㑹邊事起南京交薦論材可備緩急㑹推京兆撫臣署居次上曰是嘗上圖論者遂進僉都撫薊州上備邊十二事士氣一新白通事進犯黃崖口襲殺守備大掠而去論督將士設伏出竒斬白通事及首級四十捷聞進右副都御史以勞致疾請告歸庚戌復大入薄郊關廷臣薦論可屬大事上覆閲圖論驗其早見亟召論分宜故不可羇闕下踰年得命出撫山西夷人犯柞子塢不得入乃伺大同龍鬚墩集精鋭邀擊之夷挫復入親援桴鼓護軍血戰以捷聞進兵部右侍郎雲中兵亂殺副將檄至申令誓師吾將世受國恩直將奉不肖之驅以徇爾曹超距之日久矣寧避疆場而就市曹意懇辭嚴亡不人人感奮妖民吕鶴引冦入犯决策擒鶴斬之獻馘者四十餘黨旋馬西向既敗之紫塞八角堡追襲俘馘百七十有竒詔進兵部尚書廕一子世襲錦衣千戶諳達大舉四十萬冦山西分部發兵遣輕騎搗其穴據險設伏夜出鋭師破其營諳達死傷分崩不可勝紀已復犯龍門火石嶺勒標兵尾擊之至響水鋪出其不意令死士持刀斧乘夜斫營所觸糜爛俘馘者五百三十詔加太子太保再廕一子世襲正千戶上益多其伐召入為兵部尚書上平倭九事主眷雖隆功多招忌憾者日索瘢摘瑕遂罷丙寅冬十月自理喪具端坐而終年七十二論故于文事優率以用武顯終始邦政身繫邊圉安危者三十餘年以首功計者二萬三千降者二千酋長旗纛車馬器杖以鹵獲計者三萬五百修築邊墻以里計者四千墩堡以座計者三千人言襄毅之有恭襄猶絳侯之有條侯驃姚之有冠軍也穆考即位詔復故秩諡恭襄諭祭九壇遣中書劉天衢營葬野史氏曰許氏一門何多竒也豫髫年知靈寶許氏一門三尚書如僅以三尚書為竒則古今尚書多矣或湮沒無聞或穢汚遺臭者豈少哉襄毅父子貞忠徑節同德同心生平受逆奄直瑾輩之屈折挫辱者不知凡幾而節愈峻骨愈徑也險亦常危亦安故功成而學著經濟學術忠節公以一堂兼備之迥乎不可及矣公嘗讓雍泰已官語人曰吾西望有二髙一為華山一為雍世隆耳吾服公之推賢張尚書泰泰字世亨祥符人成化戊戌進士初令鄒縣政尚仁恕六載績聞召補省臺適罹內外艱服闋拜陜西道御史兼河東鹽課有勢要撓法為奸上疏劾去之嗣按蘇江憲度峻整豪强斂跡轉陕西按察司副使踰四年轉按察使尋轉布政老成練達士論歸之未幾擢右副都御史巡撫陜西陕西之地宦遊最久熟知利病乃掇軍民困苦者十餘事嚴列條約刋布郡邑踰年改大理寺卿時逆瑾用事以剛直觸忤免歸瑾誅復起為刑部左侍郎開府固原總制三邊軍務感上知遇拜命即行至鎮則選易將官振厲士氣一新攻守之具疏凡百數十上皆見嘉納奏捷者十有二璽書褒奬盡心籌邊寢食靡寧竟以勞瘁成疾亟上疏乞骸歸命未下而卒得年六十有一訃聞賜葬祭贈太子少保刑部尚書子照以功廕錦衣千戶泰沉毅有大略平生不立崕岸與人交坦直無僞善飲酒多而不亂三邊將士猶有能道其經略之蹟者野史氏曰公到處有實政至經略三邊疏百數十上奏捷者十有二贈廕葬祭恩禮隆備厥功偉矣雖未覩其謨烈之全而鞠躬盡瘁死而後已猶令人深企慕之思李參政景繁景繁字邦泰儀封人也幼而好學器度不羣治朱氏詩成化五年舉進士授陕西三原知縣三原多大商鬻販淮揚間資纍數萬每婚喪費千金景繁禁之使如制逋民歸者復其田廬死者給以棺居數年稍遷太僕寺丞改工部營繕主事二十三年遷虞衡員外郎尋轉都水郎中管漕河時漕塞自淮入儀真凡三百里舟膠不行有詔命都御史暨郎中治景繁獨任之募夫八萬人初濬邵伯湖橋子橋三汊河廣皆六尺次濬廣陵驛東廣倍于三汊次濬朴樹灣廣三倍於初次濬儀真瓜州二壩廣倍于朴樹者三深于舊者各五景繁行瓜州堤上見東南多沮洳區問土人此何所也曰江潮之匯也景繁導之自古劄港入劉家灣入漕渠曰今漕渠非得巨流濟之舟終不可行值江潮時開壩閘恣江北走已即塞之天復大雨漕事成矣土人曰河亢而江下非壩障之則河水悉倒流入江漕渠益淺都御史而下咸謂李䇿非善景繁曰江水故平潮至則悍激耳潮退水亦易制也遂下令有司具土暨石潮至大决壩閘江水奔漕水聲洶洶如雷景繁乃塞壩閲數日㑹大雨漕渠水瀰瀰襄岸舟乃大行河經徐州蕩州將嚙居人震恐景繁又作石堤河不能為害𢎞治六年遷山西右參議理儲景繁行塞上十年而餉運不缺擢四川右參政以疾乞致仕歸李知州愚愚字克明蘭陽人也弱冠舉於鄉授澧州知州以禮讓喻俗不規規于簿書期㑹之間一郡盡化之成化七年茅岡宣慰等土夷乘劉千金之亂出沒剽掠每過州境戒戢儕類勿有所犯其感革強暴類此州俗女子年踰三十始嫁愚檄屬邑俱宜依期婚娶其貧不能舉亦宜設法資資一歲完聚者二千餘家巡撫都御史吳琛聞之以束帛勞異罹外艱歸服闋改知晉州值歲凶愚賑饑恤匱不遺餘力是年大水復至愚乃上疏其略曰今陛下致治之道至矣救灾之法密矣而水旱屢見者何也或者宫人未節而天意有在于此未可知也臣聞男子生而願為之有室女子生而願為之有家一有拂鬱則憤悶之氣必干天和昔一婦含寃三年不雨矧多于此者乎考之春秋傳曰大水者隂氣盛也若今歲雨水為害或以隂氣使然耳嘗觀唐史太宗因旱出宫女三千人我朝英宗皇帝即位之初亦出宫女三百七十人此其驗也伏望陛下援古人已行之蹟酌今日時制之宜稽察宫女年貌老弱量為酌减務使在內在外人人得所則隂陽氣和神人胥悅而天變可回水旱自弭是陛下大造之仁遍浹海內國家太平之福亦永保無疆矣疏入純皇震怒逮繫京師已而感悟詔釋愚出宫女五百餘人愚既還職益自振勵㑹妖賊桑冲作亂愚以計擒之上嘉其能特令榜諭後數年致仕歸子鉉內黃知縣愚卒六十餘年提學副使朱大器始祀于鄉賢祠喬參議縉縉字廷儀洛陽人也少頴敏學士薛瑄見而竒之授以毛詩及太極西銘諸書成化八年登進士尋以家艱歸服闋授都水司主事督理山東泉原初漕由魚臺至臨清得洸汶泗沂四水其地復有泉百七十餘道㑹于四水而分流于漕渠為閘凡三十有六設守津吏以司啓閉為淺二百二十各有津老以時疏治然歲遠法弛諸泉湮塞或為豪宦侵匿漕運屢屢告艱縉行郡得湮塞泉四百有竒侵匿泉二百有竒合六百餘泉㑹于四水漕運大濟工部以績奏改兵部職方又二年遷員外郎𢎞治四年出補四川布政司參議時馬湖府知府安鰲殺叙南衛千戶曹明奏檄數下鰲賂當路獄久不具縉至一訊即服未幾貴州苗蠻叛焚掠州縣命都御史鄧廷瓉帥三省兵討之以縉督餉苗誅有文綺寶鏹之賜久之縉不調仍坐治泉之故縉知有怨者遂上疏乞歸年七十二卒所著性理解惑河南郡志及族譜若干卷高知府鑑鑑字克明太康人也曾大父智官革除間為副千戶永樂初謫戍信陽子孫遂家焉鑑年十一時與羣兒戲釣于學宫池上曰我釣鰲亦如此爾指揮劉宗異之舉于提學副使陳選收為弟子員成化十一年舉進士授武選主事時崇王請置守備汝寧大司馬以信陽已置守備而汝寧重置難之集司屬議鑑進曰事不難移信陽守備置汝寧俾兼視信陽則事攝而官可不重置大司馬喜曰主事議便于是常引與計事稱之曰我益友也鑑仕宦既聞時有所憤切乃言事忤中貴人中貴人注其名屏上卒以他事逮之調鎮遠府通判在鎮逺為都御史錢鉞所重時咨以邊務洞夷有相讐者使鑑輯之不服鑑乃夜徙居他山虛設供帳故所遲明往卧榻已碎鑑從容束帶出帳前議和事夷覘而神之盡服𢎞治改元移山東青州明年遷鎮江同知嘗署郡事㑹日本使臣過以詩獻鑑和答立就使臣俯首嘆伏曰中國詩人也亡何自鎮江遷䕫州知府致仕歸年六十七卒鑑善談辨曉音律有鐵溪集若干卷野史氏曰公以忤璫被逮而謫直矣然作事妙有機權直而不板胡僉事瀛瀛字孟登羅山人也成化十一年進士明敏亷介初授浙江餘姚知縣是時日本夷來朝騷動鄰邑瀛備之堅益市瓦器實魚菜餅糗至即人與之數器夷得飽殊歡已輒就道縣得無擾歲饑盡發廪以賑猶勿給乃節量溫飽令饑民傭食其家多所全活因奏免田租已賜之半復為請諸折所勿免者又許之時監儲督折銀急甚瀛弗徴坐罰俸又勿徴其明年秋成始下令民輸去年折銀皆競入且曰勿復纍我侯也民爭燭湖水利積年不决至集衆逞兵瀛乃為塘分其湖水均其灌溉爭遂解息瀛去數年以憂去百姓思之為立碑紀德服闋改武進尋擢南京户部主事遷員外郎以忤權貴謫興國同知遷本州知州復遷浙江按察僉事瀛自度與時不合遂致仕歸其在武進興國皆有惠政歷三地吏民俱為樹碑建祠子止吕楠榜進士仕至監察御史李恭簡鉞附子御史惠鉞字䖍甫祥符人𢎞治丙辰進士授御史巡視中城權貴家有奸法者繩之不少貸理河東鹽政國課用饒改浙江道覆刷京畿文卷時羣閹竊柄濁亂國紀㑹疏劾之乞盡除去辭㫖抗直瑾惡之誣以他事罰米五百石輸邊尋轉鞏昌知府蒞政寬簡擢四川按察司副使值劇盜方四等嘯聚掠劫全蜀繹騷巡撫都御史林俊屬以督勦所向克捷斬首萬餘捷聞璽書奬勵賜金帛加俸一級擢陜西按察使持憲嚴明獄無停滯未幾遷超右僉都巡撫山西兼提督雁門等關自陕入晉道經河東父老羅拜曰我公來矣先是守臣侵漁邊儲士卒嗟怨至則釐革夙弊將士樂為之用丙子秋冦入宣府出白羊口南牧鉞度宣大擁重兵冦必不利移檄山西岢嵐五臺諸郡宜亟為之備果犯岢嵐密授之算斬首百五十級獲馬千餘匹上嘉其功賜璽書金帛再加俸一級時中官欲攘為已功改捷大同鉞不之辨而給事中潘塤為之不平乃倡言于朝士論益重之是歲山西有內冦武廷章等荼毒地方勒兵勦之旬日蕩平詔加俸如前鉞懇辭且請老溫㫖慰留丁丑擢兵部侍郎掌部事奉詔裁革武臣抑僥幸汰冒濫武選肅清嘉靖壬午復冦西陲號十萬飛檄告急遂以兵侍兼僉都行邊馳至固原敵勢方熾進薄城櫓時援兵未集乃下令大開諸營門敵疑有備不敢逼用火炮擊之遂引去詔總制三邊事務申明紀律增築墩堡廣儲蓄選壯勇軍聲大振冦復深入平凉涇州縱兵大掠人懷疑懼鉞曰此成擒耳密命遊擊將軍時臣周尚文等分伏要害斷其歸路我軍大捷斬首百八十級獲牛羊萬計諸將入賀鉞曰汝知賀寧知憂乎敵性狠鬭既失利必憤憤而復來延綏諸路宜有備果冦延綏復發兵􅌽擊之斬首百餘級或請以捷聞曰偶勝耳惡足為功鎮巡奏捷璽書嘉之進右都御史總督漕運未幾召還掌院旋拜兵部尚書侍經筵提督十二團營修明戎政凡邊報警急必審度事勢指示方略不求近功不徼小利尤注意邊將務在得人請謁無所容時部事叢委文移旁午皆手自裁削過勞疾作數乞骸骨遣使存問命馳驛還竟不起上輟朝追贈太子太保諡恭簡惠字德卿恭簡公鉞之子正德十二年進士授行人司行人值車駕南狩惠抗疏諫止上怒廷杖卒嘉靖初贈監察御史子辨以廕仕至姚安知府野史氏曰公初遭逆瑾之毒風采已著而到處立功事無棘手此經濟長才也至中貴攘功而不之辨延綏之捷曰偶勝耳惡足為功更見大臣德量子以諫死可稱亢宗蔡侍郎天祐天祐字承之睢州人𢎞治乙丑進士以庶吉士改吏科給事中蹇諤自持封駁無避忤權貴出為閩臬僉事㑹江西盜起朝議以閩兵協勦往平之轉山東憲副守遼陽按部所至弊絶風清值歲歉多方節縮活饑民萬餘又闢海道墟田數萬頃民奠其業名曰蔡公田濟南龍山惡少嘯聚為亂勢甚洶洶分兵勦之搗其穴淄川盜起劫掠鄉邑捕獲其魁坐以法餘黨悉散遷山西按察使雲中五堡軍亂殺撫臣事聞進右僉都御史即日就道至集亂軍諭以恩威衆始奮㑹桂總兵朱密率家衆誅亂者十餘人衆攻圍其家幾為所害冒白刃救之得解亷其首惡者四人正法餘孽度不自容夜焚朱總兵宅天祜下令懸賞示之火遂撲滅人心少定及督餉主事至羣心自危復起亂上震怒命胡侍郎帥兵討之衆赴天祜前泣求救乃示以早圖自獻或可逭誅衆皆嚮應獻元惡十餘人傳首以示脅從者宥之帖然無復反側天祜遂請班師詔下凱旋人心益安上優詔答之進右副都御史有彩幣白金之賜旋進兵部左侍郎行日民為罷市哭聲震野且送且留者三百餘里已而為權幸所忌以事中之懇求退避疏三上乃俞閉門以詩酒自娛教授生徒課子力學而憂國之心未嘗少忘再起至中途以疾辭荷溫㫖許暫回調理明年不起卒徐尚寶自得自得把縣人嘉靖辛丑進士為兵科時叛兵擁衆戕殺諾延扶餘三衛諸部內避乞給衣耕具乃上言諾延三衛夙稱崛强一旦遭破殘之慘既不敵于彼將必窺利于我挺而走險急何能擇勢固然耳迤北之性多强悍既飽而驕叨貪無厭且諾延既破撤我藩籬何所顧忌趦趄而不內犯哉冝申飭邊備繕墩廣偵以觀未萌之釁已而卑辭求貢覬緩我邊防以圖大舉廟謨將許之廷臣明知其詐而隂窺上指所嚮觀望莫敢發抗疏言勿許便疏入五日不報同列疑之命下則大見采納他日有以吏垣協理請者疏未及也特批曰徐某乃知上默識其名固將大用之矣河决曹縣防河使請開趙皮寨孫家渡以殺水勢特遣侍郎吳鵬都御史魯釣董其役上書極陳關係祖陵周藩至急乃不果開晉尚寶司少卿起家三紀立朝蒞官甫四年餘皆優遊泉石之日也至孝性生詩尚典鬯不騖纎靡文爾雅有則一洗鈎棘所著有苫中踏野二稿京華集京華續集大遊子樂府二冊藏於家劉尚書自強自強字體乾扶溝人嘉靖甲辰進士在文選時分宜子世蕃以鬻爵干請峻拒不納蕃深銜之亡何補陕西參議遷山西副使甫蒞任悍卒王慶率衆以夜畔城中大駭自強知慶有嬖妾選勇士伏旁舍待慶果來携拏輒斬其首以殉餘黨瓦解按察陕西苦旱城中無水自强相舍旁當有泉鑿之泉源涌出一郡饒給居人神之名曰劉公井遷湖廣布政民苦饑出羡金賑之所全活甚衆巡撫四川寇黃中負險猾驁奉敕㑹湖湘兵討之屬妖人蔡伯貫乘間嘯聚鹵掠郡縣勢張甚自强䇿曰黃中穴鼠耳直以泥丸封之伯貫出柙虎也可急擊勿失輒移師攻貫一鼓殱焉已回兵向中中大怖乃所據牛欄坪者險絶其中夜當道垂巨索屬鈴百餘徑卒更番守鈴索一動礧石交下人無得免者乃斬木百章為雲梯陽攻之微察山旁側有少罅督將士夜銜枚上鉦鼓並作呼聲震岩谷中賊黨戰栗莫知所出以為自天而下也不戰而潰捷聞賜文綺白金羊酒勞之歷戶兵刑三部尚書老成持大體無出其右者精敏果毅人不敢撓其法在南部時一尚書以事囑其𨽻人無狀怒曰贓吏敢爾耶起奮擊仆其𨽻人都人語云尚書贓輿臺僵矯矯劉公洵自强野史氏曰此生活得千人命安心不向世外走三公固方正之品而經世理務其才皆優雖未得盡展其藴皆足見一班矣故並傳之王襄毅邦瑞邦瑞字惟賢宜陽人正德年進士由庶吉士歷官兵部尚書識量𢎞逺視天下事無不可為應機立斷而張弛必中性喜觀史道及古今之務典禮法制兵賦沿革繁略之變歷歷如指掌其為文能發心所欲言初以材選儲禁林逮守三州歷遷藩督學政撫邊陲晉卿貮以至尚書為政雖和易坦直至于鈎校欺漏剜剟豪黠又不為一切恩貸如廣德之豪夏某滁州指揮徐某及涇陽之孽令張某者寧忤臺臣之意雖三反不為移判故所至肅然憚而去後則復見思自少倜儻負竒總丱為諸生屬山東盜起即上安勦十四事河南守唶曰異哉洛陽少年乃爾竒絶耶及兵備固原屬松石劉公視西師劉固偉人見則大加器重每事朝夕咨詢時涇邠巨盜李孟春等流劫河東西莫之攖也至則芟夷之無遺類民用大靖初以文行吏治有名其以武略顯自茲始逮撫寧夏益著寧夏介在河曲三隅逼寇烽火貫四時歲為常內治既嚴又能招攜叛黨刺彼中事甚悉每先事而備常乘間一入輒失利斬其部長而去不敢近塞者終在任之日西人語保障功多稱之故庚戌之變衆籍籍恃以為重云卒年六十有七贈少保諡襄毅子正國給事中以諌擢通政司參議野史氏曰公初以文吏稱而後以武略顯則文經武緯原非二事能于源頭處理㑹則天下事誠無一不可為髙文襄拱拱號中𤣥新鄭人資禀頴異多讀書能文章志在經世不沾沾以訓詁為也嘉靖辛丑進士由庶吉士擢禮部尚書丙寅與郭朴同入閣參預機務穆廟初御以拱舊為講官加恩太子太保具疏辭不允拱與徐華亭同在政府因人言開釁朝論遂多指摘拱稱病乞休疏屢上上恩禮有加拱終不出上知不可留乃報許命馳驛還鄉調治仍賜白金文綺遣行人護送己巳上念青宫恩以少師起入內閣出管吏部職業崇于中書體統尊於公孤儼然周宰漢相上矣拱凡有條奏皆䝉上褒嘉允行詔先帝時建言被遣者毋得概行恤録公言人臣歸過先帝反其所為以行已之私臆恐天下之人直以悖逆為當然願下閣臣議諭告天下以醒久迷之人心以開久塗之耳目疏入上曰大體斷自皇考諌者本屬有罪其他建言亦豈皆無罪者今乃不加甄别盡行恤録何以仰慰在天之靈覽卿奏具見忠悃諸陳乞并罷請與都察院同考京官上是之科道官素行不謹者九人浮􅏥淺露者八人才力不及者十人俱黜降如例壬申五月上疾大漸召拱及張居正髙儀至乾清宫受顧命囑託甚至蓋自孝廟顧託三臣之後僅再見也萬厯元年乞致仕許之萬厯六年卒于里命復其家豫祭葬諡文襄野史氏曰中𤣥居政府毁譽參焉說者曰初扼于華亭罷去無一人祖道者後江陵忌居其上故其私人多出力以擠之夫同在中書同寅協恭尚已撝謙自下不敢以才智先人其庶幾乎不然相傾相軋勢所必至况二公俱負才豫知者乎公于諸邊情形無不熟諳而洞悉之故邊人有事來請公輒為指示方略政府不諳邊務而邊人能立功于外者難矣周總制詠詠字思飬延津人嘉靖壬戌進士初授衛縣知縣下車數延見三老問所疾苦諸供億徵索度可已者已之否者釐正之務與民休息三載以特最擢監察御史獨持風紀臺綱倚以為重丙寅出按宣大條上備邊封事戊辰按山東尋典庚午試所取皆知名士丁內艱癸酉服除時江陵柄國欲詠按其鄉趣同僚勸駕詠故緩其行度後期乃至已竟不及其禍甲戌巡視京營清隱占汰羸弱勤訓練諸辨惴惴奉約束已從京畿刷卷風采益著乙亥擢大理寺丞丙子升左少卿丁丑推遼東巡撫至則稽屯田故籍益出贖鍰募民墾田一千四百餘頃躬歷諸要害築臺垣七十餘所而又為之廣積貯倍行糧一行旌旗壁壘皆變未幾拜少司馬加秩一等壬午進左都御史總督薊遼昌保諸邊事治薊門一如治遼法時有行邊使者以意氣加詠詠不為下且蜚語具狀劾詠他部將畏使者焦赫稍稍引避去詠念無可共功者嘆曰吾老矣願乞骸骨歸章再上得允卒於家中州人物考卷二
