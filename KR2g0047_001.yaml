body:
  text: 中州人物考卷一容城孫竒逢撰理學曹靖修端端字正夫澠池人永樂戊子舉于鄉學者稱為月川先生天資頴異造詣篤實教人務躬行實踐日事著述寒暑不輟坐下足兩磚處皆穿其專靜如此事父母最孝及遭喪五味不入口寢苫枕塊始終不易既葬廬墓六年不用浮屠巫覡嘗詣縣上書請毁淫祀年荒勸賑存活甚衆父好善信佛及聞端言聖賢之道即從之于是作夜行燭一書與父誦之其言曰佛氏以空為性非天命之性人受之中老子以虛為道非率性之道人由之路其言甚精為霍州學正十餘年士子皆服從其教郡人亦皆薰陶而化方嶽重職不敢以屬禮待至其郡必敬謁之凡考校諸庠生必請端主其去取後以憂去起復改蒲州學正再踰年端考績京師蒲諸生走詣闕爭留上以霍疏先上得允又六年竟終于霍一郡人罷市巷哭童子亦悲泣其德化感人如此後諡靖修有四書詳説太極圖通書西銘釋文孝經述解性理文集儒家宗統譜家規輯略存疑録等書薛文清贊曰質純氣清理明心定篤信好古距邪間正有德有言以淑後人美哉君子光輝日新正德中大司馬彭澤稱端為本朝理學之冠又舉從祀孔子廟庭野史氏曰月川倡理學于永宣之際以太極為立本而求至乎聖人之道以參天地惟此心而謂心非血氣兩言者濓洛遺旨也或但稱實學而不察其宗要亦未為定論嘗取濓溪作拙賦以見意因以拙巢名其讀書之室薛文清為之記新安孟化鯉又為月川祠記文集散失今止得其太極圖説解序可見其大端矣薛文清瑄瑄字德溫號敬軒原籍山西河津人祖仲義通經史值元亂教授鄉里不求仕進父貞洪武初領鄉薦為真定元氏教諭尋改鄢陵母齊氏夢紫衣人謁見而生瑄初誕肌膚如水晶瓶五臟皆見家人怪之欲不舉祖聞其啼聲曰非常兒也乃舉育之自幼書史過目輒成誦端重不為兒嬉年十二時元儒魏范諸公以御史謫戍父延與講論經史名理退謂人曰聖門有人矣結為小友不敢以師自居瑄自是厭科舉之學慨然有求道志精思力踐動必質諸書一有不合終夜反側不寐永樂己亥從父司教鄢陵時例乏科貢職教者充戍父慮之強瑄應河內鄉試遂中永樂庚子第一明年辛丑登進士第學士楊文貞士竒欲館之訓諸子瑄固辭居父喪服闋願就教職會宣廟思得良憲臣振勵風紀選擢雲南道御史出監湖廣銀場一日時相三楊欲識其靣令人要之晤瑄辭云職在糾劾無相見禮三楊嗟嘆焉手録性理大全晨夜誦讀潛思密玩值雪盈尺不輟有得秉燭疾書或通宵不寐正統改元初設提學憲臣吏部尚書郭公璡薦瑄提學山東瑄欣然就之曰此吾事也首以朱子白鹿洞學規開示學者每誨育生徒先力行而後文藝隨其才器成就之諸生感慕呼曰薛夫子時中官王振用事問三楊吾鄉誰可大用者皆薦瑄因召為大理寺右少卿尋轉左三楊以用瑄出振意欲瑄一見振瑄正色曰安有受爵公朝拜官私門耶一日會議東閣公卿見振皆拜一人獨立知為瑄也振連揖之自是銜瑄矣會有指揮某死振姪王山欲娶其妾其妻不可妾因誣妻毒殺其夫都察院問已誣服瑄為辨寃駁還至三都御史王文大怒承振風旨劾瑄受賄出人死請廷鞫振曰是固應死詔縛詣市殺之門人皆奔走哭瑄神色自若曰辨寃死亦何愧乎持周易讀不輟瑄將刑振有老僕大哭厨下振問之對曰聞今日薛夫子將刑故也振聞而意解有兵部侍郎王偉申救遂免瑄家居六年造詣益邃江陜弟子來學者百餘人洛陽閻禹錫徒步來學及别瑄送至里門告之曰以居敬窮理為要正統乙巳以給事程信等薦起為大理寺丞景泰初懇乞致仕學士江淵疏留之明年升南京大理寺卿守備中官興安袁誠時無抗禮者瑄至安謂人曰此與王振作對頭者何可屈耶午節饋扇瑄曰此朝廷禮不敢受又中官金英過南京公卿俱餞江上瑄獨不往英至京言于衆曰南京好官惟薛瑄耳御史劉孜薦瑄粹學飭躬進無所求退無所纍君子之儒不宜間逺乞召供館閣之職上曰內閣本朕簡任非人所得薦不允壬申秋召至京復為大理寺卿是嵗年近七十復乞致仕不允英廟復位以禮部右侍郎兼翰林院學士入內閣一日召入便殿上方燕服瑄不入俟上易服乃見時有矜迎復功者瑄曰許魯齋不陳伐宋謀凡事取必于智而不循天理之正非聖賢之學也尋命主考會試録首序以正學復性為言或請易曰平生所學惟此事竣轉左侍郎曹石用事遂引疾致仕石亨來視疾曰先生既不留願為先生請敕即家孰敷教且有以資飬瑄曰昔許魯齋去元世祖賜敕書為教魯齋懸之屋梁終不以示人若資其飬曷若不辭官耶亨嘆息而去居家八年四方學者從遊甚衆瑄隨其所寓圖書針規所在左右手不釋卷凡辭受取與必揆諸義一毫不茍晚年玩心髙明默契其妙有不言而悟者嘗為詩曰七十六年無一事此心惟覺性天通所著讀書録行于世河汾集藏于家忽遘疾衣冠危坐而逝時風雷大作白氣上升天順甲申六月十五日也年七十有六贈禮部尚書諡文清成化間國子監丞李紳𢎞治間兵科張九功俱請從祀隆慶辛未允議從祀孔廟野史氏曰文清之學端亮嚴峻俗士不敢入邪説不得亂居然一代之宗閻御史禹錫禹錫字子與洛陽人負氣自許不肯脂韋世俗亦不事邊幅與物無忤童時頴敏讀書日記萬言長博極羣書純孝九歲時哭其父幾至滅性正統甲子年十九舉于鄉明年授昌黎訓導丙寅以母喪徒步歸廬于墓終制有強暴見化白蟻出集之應有司以聞詔旌其閭既而聞河汾薛文清瑄講明濂洛關閩學遂謝舉業去洛從之遊得其大指而歸以考功員外郎紀振薦為開州訓導遂以其所得為教四方從者日衆學舍幾不能容州之民無少長皆化之曰無取閻先生所刺也稍涉不義即相誡曰毋令閻先生知之正身飭行望者消釋人以比司馬端明之在洛云天順丁丑時李賢王翺姚夔相繼薦為國子學正尋升監丞諸生之事干謁者悉不得行不遂者或以賈怨癸未謫徽州府經歷諸生詣闕奏留者至再甲申升南京國子監助教復轉監丞掌京衛武學事世祿子弟悉知讀書由禮登科甲者相望而中外擁貂蟬握虎符號為儒將者亦多出其門四典文衡尤號得人久之聲望愈隆超拜御史提督畿內學校禹錫慨然有造就人才之志勵名節敦士風抑詞章之習明本原之學取周子太極圖通書為士子講明之一時人士皆粗知性理又疏場屋數十弊陳之皆賜施行時論稱快焉世方仰其有為成化甲申無疾正衣冠而逝公卿大臣多惜之士子如失所怙恃宦遊三十年清苦蕭索如吳隱之每去任囊無一錢如劉寵死之日家計如黔婁其文武門人及故屬吏相與賻而殯之所著述甚富有自信集晦菴要語二程全集薛文清公讀書録河汾詩文司馬法吳子注解孫子選注武學詞範行于世野史氏曰邇來學人有言許平仲其宋之朱元晦乎薛文清其今之許平仲乎公從遊文清之門而正身飭行明習本原之學俾一時人士粗知性理此其所得之大旨可知已白太僕良輔良輔字堯佐洛陽人喜讀性理諸書景泰二年進士初請業河東薛瑄瑄不許良輔乃置十脡肉為贄跽于門日昃不返肉色變而良輔貌愈恭瑄以其誠遂延置弟子之列居歲餘卒受其業歸拜監察御史按治晉陽秦中俱有名迹遷太僕寺丞尋轉卿天順中卒于家所著有太極解律吕新書釋義中庸膚見若干卷當疾革以書授畢亨畢亨傳于洛其後言性學者多宗白氏方教諭泰泰字時盛新安人舉于鄉任邢臺縣教諭少讀書即知向道及長教授生徒喻以中庸奧旨慕薛文清瑄之為人著續讀書録三卷鄭瑾輩皆以理學出其門許莊敏誥誥字廷綸靈寶人襄毅公進次子生而岐嶷不羣十歲能屬文𢎞治乙卯與弟讃同舉于鄉己未成進士授户科給事中奉命清理延綏倉場有苖中官者督三邊貪縱罔法誥即劾其狀邊人懷之正德初以舊德遺老起父進為大司馬誥例宜避言路改翰林院檢討逆瑾欲納交誥與之絶瑾大怒矯詔黜進籍罰邊儲三百石竄誥廣西全州判官欲置之死歷險冒瘴與魑魅伍挺挺無戚容會奔父喪服除即絶意仕宦逖覽潛修受徒講道若將終身焉久之當路交薦以誥探賾研微見道淵邃可備顧問時有詔守正不阿為逆瑾所斥者録之起誥為尚寶丞復疏病還里居十餘年世廟改元復起南京通政司參議時講學者北稱函谷南稱陽明誥入南都咸就席問難輔臣薦誥宜充經幄改侍講學士為經筵講官上緝熙聖學四事一曰則圖書以明道原二曰主聖經以求道是三曰辨諸儒以祛道惑四曰屏雜説以防道害其于進講多所剴切古昔興衰治忽之際如指諸掌帝皆虛懷聽納益加眷注尋擢太常卿掌國子監祭酒事誥奬風節抑華競以經世為士筌尊德為學軌人士翕然化之太學生有遐方旅櫬者幾三十人誥購地葬之復賑衣食不給者數十人奏罷教職不稱者二人及劾勛戚習禮不律者一時成均肅然先是文殿左室列三教之師像帝欲從古易以木主誥以所著道統書上之帝悅即撤其舊像立皇帝王師八主南向周孔二主東西向命輔臣與誥九人瞻拜主前靣諭之曰朕奉先聖先師于此庶幾敬慕以遜志于學卿等其罔朕棄誥衍喜怒哀樂章入講帝謂誥欲以一人之情通天下之情所言良是尋擢吏部右侍郎時天下入計誥門户清肅人弗有私謁者乃具奏以戒諸司帝從之復上疏乞休帝不允擢南京户部尚書倉場經費多所裁省復上疏乞休帝以留都國計非誥不可不允會將入朝疾作卒年六十四贈太子太保諡莊敏學者稱為函谷先生誥天性孝友仁厚敦重人倫以身率世不數數于人惟以踐諸實行達之世務為學嘗曰聖賢所傳心法六籍所遺訓典要在用世綏人耳茍無益于時文將奚為所著有綱目前編圖書管見道統源流詩考易參春秋易見中庸本義太極論性學篇等書儀封王廷相論曰莊敏論太極曰氣理兼備不涉于無論性曰理氣渾全本無支離俱不可專以理言卓乎命世之見矣野史氏曰莊敏公立朝風裁難進易退便是聖門家法至其所學以踐諸實行達之世務為主尤為緊切真是有體有用余嘗謂學有共解有獨解言前人之言行前人之行衆聞而安之耳目不驚此共解也言前人之所未言行前人之所未行羣起而攻之翻駁成案此獨解也獨解非深造自得獨闢心靈未易言函谷與陽明並峙南北而陽明以紫陽忠臣犯大難公又欲問宋儒除去形氣要那神與性理何處安頓斯言出其不為曲儒之訾議也者幾希何文定瑭瑭字粹夫河內人𢎞治辛酉鄉試第一壬戌進士由庶吉士歷官禮部侍郎贈禮部尚書諡文定學者稱為柏齋先生生而端凝不事嬉戲人謂為癡兒七歲時入郡城見家有彌勒佛塑像乃抗言請去之人皆大駭十九以聖賢之學自勵嘗聞許文正薛文清一言一行或得其遺書則欣然忘寢食官庶吉士閣試克已復禮為仁論有曰仁者人也禮則人之元氣而已則見侵于風寒暑濕者也人能無為邪氣所勝則元氣復元氣復而其人成矣識者謂與伊川顔子所好何學論同逆瑾煽虐一日贈川扇于諸翰林有入而跪見者瑭獨長揖瑾怒不以贈受贈者復跪謝瑭正色曰何跪而又跪也瑾大怒詰其姓名前對曰修撰何瑭知必不為瑾所容乃纍疏致仕後瑾誅復原職以經筵觸犯忌諱謫同知開州修黃陵岡堤岸成晉東昌府同知即乞歸肅王嗣位起提學山西以父憂不果再起提學浙江敦本尚實士風丕變未幾晉南京太常少卿與湛甘泉郭杏東修明古大學之法學者翕然宗之歷工户禮三部侍郎晉掌南京都察院事竟不就是時南有王姚江北有許函谷皆以道學名于時瑭獨默如日事二親供菽水率子姪後進以修孝弟忠信非義一介必嚴兩執親喪皆哀毁瀕死數四若不能更生門人請梓文録曰聖賢之道昭在六籍如日星後學愧不能知而行之自宋以來儒者之論方苦太多此吾之所懼也家居十餘年薦二十餘疏嘉靖二十二年九月二十六日夜半有星隕于郡城西流光如書是夜疾革年七十歲有柏齋集十二卷行于世野史氏曰公生平不屈逆瑾進退有道以德行自負耻列文學科其詩不必法唐文不必法漢議論倣佛宋儒殆庶幾乎躬行君子也不事著述且不欲梓其文録謂自宋以來儒者之論方苦太多吾之所深懼也斯真見道之言與説者謂當以顔閔無所著作想像先王暗然自修絶去表暴為名之意此近裏著已之儒也周御史道道字大經號竹溪懷慶衛人師事何文定以嘉靖丙戌進士擢御史巡按宣大時大同逆璫成擒人情洶沸道請戮元惡餘罔治軍民帖然肖其像于太平樓祀之駕南狩選科四人扈從道與焉途次劾大將軍等甚為璫人所擠婁知縣樞樞字子靖號榖原懷慶衛人師事何文定嘉靖乙酉領鄉薦會朝紳議禮各樹幟不相下又議王陽明之學且為洛蜀黨樞著克伐怨欲四章為陸司成林少司成心折及授廣宗令劉撫軍籍民樞謂擾民上鄉兵議劉面從實心銜之適樊直指問安民去貪之略樞應以所令勿反所好作去甚論刺之樊大恨以事褫廣宗民肖像祀之劉副使涇涇字次山懷慶衛人嘉靖丁未進士由庶吉士改御史授太守歷鳯翔登州兩郡歷官憲副文定門人嘗刻其集能倡明師説于先生之學可稱入室野史氏曰周婁劉三君生同地學同師其實心任事亦同也文定學以躬行為主三君子可謂能守師説王布政尚絅尚絅字錦夫郟縣人生而頴異五歲讀孝經七歲日記數百言或謂曰子後當及第乃應之曰讀書寧止為榮進已耶自童稚時已立志為聖賢之學比長盡通五經諸子尤邃于三禮年十八以儒士舉于鄉壬戌成進士授兵曹有賢名調吏部歷稽勳驗封兩司值尚書張綵依阿逆瑾勢熖薰灼每有私屬輒以正對且反覆理諭綵不堪甚銜之不閲月綵坐瑾黨伏誅邃菴楊公為尚書絅議論亦多不合遂乞補外出為山西參政疏請侍飬家居十九年樂道安貧飬親教子于蒼山谷中築讀書臺飬粹迎虛隨意所適起四川參政不赴再起陜西以母命就道時陜西值邊警邃菴自冡宰歸即復起為總制三邊見絅喜曰吾今日乃知王錦夫也即以兵柄付之不閲月奏捷邃菴特疏以薦未幾聞母喪奔歸起復適歲大飢奏救荒十三事復除山西參政遷浙江右布政使巡按御史李佶以不行磬折之禮妄托論列絅曰御史為朝廷耳目之官乃怙勢凌人尚可仕乎遂棄官歸吏部奏李佶職在激揚論事不實王尚絅宜照舊供職乃復移檄起絅于家督促再三次年始入浙卒于官所著有蒼谷集十二卷行于世學者稱為蒼谷先生武進薛應旗曰蒼谷文追秦漢詩逼蘇李一時藝林咸稱作者然實非先生之所尚也先生平生每右兩程而左三蘇崇理學而鄙詞翰使假之以年當必有繼往聖而開來學者而世顧以功名事業期之又豈足以知先生哉野史氏曰當時推理學者必以公與何文定為首稱謂王浚川李空同何大復孟有涯諸公乃文章氣節之士夫文章何妨于理學而理學不專在文章如耽于文章則一文章士而已矣節義何妨于理學而理學亦不專在節義如耽于節義則亦一節義士而已矣公生平立節固其所長而文章非其所短終不肯以一節著者則學問之所得深矣知廉勇藝而文之以禮樂到文之之時豈復有知廉勇藝之可名夫子所云禮樂即夫子所云好學歟崔文敏銑銑字子鍾一字仲鳬安陽人也父升參政廉謹有聞母李淑人之娠也芝産門閾及月夢蛟龍寤而生銑啼聲洪亮風骨岐嶷見者異之十歲從父延安授四書毛詩明年從諸儒官講太極圖通周易𢎞治十一年舉于鄉入太學與三原秦偉馬理髙陵吕柟榆次冦天敘林慮馬卿同邑張士隆相友約明經修行毋慕髙虛毋泥訓詁其志毅然以洙泗為師十八年舉進士改庶吉士正德二年授翰林編修預校敬皇實録三年會試為同考宰執欲私其子以托銑銑不可宰執惡之會逆瑾竊政銑見瑾又不屈瑾怒謂其黨吏部尚書張茞曰翰林白面後生輕薄如崔銑尤甚欲重罪之茞不可是歲實録成瑾偽傳上旨詞臣未練政體各加俸一級調郡屬州縣銑改南京吏部主事五年瑾誅召還史職踰年會試再為同考時輔臣治文藝銑上書勸以及時悟主薦賢救民理財強兵無事瑣末懇懇千萬言九年掌廷試卷充經筵展書會講官有他故即代之明年御史王廷相下獄瀕死亟詣執政力救出之十一年經筵講説命啓上以擇相輔德納誨去讒頑戒逸豫時權幸錢寧廖鵬在側大銜之冬歷三考轉侍讀十二年春罷經筵引疾求去不許二月復為會試同考事竣懇請而歸是年作後渠書屋董耕授徒刪定二程遺書作郡志未幾罹母艱三年食粗異寢嘉靖即位輔臣諫官交薦起修武廟實録兼侍經筵進講論語開陳治本啓沃懇切擢南京國子祭酒諸生相顧曰吾輩得師矣銑開誠心崇正義明條教嚴祀事正文體奬雋彥警輕惰戒遊戲清廪餼革蠧耗日衣冠坐東堂諸生朝夕問難銑響答不倦周貧佚老問疾賻喪士林大悅三年議大禮銑抗疏勸上勤聖學辨忠邪以回天變自分必被逮已而報休銑曰天恩蕩覆見老親幸矣諸生愕然如失怙恃設帳為文贈曰忠孝兩全出處守正銑行不役一夫囊中無江南一物惟擕古書數篋耳公卿及諸生送者千餘人從而渡江者又千餘人羣拜澘然淚下銑乘醉登舟歌曰故園菽水知堪飬捷徑南山保未曽歸見父母愈愈如也日讀書洹上折衷羣言明年喪內不復娶四方學者雲集銑教以研經飭行曰道在五倫學在治心功在愼獨論學曰古之好異者以明志今之好異者以昧心夫正物之謂格至理之謂物今之異言也然則心當何功而至善有别名乎聖賢之道如日月五星然輒求異而不求其所循與否祇以抗名華世而已非昧其心與孟子曰良知良能心之用也愛敬性之實也本諸天故曰良今取以證其異刪良能而不挈非霸儒與論讀書曰讀經見諸行事因事驗其經旨是故卒至不駭可以即變矣邇言不狎可以出令矣小物克愼可以舉大矣僕婢服義可以使民矣日誦六經不力行則得其字爾五年罹父艱哀毁更甚既禫著松窗寤言中庸凡演大學全文又著士翼政議中説考文苑春秋十八年春立皇太子上愼選宫寮起銑詹事府少詹事兼翰林院侍講學士尋進南京禮部右侍郎署户部篆清耗釐弊無何入賀聖夀聖節部例公贐悉拒不受時有風霾之變銑自劾溫旨慰留冬過家疾作杜門調攝著讀易餘言已病劇不克南行議乞休未果遂卒年六十四贈禮部尚書諡文敏野史氏曰文敏端嚴抗爽言動有矩無世俗依阿態人擬之程正叔余過滏水張湛虗司馬亟稱其人與學余讀其集簡徑峭直意之所是不以人毁之而沮意之所非不以人譽之而寬殆所謂獨立不懼獨行不搖者與夫子不得中行而思狂狷正為其不隨流俗而孤行一意文敏其聖門之狂狷乎陸王學術具在天下後世文敏詆其為偽儒為霸儒不肯一語敷同不無已甚然亦各就所見而駁之于異處正好著眼第看果謬于聖人否殊不向毁譽場中定品格也王肅敏廷相廷相字子衡儀封人生而穎異十三歲補邑庠即以能古文詩賦名𢎞治壬戌登進士由庶吉士授兵科給事中官京師與大梁李夢陽信陽何景明武功康海東吳徐縉鄠杜王九思以古文相倡廷相尤究心國朝典章時政機宜聖學矩矱謫亳州判識薛蕙于稠人中親授以成其學尋知髙淳賜環晉御史按陜西時權閹廖鏜出鎮朘削無度廷相嚴禁裁抑之先是廷相督學北畿有權閹三王二劉者以賂干廷相引使者于庭焚其書至是鏜誣奏王劉協力相搆逮繫詔獄舉朝九卿及科道皆抗章論救已謫贑榆縣丞尋歷提學四川山東三督學政皆正學術嚴考校在蜀會何景明督學關陜共約為條教行之至今教人飬士之道尚遵為成規晉湖廣按察使數決疑獄平李見冦亂以山東布政居母憂著喪禮備纂成巡撫四川夷沙保向信猖獗三巴震撼廷相悉勦平晉兵部侍郎督修邊工清查騰驤邊腹宫府賴之晉南兵部尚書謂祖宗根本重地守備重權不宜久屬魏國專司請如各處文武官推代上嘉納之更置推代自廷相奏始召掌都察院事仍原職提督十二團營肅皇忽諭羣臣欲令太子監國以便頥養人心錯愕不知所出廷相奏太子春秋方幼知慮未普一旦御事恐事失分别且壅蔽將由此而生後雖覺無及疏入其事報罷尋加太子太保上將南幸承天廷相纍疏懇留上皆溫旨慰答即命廷相輔行掌軍務及行在兵部都察院事一日上問沿途勞費廷相以實對裁省甚多有玉帶廄馬之賜廷相位九列弟與子猶布衣所親嘗以為請曰以吾之竊厚祿而在髙位亦足庇弟與子矣彼學既無成強冒朝廷名器其將謂何與人處凡可濟人事無不為之而不自以為德至于一事許可必愼一介取與必謹好集書老不釋卷惟以身心體驗為自得凡有益國事有補聖學雖負天下之謗不恤肅廟初建稱親之議諸臣方如聚訟故相張文忠引廷相所嘗著論以證之而大禮尋定自世儒轉相傳襲為致良知之説或幾以禪定亂德乃力辨之謂嬰兒在胞中自能飲食出胞時方能視聽此天性之知神化之不容已者其餘因習而知因悟而知因過而知因疑而知皆人道之知也剖析甚明嘉靖中分宜秉政賄賂公行廷相應天變自陳疏言大臣法小臣亷語甚刺其守堅定不避權熖類如此所著有溝斷集臺史集近海集吳中稿華闕稿泉上稿家居集愼言雅集諸書共六十卷奏議公移歸田集共三十卷皆淵源乎道德性命而研精于禮樂規制卒年七十一隆慶初贈少保諡肅敏野史氏曰司馬君實范希文理學之宗也議者謂其功業太盛而不得與李延平胡叔心等同列浚川王子生平之學不篤守先哲以梏自得之識故語議煥發多出人意表而時論亦以文章氣節歸之夫文章氣節皆自學問中來烏可録其末而遺其本至謂周元公主靜而遺動謂孟子善是性而惡亦是性自謂不謬于尼山或亦自任之過也李舉人承恩承恩字君賜一字伯生祥符人也父母早喪祖父母鞠育之幼不為童戲八歲就孰師端愼如老成人弱冠入邑學為弟子員督學者優之俾聚講大梁書院正德十四年領鄉薦明年試禮部不第承恩乃罄囊買理學諸書以歸閉門潛玩時有新得見之著述辨析精當多先儒所未發謂聖人之微言莫大于經而穿鑿好異者失之于是著易大義詩大義書拾蔡學庸拾朱孟子説若干卷謂宋儒之言莫精于西銘定性書太極圖説顔子所好何學論于是各為之解以發其藴謂理不離隂陽不雜隂陽其不離中以不雜為體不雜中以不離為用鳶飛戾天魚躍于淵至矣哉著隂陽論百五十八條謂動靜者吾心也動靜之間吾心之至妙存焉何則動中有靜者德德者得也恐失之而復得也靜中有動者幾幾者微也雖至著而實微也乃畫心印圖謂大學格致之旨不明于天下徒使學者馳騁于超然遠覽之餘而不知即身世之近求之是故去道愈遠夫人之情感物而動或為好樂或為忿懥或為恐懼或為憂患或為畏敬或為哀矜有不得正者自我格之自我致之非他人所能預是謂之獨由是而愼之則天德可達王道可行矣著格物致知説謂往來順逆易之大旨原卦畫之初自乾至坤皆逆數也然乾兌離震繼之善也巽坎艮坤成之性也往者已然也數有次第之意第其已往不亦順乎來者將然也知有主宰之意宰其將來不亦逆乎下學之功知來逆也上達之妙數往順也數往者順後天而奉天時吉凶在天而不在我故曰鞠躬盡瘁死而後已成敗利鈍非吾所能逆覩也知來者逆先天而天弗違吉凶由我而不在天故曰思慮未起鬼神莫知不由乎我更由乎誰然必有知來之逆而後有數往之順故曰天且弗違而况于人乎况于鬼神乎著數往者順知來者逆説承恩平生著述甚富有河濵日録劄記存稿總若干卷方類編成集而承恩卒年四十九尤主事時熙時熙字季美洛陽人生而警敏嘉靖壬午領鄉薦計偕入京師時姚江傳習録始出時熙一見輒自省嘆曰道不在是耶自是深信潛體毅然以聖賢為己任常以不及師事文成為恨且曰學無師終不能有成于是受學于文成之門人劉時川尊信師門良知之説由學博遷國學正未幾升户部主事𣙜稅滸墅關一介不取尋以母老乞養里居三十年日以修德明道為事足未嘗詣公庭所居環堵諷詠自若郡守或以官地遺之謝不受後進有來學者輒喜動眉宇與之言終日不倦陜洛間聞其風擔簦而至者百數十人學者稱為西川先生嘗言能翻前人案始能得前人意若不得其意而務為紛更是妄也又曰講學是解縛之法有世俗縛有賢傳縛有聖經縛有師説縛有意見縛皆是名利做根解得此縛才是學此師門宗旨也後御史董定䇿薦時熙與曹端孟化鯉于朝曰古人以學為實今人以講學為名若臣鄉三賢皆務實者也所著有擬學小記聖諭衍行于世野史氏曰西川要語一編最喚醒人世以為傳陽明之學愚謂陽明之致知非陽明之致知孔子之致知也紫陽之窮理孔子之窮理也總不謬于孔子而已矣何至相抵牾分水火乎即如格物之説紫陽而在亦可以此面質共偕大道為諍友為功臣奚不可由也不嘗不説于夫子乎夫子雖折之未嘗不重其人曰志意不立子路侍何至以朱陸同異聚訟于生前朱王同異又聚訟于身後哉皆緣不明于學者助之攻耳失紫陽意李知州士元士元字子仁洛陽人舉人弱冠時即有志聖賢之學會尤時熙講業洛中即首為依歸泝伊洛以窮洙泗兩人深相得也初授如臯教諭常進諸生語之曰性命之理即在人倫日用間故其為教奬行檢析經旨一時士風翕然丕變焉後進國子監助教端軌彰志一若在如臯時轉慶陽府通判督糧靖邊營尋遷代州知州所在子視民家視國諸所興除為民永賴者不可枚舉後有怒其無餽遺者中傷罷官時牛生素善黃白術慮士元歸無糊口計願以其術售士元曰三十年所學何事笑而却之居里日以時熙為觀型篤信不移未幾以疾卒萬厯末年崇祀鄉賢陳給事麟麟字道徵洛陽人素嫌博士家言謂與理道無當故為文屢不售後念家貧親老乃稍稍屈就之嘉靖壬子癸丑遂聯捷成進士嘗語人曰吾雖以此取科第然詞章記誦殊非心得未快也初任河間府推官始入境宿一寺聞哭聲迹之得婦人尸廉之知為某姦逼賄託得免麟力論死拜禮科給事中忤分宜廷杖削籍惟引咎責躬初無怏怏意抵家時尤公時熙倡道里中麟偕謝黃門江執弟子禮朝夕昵就時有謝半夜陳三更之稱麟嘗稱作樂娛尸為凶喪陋俗設席燕賓為吉禮濫觴斷而去之時熙稱為砥頽波一柱云所著歸田漫録行于世欽建專祠並祠鄉賢謝司諫江江字仲川少遊尤時熙之門及官司諫一以上不負君下不負學為已任侃侃焉知無不言言無不盡雖觸權犯忌遭大譴責不悔也自兩遭廷杖臀全無肉正氣不少衰自謝政歸田怡然曰以直道賈罪非名教所棄絶今而後講學之素志庶大慰也于是與李春野陳仁泉等互相證發朝夕不倦著有滋心語録皆其領悟有得者也居無何穆宗繼統召還罪譴諸臣撫按交薦江杜門日久與長安貴顯不相聞問江同年有作宗伯者貽書曰道之顯晦雖由命而通情達志未可盡廢也江得書不答以故得罪諸臣俱被登用止復江冠𢃄而已及卒遺命子孫不必營求入鄉賢其狷介類如此别有岷陽諫草岷陽詩集與滋心語録行于世惜兵燹之後俱廢無存吳舉人道行道行洛陽人舉人受業于尤時熙為人繩趨矩步雖饔飱不給未嘗一事干人嚴冬糊紙被自覆或曰紙溫歟曰紙被豈能溫惟借其片段更加衣服耳李日宣按部至洛聞其行與之語悅其議論根極理要贈以金不受再易以榖辭曰賜某榖以為不茍取有似于廉故也若以亷受餽則是以廉始以貪終矣不違其本心歟日宣嘆服因扁其門為不改其樂云丘經歷鳯鳯家世方山因以為號少就臬司吏其弟嘗三易其田不較失偶不娶居官廉潔清風化盜與尤時熙友善共闡伊洛之學歷仕龍驤衛經歷殁孟化鯉作二賢祠祀之又祀鄉賢魯行人邦彥邦彥字鄭卿睢州人學者稱為惺菴先生嘉靖己酉解元庚戌進士授行人嚴嵩柄國遂疏終養學以程朱為宗海內法之隆慶改元起吏部主事光祿丞皆不拜上疏陳十事首言聖學以敬為主刑部侍郎耿楚侗曰臨大節不可奪吾信魯君矣野史氏曰分宜柄政遂乞終養恥與匪人同朝耳穆廟起官而仍不拜總是難進易退之意聖賢以敬為主此便得其要理學須是有風節人得公最後恨未詳其行事讀其著書也吕侍郎坤坤字叔簡以舊染之汚也自號新吾寧陵人質稍鈍讀書不能成誦苦訓詁家言亂之益不能解坤乃一切棄置默坐澄心體認本旨久之了悟入目即能不忘年十五讀史讀性理諸書欣然有會作夜氣鈔作拓良心詩嘉靖辛酉舉于鄉隆慶辛未成進士丁母憂萬厯甲戌對䇿授襄垣令襄垣劇尚嚴明明年調大同大同貧尚撫字培植柔良裁抑豪橫兩地甚德之先是襄垣土豪某被坤大創幾斃去之日追數百里及之曰某蒙明公創誨因知悔悟今而後不復犯法矣知大同時有某以人命坐抵其姻王家屏係鄰邑大紳向坤言之答曰獄已成不可及矣嗣家屏任吏部向寮友曰天下第一不受請托無如大同令也特疏薦坤戊寅升吏部主事故事新曹尚緘默卑伏坤獨峥峥不少退避在部十年七轉郎署丁亥升山東濟南道參政己丑升山西按察使辛卯升陜西右布政壬辰升巡撫山西右僉都御史所至皆正已率屬務致之行餽遺贖羡盡杜絶之尤加意蒙養孤煢無依者知天下將多事更嚴邊防迄後有成法不廢癸巳升協理院事左僉都甲午升刑部右侍郎尋轉左在京四年與董范之議朝鮮之議石門之議堅守一説屹屹不少動惡之者中以竒禍舉朝為危坤一稟天日不懲始念戴士衡疏論劉道亨救之坤不辨引疾乞休疏凡五上豫歸家居遇邑疾苦輒身任之不少奪即多口弗恤也有自京師來者要津寄字云葉相公嘗薦于上當為致謝坤曰宰相為國薦人公也若寄字致謝是以謝為求矣竟不問權璫某者差官齎書帛至坤曰大臣交結內侍律有明禁况素未識面乎原函璧回其守正不阿類如此家居四十年自奉儉約不置生産惟日與門弟子論􅊰不輟有負笈自千里來者咸稱沙隨夫子云坤嘗謂六經簡易明切諸儒因之聚訟而裂道深文而晦道拘泥而隘道遂失其旨六經者天地萬物之史天地萬物者六經之案也而總寄之聖人聖人之心道之府也聖人之身道之輿也聖人之言道之鑰也天地以道鑄聖人聖人以道鑄天下又曰世道任自然聖人立世教而約之以當然禮法者維持世教之善物也國之存亡民之死生于是乎係巢由沮溺佛老莊列決禮法之防而潰之近有念不及民物學不本誠敬心不存惕厲憂勤拾瞿曇餘唾開方便法門以自適其猖狂恣睢之意薄庸言庸行為土苴視三百三千為桎梏世教蕩無畛域宜自吾儒經史外諸清竒髙遠窈冥支誕之言悉付諸火又曰一身罪過都是我心承當五官百體無罪兩間罪過都是我身承當天地萬物無罪作呻吟語嘗作道脈圖推理欲生長極至之説以警世復為圖以廣之謂凶人之與衆人其初非與聖人遠也潛滋已久不覺自移故舜跖只爭一念臨終作返挽歌自餞自撰墓志銘自言性直不委婉嚴毅少溫燠居官持法而清涼居家義勝而恩薄當事過激涵養功疏奉先人天理二字于膺堂不敢失墜遺命勿用風水隂陽家言所著有四禮翼家禮疑去偽齋集閨範安民實務交泰韻等書卒年八十三贈刑部尚書野史氏曰余初向學知嚮公讀去偽齋集慕而愛之悠然有當于心時公為少司冦家居天下冀其一出以奏平明之治而公竟不出公惟不出而天下益髙之公之學曰窮理盡性以至于命直接子思子輿之傳有宋諸儒未之或先學至于是又何必憾其用不用哉楊尚書東明東明號晉菴虞城人萬厯庚辰進士授禮科給事中請立東宫又請預教疏凡數十上轉刑科萬厯三十年河決大侵齊梁淮徐間東民繪流民圖上之上惻然傳示西宫中宫省覽遂出帑銀三十萬往賑乙未分校禮闈稱得士因抗疏左遷陜西布政司照磨泰昌御極晉大理光祿卿始建首善書院與鄒元標馮從吾羽翼聖學後轉南京通政使卒贈禮部尚書楊知州澗澗字述復商丘人萬厯壬午舉人師事楊公起元以正心為則與里中孝廉王國禎以道統自勵初任興化令捐祭田數百畝後守霸州時內監居霸者多擾害地方澗擕印抵都謁司禮監痛陳其狀司禮遂戒其下不得犯楊知州法致仕後霸鄉老來訊問者嘗數十人涕泣不忍去云野史氏曰晉菴述復皆私淑新吾先生之學者也余嘗問其鄉之後進言其學有本源故附之孟光祿化鯉化鯉字叔龍新安人萬厯庚辰進士初授户部𣙜河西務清白自操羡餘悉捐而不受與諸士專明正學河西祀之奉命賑山東江南盡心區處活數萬人擢吏部文選郎中秉公直謝請托仕路一清以建言與顧憲成鄒元標同被譴倡道函關闡明學術于曹端之後其言曰孔孟演虞廷之傳又千餘年而周程續之曰太極曰誠仁蓋得一貫集義之學大宗旨此學不明即終身從事恐不免義襲冥行聖門四科必首德行顔不違仁尚矣其次若閔若冉孝敬自足取信至伯牛獨以疾見惜而齊魯論語六經舉無片言隻行可考乃儼然廟庭七十子且多讓而坐下總歸于躬行實踐而聖人之道賴之愈久愈光鯉生平服行曹端為祀典尚格參對盈廷卒無定議張棟以建國本被謪化鯉起之忤政府附籍時交章保留化鯉乘蹇而歸築書院川上倡明道學居仍先世不過數楹薄田數畝嘗徒步布袍一時從遊百人學者稱為雲浦先生所著有尊聞録讀易寱言春秋正旨諸儒要録理學功臣言行條文集諸書天啓朝冢宰張問逹等題贈光祿寺卿崇祠鄉賢野史氏曰雲浦之學從統宗處理會其魄力自大孔孟演虞廷之傳周程續之太極誠仁便是一貫集義大宗旨只此數言盡之矣主腦不清文辭繁多終是曲儒張知縣信民信民字孚若澠池人讀洗心藏密之語自號洗心居士父泰性謙和喜賓客夢神人送玉麟而生信民端頴不類常兒四五歲時出見羣兒畫地圓內方外為戲先生從旁正之曰天包乎地何爾爾乎識者已知其不凡七歲就外祖郭鳯池學稟鄉之先輩曹端為學程作聖之志即基之矣十五遊膠庠聞新安孟化鯉倡道函關負笈從遊毅然以斯道為己任主盟興起陶鑄後學反復忘倦時巡撫吳公聘信民纂修程邵諸書及化鯉卒信民恐學會落寞約王以悟于分陜龍興寺學者如歸尋以萬厯朝選貢授隴西令下車剔蠧綏氓撫摩噢咻種種德政民慶更生焉隴西號為天水艱于取汲信民引濶羊河水入城地方至今永賴士鮮知學為之建社學社倉選師督教刋洛西三先生要言與訓蒙要纂等書啓迪多士而士風丕變未幾以不避權貴謫西安藩司檢校亦恬然安之與馮少墟訂商問學日夜匪懈及誣詆白授懷仁令下車即訪民大害如馬頭苦纍銀力包賠地糧欺隱三事一一斟酌興除百廢具舉又刋四禮述等書行于世風俗翕然改觀後以歸養告休疏十上始得允懷民建祠從祀自信民始丁艱髯髮一夜如銀杖而後起當是時秦晉之間以及汝潁睢陽之士相繼而來問業者室不能容創正學會所五楹開示藴奧環門墻觀聽者數千人御史李日宣請信民至韶陽會禮數備至後過澠造廬以請恨相見之晚為建正學書院日與王以悟吕維祺等講太極周易又建景運山堂以課多士天啓之季學遭厲禁信民卜東山下建靜室養晦其中崇禎御極御史吳李交辟請益又約結雒社會共推上座發明致中和之義聞者嘆服即疏薦為成均主講一日無疾忽端坐而逝壽七十有二所著有日鈔理學彚粹剖疑講學會解月川年譜訓蒙要纂四禮述一處録印正稿洗心録諸書王參政以悟以悟字惺所靈寶人萬厯間進士歷官山西參政學術純正敦尚躬行從學于孟化鯉之門于鄉之先儒曹端備極篤信嘗與張信民吕維祺諸人倡明師説于正學書院嗣會于分陜龍興寺又會于甘棠學者如歸其言曰自道學不明世往往薄躬行為無竒其上者溺情訓詁藉口翼道下者以文人援元虗要渺之説自列于儒林此皆吾道之蠧耳夫躬行豈易言哉終身體之而不能盡堯舜之猶病文之望道未見孔子之何有未能皆學之不能盡處又與信民論學詩云自昔由來説克艱立心只在危微間男兒事業參天地合下先須透此關又云終日紛紛何所求幾人知向此中修孩提一念通天地翻棄寶山學比丘萬厯丙午分考順天鄉試稱得人鹿忠節善繼出其門野史氏曰聖賢事業聖賢學問總在躬行上取齊躬之不行而講説徒繁何濟于事惺所去月川二百年矣是真能得其傳者吕忠節維祺維祺字介孺新安人父心學有隱德以孝稱里閈維祺為諸生時即毅然以聖賢自任登萬厯癸丑進士授山東司理以孝弟感民民為之化擢吏部郎清饋遺謝囑托當熹宗未正位人心弗定先請見于慈慶宫門抗疏調護聖躬近侍不許干預政事旋豫假省親八年家居立芝泉書院與張信民修明濓洛之學時天下方以講學為諱逆璫銜之幾中危禍推考功矯旨另用烈宗御極起璽卿轉奉常上防微八事授南户部侍郎清核侵冒以百萬計任五年餘餉可支三年庾實不苦竭授南兵部尚書汰冗登勇兵實不濫復與多士立豐芑大社講明正學未幾以父病乞歸集郡士立伊雒社以守先待後自責與王惺所張泰宇李虛齊王文苑孟守鍵許松麓劉澄逺諸人大會于正學書院講太極周易發明致中和之義嘗述象山之言人不可以無學猶魚不可以無水賦人之形而不求盡乎人之道虛生浪死其在富貴者適足以播惡遺臭戊寅流寇詭撫當事者議安置河汶人心洶洶如沸維祺力為挽止冬十二月賊勢猖獗寖窺河雒率家人分守北城罄家資勞軍士辛巳正月十七日賊抵北城縋家丁殺十餘賊次日西城忽潰諸子以無守土責為言維祺曰受國深恩與城存亡義無可逃况讀聖賢書所學何事賊至被執曰非吕尚書耶稔知公善當謀出維祺艴然賊遂掖出城門賊首言曰吕尚書今日請兵明日議剿何逼人太甚維祺厲聲罵曰恨無兵馬殺汝狗彘事至此止有一死賊令之跪罵愈厲北向拜闕西向拜父母與福藩同被害觀者皆相視流涕維祺嘗言一生精神結聚在孝經二十年潛玩躬行未嘗少怠每論孔曾相傳得力于戰兢十二字故曾子易簀示門人曰吾知免夫非謂免于毁傷蓋戰兢之心死而後已曾疏進孝經請頒學宫所著有孝經本義或問大全存古篇明德堂集奏疏音韻日月燈行世嘗作石隱先生傳以自况學者稱豫石先生弟維祮選貢為樂平縣知縣家居城破死之贈按察司僉事野史氏曰豫于伯順蓬玄得悉豫石之人蓋忠義而潛心于理學者也其介然自守不附逆璫人所共知至為魏南樂所取士絶不少徇更為人所難能嘗謂古人居身處世亦顧所謂浩然之氣常存天地耳得失榮辱顯晦生死非能為人加損所遇有幸有不幸也乃竟以節死噫公非蹈白刃之士適值城破大臣無茍免之理蹈白創而成仁取義正所以履中庸耳中州學者稱二吕先生與寧陵足當並峙中州人物考卷一
