body:
  text: 中州人物考卷五容城孫竒逢撰方正李春坊希顔希顔郟縣人隱於夾谷學以伊洛為宗從遊者甚衆初太祖為諸王子擇師用廷臣薦手自為書徴至京師命詣大本堂授經其教法嚴毅雖諸王子有弗若教者嘗以管擊其額帝撫而怒孝慈高皇后從容問曰惡乃以堯舜訓爾子邪帝笑而不罪纍授左春坊贊善大夫永樂初引年歸詔復其家所居湫隘飲酒自放州郡屢聘課士不赴懷頁寡合邈然無所干請竟以凍餒終葬邑之塔亭鄉所著有大學中庸心法二卷凌僉都漢漢字斗南原武人也洪武十七年以明經舉至京師獻烏鵲論上善之擢司經局正字未幾出知㑹稽縣以事逮繫久不决㑹浙江按察使陶晟入覲上知漢無罪為晟所淹命還釋之與偕來既至拜監察御史巡按陜西疏陜西民病數事且言古人謂大夫出疆有可以安國家利社稷者專之可也臣竊以為在春秋戰國則可在今大一統時則不可茍許其專恐啓大臣擅權之漸上善之召其子賜鈔二百錠衣一襲及還京師有德漢者遇諸途邀漢飲厚報以金漢曰子罪當爾律有定法非我私子酒可飲金不可受上聞之嘉嘆擢漢為右都御史時詹徽為左都御史論議數不合每靣折徽徽銜之奏遣按事蘇松因嗾御史桂滿劾其失職左遷刑部侍郎未幾命署吏部數月改禮部又數月上憫其衰令歸田里漢叩頭曰臣願生居京師死葬京土上許之命居于私第嵗餘徽誅起為左贊善又嵗餘復拜右僉都御史尋令致仕漢入辭上問先賜歸不行今歸何也對曰先詹徽在臣有後憂今徽伏誅臣無憂故敢歸爾漢有治才且剛方不屈故時人多忌之云王布政平平息縣人洪武中以國子生擢江西道監察御史升陜西按察使文皇即位召為都察院右僉都御史坐事謫衛經歷用薦升福建布政司左參政從英國公輔征交趾事平進交趾右布政使時清化府蠻賊梗化平與都督黃中往鎮其地民賴以安還至交趾卒平為人氣剛不容物臨政頗刻而所至不受私餽交人至今誦之房參政安安字子靜汝陽人年十九徴至京師太祖一見竒之即擢北平按察僉事升江西按察使文皇即位安與布政使楊連僉事吕升並為軍卒執告上釋不誅謫戍興州後召為監察御史福建布政司左參政安蒞事嚴敏嘗行縣貪墨之吏皆望風遁去擢工部左侍郎數日出為山東右參政同官魏瑛誣告誹謗下詔獄安不勝掠治悉引伏闔家謫戍交趾安坐大辟㑹瑛他罪覺並驗所告安事非實遂釋安召還其家屬改安四川右參政未幾復改交趾卒於官王知府觀觀字尚賔祥符人洪武中以鄉舉授蘇州知府為政嚴整多所興建發奸摘伏民畏之如神明有刁吏錢英纍搆陷長吏人莫敢問觀亷得縛至庭立捶殺之由是豪奸屏息百姓稱快事聞上遣行人白思中賜勑褒之且勞以酒嵗大祲民逋無所從償觀乃延諸富室集郡衙宴飲風使出儲積以補不足衆歡然應之逋乃完上嘉其能榜示天下以勵怠政者今祀於蘇州名宦祠鄭尚書剛剛南陽人天資英邁質直無為家貧嗜學洪武中釋褐胄監署廣西布政使事纍官工部右侍郎恭慎小心為時所重持節巡視江淮卒於官洪熙初贈工部尚書制稱其資禀純實蹈履清慎夷險之際一心不渝顧端肅佐佐字禮卿太康人也洪武三十三年進士授莊浪知縣午節守將集寮屬㑹射以佐文士易之佐三發俱連中且進止安暇觀者驚嘆罹父憂起復擢監察御史永樂初使廣西招撫慶逺洞蠻夷繼命四川監採營造木植復命隨征沙漠巡撫邊關既還遷江西按察副使未幾召為應天府尹剛稜不撓吏民畏服貴戚為之斂迹議者以為包孝肅之尹開封弗過也昭皇嗣位改通政使宣德初扈從伐漢漢平賜以人口白金文綺三年上退朝問廷臣誰可掌憲者楊士竒楊榮交薦拜左都御史賜璽書令佐洗滌積弊進退其賢不肖佐於是奏知縣孔文英等十四人教諭楊禧等二十四人俱堪風憲又奏御史嚴暟等三十人及都事趙玭司務假凱等若干人俱宜黜降又奏水軍右衛倉官宋忠侵欺糧萬四千五百石有竒户部郎中黃紀受賂免盤審訊已明法當重擬又奏廷臣邇來請謁公行以奢相尚宴飲必用娼妓酣歌恆舞朋淫比嫟上下觀效法紀廢隳此非清明之朝所宜有也願一切禁止詔俱從之四年吏有遭笞者捃佐之過謂受𨽻金放歸悉具姓名以聞上以示士竒對曰所訴誠有之今朝官月俸止給米一石薪炭馬芻咸取給于宅不得不遣半歸使備所用皂亦得歸耕實兩便京朝官皆然自永樂以來如此仁廟知之所以欲增朝官之俸上歎曰朝臣之艱如此因怒訴者曰朝廷用一好人輒為小人所排乃以吏所訴狀付佐自治佐叩首退召吏示之狀吏恐甚佐曰上命我治汝我姑容汝但改行為善竟不問上聞之喜曰佐得大體矣居亡何有囚告佐數枉人重罪上大怒曰此必有重囚教之排佐命三法司鞫之則千戶臧清所使也清時殺一家無罪三人當坐極刑上立命磔清於市五年八月車駕巡邊命佐居守六年十二月佐言永樂中進士命于刑部都察院理刑今欲仍命與御史郎中主事分鞫獄囚庶幾諳練若時制進士於各衙門觀政不僉署文案故也八年十月佐以疾再告上遣中使數問及愈入見上喜甚親賜慰諭免其朝參視事如故正統初竟以疾歸家居十餘年卒佐性嚴重不口毁譽人旦晚候朝前呵雙藤立朝房外百僚騎而過者皆折旋避之非公事未嘗與諸司羣居時稱為顧獨坐云野史氏曰公受主知至以吏狀授公自治且諭曰小人不樂卿檢制敢誣正人此可稱君臣魚水矣然非兩楊左右其間則嫌釁漸開而讒易入故獲上者必先信友宋布政伯義伯義西華人剛介有守言辭辨正洪武中以才行俱優由太學選擢山東布政司右參政克著勤能永樂中轉任陜西布政司清譽益彰滕知府霄霄字九臯汝州人永樂初以國子生擢禮部司務升祠祭員外郎十四年轉湖廣黃州知府以寬為政民有爭訟者諭之以禮義訟輒息黃岡民訴有虎害霄為文告神虎即徙去行部至麻城有訴勾軍戎士為人殺死久不白霄宿城隍廟禱之見一刺鼠走入寢處盤旋而去使人追之至一池塘潛伏不見掘之得尸即戎士也因獲所謀殺者遂正其罪一郡人以為神秩滿去黃民數千人上章乞留詔從之霄在郡凡十有九年而廉貞之操終始不渝宣德末引疾歸子昭有傳見清直髙給事中舉舉字雲翰祥符人少補郡庠生其父因邊患選為勇士即棄學代父而往永樂戊戌進士拜兵科給事中持正不阿慷慨敢言坐是不合時解官歸其居不蔽風日惡衣菲食怡怡如也巡撫于謙過其廬即止辟道其見重如此年九十而卒藺學士從善從善字有恆磁州人也永樂中舉鄉試第一初授陵縣教諭稍遷揚州教授章皇為皇太孫時志慕堯舜文皇擇天下名儒輔之中選者毋拘階序從善詔授翰林編修與王直錢習禮十五人日侍講讀閲十年從善遷贊善及章皇為皇太子從善進司經局洗馬章皇嗣位同事者皆遷顯要甚者即拜尚書而從善獨與王直留滯不調遷者得志逞氣勢焰赫赫從善日坐東閣中紬書暇則取祕書讀遇休沐與直載酒郊逰覽勝賦詩泊如也正統初以久次遷學士上方嚮學從善以舊臣見信用每進講多鄉音上曰久宦不改其素從善其君子哉景泰初年七十援例求謝事上慰留之又四年乃得請還郡而卒郭副使原原蘭陽人永樂中鄉舉初授四川監察御史持身端謹正大無阿雖故人不敢以私恩相干人謂有古御史風尋升陜西按察副使郭知府濟濟字澤民太康人性沉靜寡言為兒童時父母宗族咸竒之年二十舉鄉試第一明年㑹試不第拜定州司訓九年遭艱起復改開州兩郡知名之士多出其門永樂末昭皇監國濟被薦拜左春坊左司諫官僚覩其威儀端雅皆稱得人是年秋七月昭皇嗣位以濟為滕王紀善居數年多所匡正㑹交趾梗化濟自紀善改行人往使其國濟示以順逆之義而强梗者稍稍馴化及再使卒致酋長欵貢上悅特加褒賚正統初遷鎮江知府兩考俱以最書年七十餘卒於官尚僉事裭裭字景福羅山人正統進士授行人嘗上言時事拜監察御史性剛正不阿劾都御史周鍾謫驛丞尋復職又以言事謫厯湖廣僉事致仕耿文恪裕裕字好問盧氏人九疇中子景泰甲戌進士改庶吉士為文辭淳深有古風除戶科給事中尋改工科天順初以父九疇為都御史改翰林檢討是年石亨被御史劾恨九疇謫裕泗州判官改定州成化初召還翰林厯國子監祭酒時勳戚子冲幼者裕患其難教所當習讀古今嘉言懿謨萃為一編授之他日有獻於上閲之嘉嘆纍升吏部尚書清慎簡平銓法疏理諸請寄者不便忽改南京禮部泰陵即位改南京兵部參贊機務𢎞治元年召還為禮部尚書婚喪諸大禮傳經律酌古今行之崇王請朝下廷議裕請遵祖訓遺書王勿朝西夷由南海貢獅裕曰邊人嗜利輒開海道宜却去六年復改吏部尚書加太子太保裕在吏部薦進賢才務協輿論愛憎毁譽莫能淆奪守正律身干謁斷絶即內降斜封封章抗議杜塞幸門父子清修不營産業不治居第約儉蕭然無異寒素偉幹修髯儼然神明學問該洽文章雅正世濟其美𢎞治八年卒贈太保諡文恪野史氏曰公為清惠公子能守正薦賢世其德世其業盧氏一撮土乃有是父是子兩大賢接踵而出當與靈寶許莊敏父子千秋並峙何太守濬濬字秉哲靈寶人正統中以貢士除知象州值洞蠻黃甫榮叛濬親往宣示德意遂致欵服既而入覲甫榮率所部護送出境感泣不忍别後濬改知趙州有宦官侵民田二千餘頃濬以狀聞遂以地歸民秩滿升南康知府修白鹿洞書院廣搆齊舍聚屬邑子弟延知名士胡居仁等六人以教之一時造就者甚衆致仕歸南康及象趙人皆立祠祀之子均字仲衡成化中進士授監察御史擢大理寺丞官至戶部侍郎明習法律所至有聲李恭敏鐩鐩字時器湯陰人成化壬辰進士由主事厯官工部尚書常奉命帳山西飢民多活流民有為盜者鐩入其巢諭還本業開渠灌田萬頃民刻石頌德擢鴻臚寺少卿諫罷鄧常恩蔭職及毁西山戒壇𢎞治初數上言便宜再擬巡撫㑹有沮之者遷南京太僕少卿再遷光祿卿削冗濫之俸抗章論工部器具窳薄耗財無益遷工部侍郎榆林有警命兼憲職治餉事定還朝言十事且謂外攘宜先治內今盛齊醮嗜燕游寵他技以雜金紫畜異禽以糜粱肉此好漸長恐逺人偵伺以順逆邊方觀視以勤惰命山東漕臣上言缸城之壩毋毁洸河之塞毋通浚泉疏水漕利可復邊城奏密雲將有警宜備之上曰非鐩往不可召至榻前諭㫖鐩始至簡將廣儲已乃治壁壘飭器械守險隘梁溝澗墾荒田疏河流悉有成績上謂司馬劉大夏曰鐩果善幹國者正德初遷尚書劉瑾用事惡先朝大臣不附已遂致仕瑾誅詔起還部加太子少傅四辭乃允是後佞幸益雜修建大增鼇山之戲內苑之供造軍器繒綺豹房僧寺鎮國延壽凝翠太素知殫刻畫色纍金碧文石采瓦窮麗極奢隱憂顯諫未嘗遽已也內宫災新作之鐩雅有心計量物平價擇舊成新費省而工堅諫疏歲數十上其曰漢文之賢罷露臺而著隋帝之敗開汴河而致蓋民所有惟財與力力竭則懟財散則叛今亡徵已顯可又促之屢請停它營併成內宫上或奪俸示譴或間從一二太監劉養監各工鐩與議不協面叱之養素寵貴泣訴於上前置鐩不究嘉靖改元年七十有五曰吾在先朝義不可去今聖主興遺賢進吾納祿讓能此其時乎歸來八年春秋祀墓外靜坐觀書不出戶庭不燕飲無音樂蓋天性節約至老不渝云卒年八十二諡恭敏孫竒逄曰愛君憂國不激不隨庶幾古之大臣以道事君者乎王少保繼繼字述之祥符人也少治賈年二十八父瑄誤為有司笞繼發憤始嚮學家人盡笑之繼晝入市治賈夜歸讀書久之御史凃謙來使河南試其文竒之補郡學生成化二年舉進士授監察御史命按山西時欣州定安王某虐縱繼疏於朝遣官按治竟置之法太原郭外有惡少守瓜圃見少婦抱孩過欲犯之婦怒罵惡少乃誣婦盜二大瓜又以平日所失瓜盡誣之繼麾婦出取二大瓜以償仍紿留孩償平日失者惡少喜亟取瓜孩不能兼繼叱之曰汝為壯男子且弗能兼抱瓜孩矧一孱婦乎惡少慚服高平富民牛氏子殺人賂其壻代死民婦某氏後姑誣以不孝二獄俱成繼辨其寃壻與婦俱得寃狀牛氏子棄市擢陜西按察僉事督理屯政鎮守中官劉祥侵占塞下田繼上章劾之謫裕陵司香邊民水利為勢家奪者悉取還威惠並行豪右屏息轉固原兵備副使尋擢山西按察使先是有奏紫碧山産石膽可延年者上遣中使採求經年不獲民甚苦之繼至令取小石子一升以示中使怒曰汝敢以此搪塞邪石膽載諸古書何以謂無繼曰鳯凰麒麟皆古書所載今果有之乎乃上疏白其妄事遂寢擢山西右布政使𢎞治初福建江廣流賊剽劫拜都察院右副都御史督兵往勦事寧轉兵部右侍郎尋改戶部督理京儲秩滿進尚書嘗盤詰太倉得羡金十餘萬故事尚書及同事中官分取至是有為言者繼併許納歸即草疏以進上嘉恱賜金綺一襲頃之閹人李廣事敗言官劾論交通大臣某某請置之法上以人衆悉宥之翌日早朝空班謝罪惟繼與馬文升不預上益重之改南京刑部尋改兵部參贊機務以疾卒于位年七十有一贈太子少保劉文肅忠忠字司直陳留縣人父逹國子博士夢芝産左膝上寤而忠生有異質從博士授毛詩成化十年以儒士舉於鄉十四年登進士選庶吉士十六年授編修忠性峻少通行方寡合一介不苟得惡人趨競自處常過抗貴人亦力抑之在翰林幾三紀始拜侍講學士正德初為講官每附經義規上缺失及諷時政不協于內傳㫖升南京禮部侍郎已中貴人知忠素髙節進南京吏部尚書南部大率閒佚居官者自名吏隱俯體瓦合規橅屑屑忠毅然持風裁越閩胥人革役者貨縣胥竄名吏籍中上部往往冒官去忠命四主事稽厥籍年經月緯究竟接代凡革罷千人雖仕者亦追論除名庶僚滿秩為署考必當實御史某恃勢驕橫人皆憚屈忠署下考郎中某瑾黨張綵私昵者也忠署考曰守已乖于士論行事咈乎人情自是諸司弗飭者惴惴焉少師焦芳亟薦忠賢瑾傳㫖徵入翰林一見不相合瑾誅始被推入內閣奄黨廖鵬來謁遇以僕禮又却其餽忠畏叢內外怨在位不滿三月乞致仕同事者恐其得美名尼之乃托祭掃請假始得歸杜門不交世事凡十有二年而卒贈太保諡文肅所著有野亭集八卷孫存恩以大理寺副為周府長史清嚴明敏臨事無少遜避人謂不愧祖德云安陽崔銑論曰銑初入翰林謁少傅于髙坡私第公慨然曰古羇人匹士雖當流離困厄絶不取非義財况居祿食者乎許襄毅公論當世人物獨推章公懋雍公泰襄毅語銑曰子初仕慎事大夫翰林惟司直一人耳其見重名流如此夫孫竒逢曰正德中前則劉瑾以慘行其毒後則張忠張雄錢寧江彬以愚暴肆其罔士靡靡矣全臣節者文肅及傅圭牟斌三人而已王文莊鴻儒鴻儒字懋學南陽人聰悟天成書過目成誦作字端徑有古法里人有為府史者嘗致鴻儒佐書府中知府假堅見書竒而問之史以實對堅即召見曰子風神清徹豈塵埃中人即留與張生景純讀書府中給食授衣遣入郡學為諸生提學副使陳選異其文曰此生文章經世非直舉業成化十九年中鄉試第一二十三年登進士為工部郎中𢎞治間提學山西凡九載表勵敦謹裁抑靡浮俗習為之一變泰陵勵治思賢嘗召見華容論人材曰藩臬中如王鴻儒他日可大用正德改元乞致仕賜誥四年家居拜國子祭酒不數月以憂去七年又拜南戶部侍郎十年召入吏部厯左右侍郎嘗曰惟誠與直能濟國事趨名者亦趨利於社稷生民無益也時吏部尚書陸完有才名與宸濠通鴻儒亟稱夏忠靖王忠肅二公賢可師法完意不恱十四年三月升南戶部尚書是歲二月宸濠及完敗鴻儒出督餉留都至九江聞變遡流欲入武昌約守臣起兵討賊又聞康陵南巡益憤悶疽發背卒諡文莊所著有凝齊集若干卷鴻儒博聞多識凡祖宗設政任人及先輩立朝行已厯厯能言至論時務决成敗如指掌待物開誠不問人私人亦不敢以私問也弟鴻漸字懋德亦舉鄉試第一登進士官至山東布政使司亷靜有吏才所著有淯南集行世野史氏曰公嘗曰惟誠與直能濟國事趨名者亦趨利於社稷生民無益也經濟學術無餘藴矣此之謂真人品嘗思之非誠則僞非直則枉僞且枉不可以為人烏能立事髙郎中魁魁字文元新鄭人也事親甚謹與兄弟同居則貨盡以屬之不私一錢與人同事過險難則以身任之孝友廉義著於鄉閭成化二十一年舉於鄉𢎞治間授金鄉知縣下車之日即與父老約曰令不困若財為若掊擊强暴弗以苛政擾若若能順令則治也父老皆諾魁乃刻亷勵節期自身始冬不必爐暑不必蓋飯不必肉一布袍終其任不易邑士大夫皆服其化賔客道其邑者知魁之為民也亦不過望其館榖豪族巨家至相戒曰勿困其良弱以傷令心齊民非輸稅供役終歲不入城邑四境之內蓋欣欣然樂也時飛蝗食稼旁邑禾粟委地獨魁之邑無蝗父老相賀曰政之感也欲聞之當路魁曰不可雖古之循吏亦謂偶爾豫何德以致之竟不白正德二年擢工部主事既去百姓建祠祀之三年魁督抽荆州商稅時逆瑾專政黷賄不如意者輒禍及其家同輩求以自免者乃縮公課以其贏羡賂瑾致瑾恱人有以此諷魁者魁應之曰公私之際忠邪之判也君子貴守道貴不失己禍福之來付之命而已矣卒不縮稅私瑾瑾亦不能害久之遷本司郎中營理薊州鐵冶時政愈刻魁乃喟然曰執國紀律𢎞濟時艱古聖賢㑹其際者也今也豈其時哉龍蛇之蟄以之存身神也吾將行乃連疏乞歸嘉靖登極詔進中憲大夫年七十八卒子尚賢舉鄉試第一登進士督學山東仕至光祿寺卿所至俱有名蹟孫捷都察院右副都御史拱少傅兼太子太傅禮部尚書武英殿大學士秉心易直確有執守夙夜惟以國事為念自輔儲至參鈞軸厯三十年而田宅不增尺寸君子比之李文靖云另有傳見經濟才舉人博學有文其事二兄甚恭事無巨細必請而行旦暮省候俯容曲禮無少怠其族屬亦鮮有干法者中州家範之嚴咸稱髙氏賈文靖詠詠字鳴和臨潁縣人𢎞治丙辰進士改庶吉士厯編修為纂修事忤逆瑾改兵部武選主事瑾誅還編修遷中允轉侍讀學士拜南京國子祭酒故事諫官御史有闕選國子博士等官充之而南監每不得選詠疏以南北一體宜遷擢以勵其志詔可之詠在內閣端嚴持大體數抑貴幸如奏止中侍奪牧馬草場不得與貧民爭利勳貴請薊州莊田復奏罷之有古大臣風當是時方更化興治士皆喜趨事功好紛華詠醇德雅度挈綱整紀納之太和不為聲聞其所匡維調護甚多人不及知也落落不茍合以老致仕雖不究厥施而脫屣榮名田野咏歌有洛社之風焉文章醇雅暢達雖老猶著作不倦八十餘歲耳目聰明謙抑直坦若未嘗貴顯者人稱為篤行君子云詔遣官存問加月廪歲奉卒年八十四贈太保諡文靖野史氏曰文靖渾渾穆穆不得以一節一目見長有大臣風味陳參議溥溥字一卿鄢陵人𢎞治乙丑進士授大理評事以忤逆瑾謫武鄉縣丞稍遷曲陽知縣瑾誅擢戶部主事理大同糧儲經制有方升山東右參議守海石道值歲大祲冒雪賑恤全活甚衆感疾乞歸有詔進階何副使景明附孫侍郎洛文景明字仲默信陽人也生有異質八歲即能詩年十二以父任臨洮驛丞乃隨侍臨洮臨洮守李紀者聞其竒召至門下甚器重為延師授春秋亡何即善說春秋歸又授尚書于兄景詔所甫數月即以尚書舉鄉試第三時年十五也諸王公大人以其少而雋爭迎致一見候車日數十乘所遇觀者如堵明年㑹試以文多竒字不第入太學卒業歸則祭酒翰林賦詩贈之踰歲為𢎞治十五年舉進士授中書舍人與邊李輩工古文辭皆相振勵而且尚節義鄙榮利並有國士之風焉夢陽又駿發與景明齊名海內操觚之士皆宗尚之稱李何云十八年五月景明奉敬皇哀詔下雲南雲南君長及中貴人咸請題咏比還饋遺犀象珍具悉謝不受是時逆瑾用事景明移書許進言宜自振立以抑瑾權瑾聞而銜之景明乃謝病歸後竟坐免官正德四年瑾誅李東陽薦復授中書舍人直內閣制敕房經筵官夢陽遭江西之訟衆多媒孽其短勢洶洶欲擠陷重辟景明又移書楊一清爭之始得白五年東陽引疾乞休㑹有兵事景明又援古大臣義為書讓之三書義咸髙文多不録九年正月乾清宫災景明應詔陳時政乃言人事不修天變將復作且詆義子宦官語頗激切不報是時四方學士咸願識景明車馬填門巷錢寧亦欲交歡景明持古畫求題謝曰此名畫不可㸃汚屢請卒不許師御史客死京邸權幸廖鵬者贈之以棺景明叱之曰吾友生不茍受豈以死汚之邪遂自出金賻之十二年進吏部驗封司員外郎仍直內閣明年遷陜西提學副使以經術世務教儒士其規約尚嚴志在崇本起弊士初稍不堪久之幡然興起自是士習文體為之一變云十六年病歸卒於家所著雍大記三十卷何子十二卷詩樂府書疏騷賦序記銘贊雜文二十六卷傳於世子立德安府同知孫洛文洛書洛文字啓圖舉鄉試第一成進士凡在詞垣者七任而周旋講幄者十年每入講必先齊沐期以精誠悟主旁引曲喻用規時政上皆稱善大書責難陳善四字賜之官詹事府少詹禮部侍郎天性孝友好行其德慕義急難無所吝惜所著賦頌詩文二十卷野史氏曰百五十年來海內推文章大家皆曰何李愚謂何李寧真文章士士君子大節立身不茍立朝不茍交友不茍如斯而已矣以觀仲默皎然素絲之操毅然忠諫之氣肫然友誼之篤發於至誠絶無倨已凌人之意庶幾君子乎况孫能步武於祖豈不有光殆天所以祚何氏也田副使汝耔汝耔字勤父祥符人也博聞喜經學𢎞治十八年舉進士授行人尋拜給事中是時權閹竊政朝紀乖紊官惟附權潤已汝耔挺立其間絶請托雅好何舍人景明每兩人浮白吟詩慨時自憤曰引古請劒者固丈夫許國者爾顧事不當其㑹情不中其窽雖殺身無益益章主過耳頃之值端揆虛位爭進者日喧于朝汝耔上疏言當用大臣以忠諫去位者如韓文等遭㫖斥之又劾武帥時源恃功淫縱遂遷江西提學僉事江西乃文獻之地士多易直不尚請託提學官校試列第不合素所評輒出辨詰往宦之者先隂訪衆議參以今試者列其名汝耔惟據試文雅好秦漢諸家書以舉業譽者汝耔病其腐置下列嘗遵勑薦知府武文定同知曹琥等四人樂官十二人及退居御史宗景逸士某劾知縣及學官不職者十餘人憲臣及僚儕惡其侵官乃共升謗當考官時南臺劾之調山西方謗起共欲擠陷然止言其乖方他無可摘者古所謂以貶見褒者歟自山西遷湖廣副使皆理獄訟清屯田修水利𣙜庾儲事靡不飭前後休疏三上乃得請年四十五既還汴力田養母杜門讀書誦聲琅琅聞戶外病六經庸學傳注紛如靡統字稱句品思輯成一家之說僅畢周易纂注而已弟汝􅲸兵部司務以詩名有集若干卷孟大理洋洋字望之信陽人也𢎞治十八年進士為行人時內弟何景明方有俊名與其友李王崔田輩相切劘為文章揚榷風雅以相振發京師稱十才子云已而洋選為御史即抗疏劾大學士梁儲靳貴上怒下詔獄謫桂林儒學教授天下皆髙洋之節而諸子者亦各以氣節自著不獨稱才已也洋由桂林稍遷汶上知縣嘉與同知擢湖廣按察僉事持憲專决恥唯唯恭遜意少拂棄其官而歸嘉靖初以臺臣薦起山東僉事厯升陜西參政拜都察院右僉都御史巡撫寧夏尋改督儲洋在南京一日聞母病即解印還或以職守難之洋曰吾安能顧此耶已就道而寮友有不及知者中途改總理河道復值郊恩貤封洋乃躬捧冠帔至家踰四旬而母死服闋拜南京大理卿無何病卒所著有有涯集十七卷刻于家劉副都大謨大謨字逺夫儀封人正德戊辰進士初授戶部主事差出以不趨謁逆瑾士論髙之改御史按遼東時太監岑章肆毒遼陽捕其用事者置之法章誣衊以他事逮繫詔獄謫陜西隆德典史後分巡金衢時宸濠搆變乃勒兵常山先聲四逹兩浙賴以弗恐總兵李隆謀殺都御史許銘當路以屬謨竟正諸法輿論稱快嘗乞終養不報以劾參議魏倫忤重臣意得致仕或勸之辨曰老父在里今得侍養吾又何求再起巡撫川中晉左副都御史所著有東臯集姚尚書繼可繼可字光父襄城人父汝臯正德丁丑進士諫巡幸議大禮被廷杖有古直臣風繼可中嘉靖乙丑進士初授南陵令有神君之稱擢御史按宣大提督學政以興賢育才振綱肅紀為首務陳言邊事指斥和戎之陋時論韙之然拂當事意外遷四川僉事苗夷雜處至則剔蠧除奸驁如播酋且帖然就化升陜西參議兵食兩詘詰戎蓄糗屹然為西北保障巡撫陜西時寧鎮內躪於哱劉外於火酋至厪上西顧一時廷臣咸推轂焉乃以羽書促就道中道聞督臣被逮逆黨搆邊釁深入掠城堡戕運軍絶我糧道遂星馳入關提兵至河州地方以精兵遏其鋒死士搗其穴賊遁糧餉始得至靈州數萬枵腹卒不至生他虞而逆黨就戮當為首功及克城後疏上善後事宜數千言悉依擬升工部侍郎請告不許提督工程兩宫告成擢工部尚書屢疏乞休溫㫖勉留疏至四十五上始得俞㫖賜乘傳歸里杜門謝客踰二年卒訃聞贈太子少保遣官治葬守臣稱制臨祭者四再廕一子野史氏曰公為人真誠疏爽風骨稜稜自少至老動止凖繩無失尺寸當官守法務在沮抑彊梗惠利小弱居常踆踆簡默及當大議大謀衆莫敢發守經據古鑿鑿指畫率以片言取决蓋老成正直君子人也李苑馬士允士允字子中祥符人也父環青州通判有治行士允年十八薦於鄉即善古人辭不喜閲近代諸家之言正德十二年登進士每有篇翰傳播京師時如信陽何景明亳州薛蕙漢東顔木金陵陳沂扶臺曹嘉黃岡王廷陳綏德馬汝驥諸子莫不推轂相讓由是名聞海內矣士允體素弱且不樂仕進乃謝病歸久之起授蘇州府推官蘇劇郡號稱難治士允執直廉謹雖知舊無所假借嘉靖初以憂歸免喪補襄陽歷遷山東按察僉事整飭沂州兵備沂界徐沛齊兖之間世所謂鹽礦盜藪也士允治行峻直掃除一切苛細三年境內晏然擢江西布政司左參議㑹太倉海冦之亂廷議添設兵備副使而難其人㑹推以士允往勑曰朝廷以爾素有風力特茲簡任士允至以計擒獲首惡餘黨潰散守臣疏聞上喜恱賜以白金文綺崑山盜劫方僉事及姚監生家捕者誣執平民數十人拷掠殆斃士允一訊即釋未久二家盜獲人服其明十七年擢浙江左參政先是在太倉以瘍謝事而巡江御史某適按其地誤以不迎為慢已遂掇拾它事奏勘事白補山東按察副使尋擢陜西苑馬寺卿居歲餘以疾乞歸歸二十四年卒年七十一歲士允性介潔恥為世之媕婀猥瑣之行而又嫉惡太嚴故坎壈不能久於其位平生所得俸金悉獻之母未嘗有私藏焉閒居蔬食布衣不異寒素而喜交遊好吟咏垂老不輟嘗與諸鄉先生結怡情吟社時相唱和其間今山藏集內所載多同賦篇也從子蓁陜西左布政使嘗事邊陲有聲績以父尚主故不得為卿佐士以此惜之髙按察叔嗣叔嗣字子業祥符人也賦資頴特十六著申情賦幾萬言傳示大梁大梁之人皆嘆以為弗如也嘉靖二年舉進士為工部營繕主事調吏部稽勳厯遷員外郎郎中論事與時宰不合因謝病注朝籍滿三月乃上疏曰臣少不知自慎身被狗馬病遭遇陛下一拜官再徙再擢自唯受命凉薄曩守工部主事移疾請告者二語具在前後疏中今春沉病暴興昏瞀顛踣臣竊自悲傷年未逮壯抱不測之病當朝廷建治之日弗能備用行伍獨因逆旅賔客左右過視無不憐臣為臣流涕者伏惟敕所司亷臣病狀無他以例放歸倘天誘臣衷不遂殞亡猶得下觀鴻化所成如遂不救亦得瞑目丘壑上乃俞其請既還謝諸賔客屏居里中三年起補前官叔嗣又與時人忤遷山西布政司左參政永和王欲改馬跑泉環汾州城中丞報可叔嗣曰王專其利奈小民生業何卒止久之轉湖廣按察使是年夏大水叔嗣禱於山川歸而病病才九日卒得年三十七所著有蘇門集八卷而讀書園諸作獨精詣兄仲嗣丙戌進士南京禮部郎中文詞竒古世比之晉二陸云張太保孟男孟男字元嗣中牟人嘉靖乙丑進士官尚寶丞時新鄭秉國孟男以至戚旅見外無私謁故遲四年不調及為江陵所搆嚴㫖譴歸人皆引匿獨孟男周旋不避江陵故矯新鄭所為一歲三遷欲引附已孟男曰始豫不媚新鄭受相君知遇今何取媚相君負知已不謝江陵敗厯南戶部尚書遺疏千餘言命子民表馳使上贈太子太保民表另有傳見隱逸沈少保鯉鯉字龍江歸德人嘉靖乙丑進士由庶吉士厯官少保大學士鯉生平素甘清苦斤斤重名行守法度神廟在東宫時鯉以贊善侍講讀上出扇二命鯉與編修張帙各書詩句張書唐人早朝詩鯉書卞蘭太子頌命解說大義鯉敷陳頌中親賢逺奸窮經致用之要上改容拱聽癸酉登極後上每與侍璫言某事某事沈講官行的是輪講日亦輒與侍璫言沈講官講的好鯉以外艱歸又接內艱上時時思念之命服闋先補比相見則喜曰沈講官容貌如舊也江陵病舉朝官為禱祀鯉獨不與㑹江陵故鯉得不被祻及晉宗伯有縣産麒麟旋斃上欲取觀之鯉謂此端不可開果爾天下言祥瑞者紛紛矣執奏不可鯉每事與吳縣相枘鑿吳縣忌得主眷急欲去之乘請造遂票㫖放歸上曰好官何處得這人來替他溫㫖留用給事陳某承吳縣意疏詆鯉鯉求去益力上曰沈尚書不曉我意苦苦要去時有老宫人聞上言令內監密告鯉鯉正色曰此宫禁語若奈何輕泄內監恚而去鯉竟歸後推閣臣上欣然首㸃鯉名四明無能過也鯉與山陰同召山陰乃四明腹心隨事媒孽鯉初入閣即以沿途所見礦稅之害為疏陳之越數日山陰促之復上上頗不恱一日大雨如注鯉促四明山陰曰礦稅疏此時宜上矣吾輩宜素服躬到文華殿上必動心兩人不得已同往內臣驚問故鯉曰有要事第對上言三閣臣皆素服冒雨在文華殿進疏上啓閲知為礦稅亦頗頷之不怒也長至日四明被論注籍鯉與山隂賜食宫門外命陳矩陪鯉見小內史往來竊聽有持紙筆竊記者料出上意乃謂矩曰某一路見礦稅害百姓所不忍見再三疏請未見允行矩蹙額曰誠然鯉曰害百姓還是第二義矩曰何謂鯉曰皇上受虧多矣如今人家也要風水興旺今國家把名山大川都鑿破靈氣發泄盡矣將來聖躬豈不受虧時山陰一語不發飯畢各謝恩出矩備述鯉言復命上曰此言甚是你與沈先生說有甚培補法鯉對曰但急停礦安靜久靈氣自復便是培補之法矩以復上㸃頭四明聞之草疏以上上怒久之始有停礦分稅之㫖上乳母翼聖夫人其夫官都督同知疏請令其侄承襲傳㫖內閣准行鯉曰都督同知非世襲官且侄不祔姑亦無姪襲之理上謂夫人曰這人情內閣不肯遂止真人張國祥言皇孫誕生有祝禱功乞三代誥命且乞世襲詹事府主簿上亦傳㫖准行鯉疏言不可皇上如念其微勤止有金帛酬賞名器豈宜濫與上然其言雲南稅監楊榮為諸武辨所殺上震怒立命緹騎逮諸武臣鯉奏言朝廷取雲南艱難及其地方反側難定次開楊榮罪惡諸欵今被殺雖非國家法紀亦見聖德入人之深其地不忍謀叛但殺其首惡以一兩人正法即定矣若遣官逮是速其反也上怒解即罷逮沈四明以妖書謀危鯉上見素定屹不為動在閣時以一木屏書天啓亶聰撥亂反治一望謹天戒二望恤民窮三望開言路四望發章奏五望補部院大僚六望補中外庶官七望起用廢棄八望照例考選九望釋放寃獄十望撤回稅監每辰列屏焚香祝天四明即向內監譖鯉呪詛上一日遣人取屏覽之曰何為呪詛陳矩明其誣而止癸丑部請召用先是科臣張延登疏云自皇上御極以來閣臣二十有一人只王家屏沈鯉有立朝之節而未竟其用請特召以章眷戀舊臣德意甲寅請存問謂鯉精忠亮節未登首輔今年已八十四例宜存問野史氏曰人臣事君以道進退有禮如公者其庶幾乎泰交紀略大假已具而部請特召請存問君臣終始之誼亦無憾矣所未盡究其用者非主眷之不專而讒邪間之也豫少逰京師聞之縉紳多如是言嘗一日於安肅道中憩烈婦祠側樹陰下土人云適沈閣老過此下輿步行其崇重節義如此董恭敏堯封堯封字淑化洛陽人嘉靖癸未進士擢御史按四川值三殿採木蜀民疲於奔命堯封極力調停公私交濟世宗每向徐文貞語兵事稱御史而不名尋升都御史撫操江為江陵相所銜奪官江陵敗起撫甘肅纍官戶部侍郎卒諡恭敏贈尚書子定策萬厯甲辰進士擢御史薦曹端尤時熙孟化鯉等曰古人以學為實今人以學為名若臣論三賢皆務實也前後疏務引大體按甘肅卒郭少傅朴朴字質夫安陽人嘉靖乙未進士由庶吉士厯官少傅大學士朴生平淳謹孝敬十一嵗師事郡學生鄭世安授毛詩鄭端人也嚴訓誨即厲色斥之朴自省咎不敢有怨十四嵗舉茂才固安楊公以狀元督學中州甚器重之崔文敏銑嘗謂朴曰王汾州勳之亷介苦節不可及向曽靣與之約渠若終於豫前當為之立傳後崔先勳二年卒朴著三士歎蓋述勳亷介有崔史今已亡誰哉闡髙躅之句同邑李學詩農家子幼有大志朴見之曰李子真實無僞殆不失赤子之心者也其後宦轍所至輒有名蹟三士一鄭一王一即李也朴早厯禁垣負公輔之器尤謙抑無傲色無惰容兩典銓部絶請託奔競惟以大公行之其稱進以賢不以譽其斥謫以不肖不以毁且度地逺近才細大要使人與事相稱而止否雖權勢所主不稍假借而大指乃在惜人才捐細過毋以刻核繩下嘗謂人稱銓曹為恩怨府夫亦已自為恩怨耳恩怨出于已實難自人何害故在事日久人莫測其喜愠之端考察內外羣吏注授百僚賢不肖無爽天下翕然頌大宰真能舉其職朴與新鄭同入政府萬厯癸酉王大臣事新鄭危哉江陵險哉朴以坦夷誠篤於時言者猶摘及之亦苛矣神宗遣使存問卒年八十三孫竒逢曰豫童時聞安陽郭閣老從不與人競鄰人化之亦相遜讓因名其所居之地曰仁義街迄今傳為美談夫相君一身係天下安危關生民利病家人禮讓事亦微末然有以一節見全體者見公之施實德于民民之被服久而不忘如此也穆廟時與新鄭同在政府忌者雖指為儇薄而時論猶稱其長厚公之為相一如其居家始終一致云李都御史天寵天寵孟津人嘉靖戊戌進士纍官都御史巡撫浙江因不附嚴嵩嵩授意趙文華等誣陷嘉靖三十四年與張經楊繼盛同日殺於西市明史謂三良無罪一旦致之死天下人心所共憤也子根舉人仕至僉事從尤時熙講學一時學者宗之劉知府容容字汝大羅山人嘉靖庚子舉人素性恬淡動止以禮嘗慕徐孺子非力不食之義習勞甘苦刻意向學恆教授以養父母父母安之姻黨被誣乞居間容諭之曰吾人處世所恃者天道神明而已爾誠誣人即不直神亦置之奈何舍正路而鑽别竇令聞其言乃白誣者生平不茍者女色友人疑其矯强飲外墅而先置美妓於空室夜分鐍戶妓出竟危坐待旦友人太息曰坐有魯男子而吾不知何云交厚哉遊南雍宿正陽主人婦少而新寡夜就容故作暴疾狀呼僮篝燈煎藥昧爽馳去父母相繼卒哀毁逾禮親知慰諭摘禮不慈不孝之文以示矍然汗下始有起色妻姜氏卒泣曰此與我同辛苦事父母者父母不及祿養而姜氏亦以荆布從之吾何忍再娶且有牛衣鹿車之誓矣判黃州逋負有至二十餘年者務以至誠開諭爭先輸納監稅蘄州黠吏悍卒相戒斂戢亷平之譽孚于上下景王柩回京中貴人橫甚素聞容名嚴諭其下無所擾徐撫軍謂其屬曰吾儕嫉閹如仇畏之如虎每每激而取禍覩君事良愧矣擢同知監收船料夜泊蘆州賊拔刀突至詢知為容叩頭謝過仍衛送出境黃人恐其去環訴兩臺任十一年擢南户部員外𣙜關武林公私稱便擢知滇之廣南貧不能行又疾作乞休得允致仕獨居索處一榻蕭然親知勸為中饋計曰老而再娶是為昏悖即賢耶且有纍如不賢敗德破家所不忍道吾即忘糟糠約可以四十年苦行頭陀萌還俗念哉讀書課子泊如也里有不善惟恐其知絶跡公府達官貴人式廬造請亦不及公府事也疾篤猶手一編誡諸子甘貧安命卒時盛暑顔色不變人咸異焉孫竒逢曰昔有人言值白金于曠野遇美女于中夜而不動心者必周孔復生顔曽再世而後能也以觀公之生平誠能易人之所難卓哉方正之品令人斂衽張僉事四知四知字子畏汝陽人嘉靖庚戍進士為駕部時𫝊符闌出干者如蝟一切拒絶即大司馬為貴勢人地亦不假借蜀撫阿寵臣陸某意檄所司為其逺祖宣公樹綽楔制視禹坊特敞四知為僉事斥之曰宣公即名臣功髙神禹耶亟縮之毋占纍宣公為也竟以此獲罪罷官歸閉門著書有中州考韶亭詩集四書釋義崇古韻證若干卷李少保戴戴字仁夫延津縣人也隆慶戊辰進士初授興化令庚午同考官填榜見中式李茂材名係本房所取士即白於衆曰此少師仲子也又職治邑人當避嫌求易一卷主司及監臨曰爾以文取何傷不允戴曰戴既出少師門墻又宰其土雖無私於形迹有萬不可者且少師最不急諸子功名其子大有才不患不售寧留以俟識者長跪堅請易卷始起少師聞之深喜謂能諒我心以其平日治狀揚於朝得行取拜戶科多直諫有欲毁英明閣者戴言先帝建閣有深意三年無改人子至情矧今未大祥事遂寢已掌禮科公校得民譽王世揚楊芳姚嶽祥等若而人布在卿寺臺省郎署藩臬而其首張棟以清直聞江陵數稱戴通逹國體戴卒無私謁遂外遷陜西參議繼擢山西左轄經手出入者數百萬左右人不得一染指巡撫山東適東土大旱議留漕糧以賑濟饑民疏凡十二上悉報可晉刑部侍郎申救李見羅一事薦紳所重董漕運撫江北所在利弊晰如指掌疏革浮糧二萬計民稍蘇息請帑金十餘萬以救饑民改工部值內艱歸除服推太宰時凡七人戴居其後上知戴久特自拔擢之是時采𣙜四出國本未定諸凡言及者多被罪戴立請上霽顔受之疏薦臺省至三十餘人悉報允郡寮吳寶秀華鈺以抗中貴下詔獄戴倡列卿請貰若明職掌定升除計資俸酌南北拔卓異搜遺廢於人情國體大有禆益所屬司勳司王士驥以論事激切犯四明政府政府銜之戴不為動而妖書之獄起金吾有嫁婟於其僚者戴與僚為戚屬蓋陰撼戴也戴决意求去疏十二上報允家居為德於鄉族為德於親友難以枚舉論者謂自海豐以來冡宰數不稱㫖不能安其位獨戴涖職六年司內外計人無間言聞望恩數與海豐同六卿中不多得也弟載字道夫以恩廕仕至戶部員外升鶴慶知府所在有聲野史氏曰李公居官行所無事不求名不立異不黨依門戶厯官四十餘年絶無矜貴之色尚書五部辭例得之恩廕凡鄉黨親識有求必應至於臨朝廷大節不為權勢所移京山李維禎志其墓歸德沈龍江鯉為之表屈可伸太史作明史斷云始焉以得罪張居正而左遷終焉以忤沈一貫而致政其生平人品大槩可知矣雖耽仙𤣥亦不可以苛論也郭尚書淐淐字原仲新鄉人性端謹出語驚人為諸生時李襄毅公化龍稱為中州第一秀才萬厯乙未成進士選庶吉士不妄交接門無雜賔同館中為一焰人題壽詩額云中興柱石淐曰未嘗有廢何云中興竟不應授編修李冡宰戴為姻戚六年無一語為人居間辛丑為㑹試同考官所取皆名流時有講學京師者一給諫約偕往淐曰此如老僧在人烟凑集處誦經言是而意不誠也獨不往癸邜典江右試回同鄉沈龍江鯉在政府淐謁之沈留飲曰余在田間久近事未諳幸時見教淐曰公為政所平章者皆各曹之事虛心與各曹議自有確見如有疑于心與同館公議同鄉私言雖公亦私也沈是其言楚藩之事初即置宗人於辟獄具而蕭司寇與其屬候閣屬為同年淐曰草草殺髙皇帝子孫後有償之者子及司寇也其屬追司冦于朝房而正其事歷遷中允諭德庶子李襄毅公為大司馬有將領欲求遷秩者託琴士說淐向司馬言淐曰此賣朝廷疆土所得豫每痛恨之言何至於吾耳乎琴士絶不與見壬子復典順天試事竣告歸家居十年絶無一字遺長安劉杜諸將四路之敗廷議主守己未庚申間遼警日急淐憂時倍切時弟湸官京師數遺書并諸當事言可以戰庶可以守諄切數千言甚中時弊辛酉熹宗御極起少詹事掌南翰林院事疏辭不允尋升禮部右侍郎時勢孔棘未敢例辭壬戌二月廣寧陷奮然具疏力疾就道其略云人謂山海真足以守臣謂我之兵力足以勝敵而後得安不足以勝敵支敵終不得安內帑有金錢四海有壯士而不奮然從事待帑金費盡一絲一粟取之民間恐征求繁而邦本竭矣聖主方憂臣安所辭辱臣亦安能為有為無但欲與諸臣靣相講求虛心質難務求至當以為社稷蒼生計疏上即攜家行時畿內人心風鶴沿途皆南嚮淐獨盡室北轅至中途感瀉痢至順城門外養病未見朝而逝卒時年六十朝臣言淐此行以身殉道之事惜未究其志賜祭葬廕贈禮部尚書性孝友恬靜官京師名其齊曰適量謂窮通得喪莫不有量貧賤未嘗無樂富貴未嘗無苦貴適其量而已寧陵吕公坤家居淐所推服為真儒有抑之者淐力伸助孫文忠承宗督師關門淐嘗有書勸其選將恢復文忠多用淐議所著有緑竹園草若干卷野史氏曰公為詞臣口不談學而躬多實修所交接皆一時名紳余于壬子曽識其人而心儀之又十年壬戌東事方棘國事日非公與其弟湸深憂之日與當事鰓鰓為招兵禦敵之策而當事者不能用因力疾上疏以痛哭流涕之言而抒其忠憤欎結之氣此與孫文忠同一心事志未遂而身已殞惜哉郭參政湸湸字季昭新鄉人定識不倚潔而有為中萬厯庚戌進士初為行人有齮兄宗伯公淐者因而厄湸遂量轉戶部主事㑹有榷關差利可數萬計湸力辭曰象焚在賄吾不欲以資賈患也遷荆州府知府州縣糧止易其牒原封不啓火耗以息諸生剽悍與監司抗鱗聚數千㰱血煽亂縣令畏懦湸遣健丁往勾之衆皆散檻十人以坐其率自是諸生遂不敢逞嵗大祲湸為裁其重輕停徵勞徠以救民急安酋閧天子方事誅伐督師檄土司兵湸曰土司今皆餒民耳安得兵乎募牟人三千荆人三千擇將領之安酋遂不能為害尋升津門兵備問民疾苦而津兵兩營久疲頓歲支金按數以給湸為條畫班次休息訓練部伍肅然是時魏璫心腹以覺華島瞽將託湸湸曰軍中闒茸安用此輩噬腓耶此島與夷隔一水寧得罪巨璫不敢誤封疆事璫又託兵部為某求旗鼓湸持益堅璫遂嗾陸御史彈湸乃補揚州二守吏以公費銀餌湸笑却之未幾遷南昌守鈐强宗勘逋賦加意練兵繕營房米鹽械器各屬邑得兵一千三百有備無不鞏而粵冦至豫章謐如擢山西糧道及至諸冦嘽太原湸持議合勦躬測其要害總戎某懼賊如虎軍不佶間而縱之掠民湸爭之以是憾湸賄監臣某毁公於捷疏中尋以參謫歸蘇門而太常卿張鏡心薦湸可當重任補鞏昌湸至多儲火炮鳥鎗濬濠築城以開荒甽罷其催科時兩當殘後委羡金二千臺使者來問羡湸曰已抵逋賦矣擢莊浪兵備副使往年黑尚仁啖夷以利諸熟番亦濟之商賈不行環千里為墟湸振旅出猝遇西夷覿我兵整不敢逼時松山將士麏至旌斾煌耀遂避去兵糧壞於商稅復朘削身無完衣湸恥為侵牟諸番皆曰親我乎有爭辨為亭平之資番之力以禦夷頗得其助而邊事亦不囂矣又為區畫地田官民買牛種以軍護民耨訟無贖五凉惟莊殘湸在莊二載練甲積穀為西北一隅雄遷凉州參政凉去莊三百里故多强番湸曉諭遏所出沒視湸齒頰為三尺而能絶長久害以勞成疾卒於官年六十八陜西巡按王章具疏陳宦蹟得恤湸謹言訥訥進退有度厯官亷約常取給于家臨終無長物云所著有居官草暨家藏集野史氏曰公厯官絶無染指常取私家之積以為在官之費雖其家素厚亦其清操介節守之已定故不見可欲而遷公家世前未有顯秩然多實德祖孫父子兄弟列鄉賢祠者五人可謂能世其德矣侯太常執蒲執蒲字碧塘歸德人萬厯戊戌進士御史按甘肅抗疏論三相李廷機朱賡方從哲又言天下方有兵事用大臣宜其材孫礦非無文學不可手持書卷坐大司馬堂居言職與官應震同年同官最昵一日應震謂蒲曰鄭貴妃方有寵青宫未可知吾與公陰擁戴之不世功也蒲怒叱之遂與絶交又論僧逹觀假佛法搆煽禁掖詞臣陶望齡首倡拜跪稱弟子為辱官壞風俗天啓初趙南星為冡宰因髙攀龍言起蒲為光祿少卿遷太常卿㑹當祭祀魏忠賢欲代行禮蒲先期上言曰天壇寅清之所皇帝所對越以事上帝者今有宫奴閹豎連行結隊狂遊嬉戲臣職典禮不敢不言竊謂刑餘不宜近至尊况天神饗祀之地乎宜下所司論治忠賢大怒遂致政歸子二恂恪丙辰進士同以忤璫歸恪另有傳侯祭酒恪恪字若木歸德人萬厯丙辰進士己未選庶常天啓間為編修璫賢竊政殺楊漣繆昌期等尋疑疏草出恪手亦欲殺恪其假子田爾耕代為求釋遂欲招之恪辭色甚厲田大怒嗾臺臣彈以邪黨忠賢矯㫖削籍為民崇禎初璫誅起恪為庶子職記注有浙人溫體仁者揣天子意自為書訟言羣臣朋黨得召對上大恱趣立為相恪纎悉疏其醜體仁病之數曲懇稍改易恪不肯而謂人曰體仁奸過林甫而僞强介若盧杞果執政天下且亂體仁銜之乃出恪為南國子監祭酒恪能詩文有集二十卷張都御史應辰應辰字環北河南衛人萬厯丙辰進士擢御史巡視中城有中貴殺人應辰議抵罪大忤魏忠賢意後巡按廣東忠賢生祠遍天下應辰獨不行諸僚屬謂必不免禍崇禎立諸寮屬轟然請謁應辰謂緹騎至啓門始知忠賢誅諸前不至應辰所者詣庭請罪升都御史撫甘肅斬獲一千八百級卒於秦常知州維翰維翰字子羽歸德人以舉人授保定令邑故褊小維翰隨任其俗人不知有令既滿當遷其姻侯司徒恂數問所欲得者皆不應其子異之謂曰司徒自篤親我自守已遷東平州守既至見民飢開倉賑焉當催科嘆曰吾民今賣妻子保性命天子豈知其至此哉然停賦則病國吾願輸家財抵之乃盡鬻其田廬二萬金猶不足遂坐謫有中官道過東平勢張甚前路令守皆起居拜跪有所饋獻維翰閉閣不與通更禁其尉尉叩頭爭卒不許人稱其介云傅莊敏振商振商字君雨汝陽人進士選庶吉士巡撫南贛巨寇江囊等受縛遷南京兵部右侍郎時魏黨懷寧侯孫承蔭毒軍蠧民道路以目振商彈之崇禎時升兵部參贊機務尚書軍政次第舉行卒贈宫保諡莊敏張尚書鏡心鏡心號湛虛磁州人生而岐嶷不凡修幹豐額眸光射逺相者曰異日當樹軍功萬里外天啓壬戌成進士授蕭子令逾年治行鞺然調曲陽再調延令攝篆海陵所在著循蹟倪太史元璐為詩十章紀其事有漢書載有張堪在未必漁陽敵海陵己巳以卓異授禮垣首陳破門戶勤撫綏節財用禁加派汰冗員杜餽遺開言路七要上嘉納時舉諡禮臣訪册溢七百人鏡心謂當一正以纍朝實録寧嚴勿寬寧核勿狥因臚鐵鉉李已羅綺數人進上深韙之冬邊警至急鏡心陳防禦八策請出御史吳阿衡於獄時薊督劉某失守逍遙東撫王某擁師逗遛援帥侯某縱兵焚掠并糾置重典先後封事十餘上庚午上中興十二事一謹微上一切好惡不可令人窺測可測則人得以私意附㑹失天下是非之實一持平上待人當勿意必一如天之鑒物禍福惟所自取勿以同異為好惡勿以好惡為低昂一推誠一去察上求治太過御下太疑常使人伺外事中外囊括拱手非國家之福一辨言一用人人心不同立言亦異生材不易知人更難一慎刑罰治亂世從重典皇上深得此意若以一眚小誤槩廑雷霆灰後來任事之心一抑躁競宜因事隄防以杜夤緣一責成功勿誤封疆致後來推委一收人心一實訓練一馭大將古武臣閫外成功皆從將相和衷豈可體統相加今日之事須一文臣提督而文臣掣武臣肘樞輔詳言之矣便宜飭樞輔承任必能建竪柄政者曰不圖今日見魏公十漸也齎詔滇黔歸奏普酋狡黠宜及其子幼仇多勑督臣朱燮元以恩信固結土司早圖勘定貴陽山多土少水外地腴甚可資屯種不得因安酋要求輒輕議與上以為然辛未冊封岷藩王庭設師賔禮錫兼金辭癸酉典試江右所得皆名流還朝擢吏科都典大計烏程謂有數大猾當斥若俟請間而授之㫖者鏡心為不聞已笑曰吾知奉公耳焉能齪齪淟涊代秉成伐怨哉條上計六事甲戌升太常再升大理請終老不允乙亥升南光祿卿在官積金四千金米三千石以實神倉丁丑晉兵部右侍郎兼右僉都總督兩廣粵提封四千里夷漢雜處時安南通貢獞獠藪奸楚孽震鄰海上紅澳諸夷連檣入犯所部文武吏六百在天末法弛貪惰成風抵任首嚴竿牘藩臬而下無敢贄見所需絲粒皆抵直且浮之涖事五載凡軍國大政劌心擘畫夜不交瞚下所司相商手答動十往復不厭故夷分冦警旋起旋撲復上緝馭交紀二十二卷上是之命外吏奉行其自奉甚亷統計積榖一百八十二萬五千石後歲眚粵無殍者復立社學招集黎之生童誨以小學孝經諸書黎知向化葺邵文莊㸃易臺暨陳白沙祠辛巳春升兵部左侍郎壬午邊燧急舊督張福臻因道梗未至簡鏡心往既而福臻至議别用兵部叙山左前後擒斬功工部叙奉行設備功加爵二級逆賊圍汴鏡心請設備共城以聯屬小民未幾其父母相繼殁以憂里居甲申賊潰秦晉遣僞將收河朔鏡心避難南渡黃道周薦鏡心練達老成堪簡任柄政者欲援奪情例起用鏡心曰草木游魂敢與天下事乎遂去卜居姑湖乙酉歸耕釡上之田杜門著易寒暑不輟凡數削稿皆手自批録生平慎交與范景文蔣德璟陳仁錫倪元璐黃道周劉理順賀仲軾善黃以諫言廷杖上怒甚連治羽黨知交不敢問而黃家素窶即饔飱不繼鏡心以三百金遺其子曰故人不負官故人之祿不足纍友後黃公寄詩四章有患難勞相恤妻孥感至誠之句丙申四月卒於家年六十七所著有孝友堂集百餘卷孫竒逢曰公晚年潛心性命之學謂羽翼六經不第宋數大儒如漢董江都唐王文中皆有得乎儒之醇而元劉靜修許平仲當世道荆榛倡明教統厥功尤大嘗欲搜集厯代諸儒語録豫暨二三同志選輯商訂彚為一集端緒未竟而公已殁矣豈不惜哉中州人物考卷五
