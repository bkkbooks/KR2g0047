body:
  text: 中州人物考卷六容城孫竒逢撰武功李揮僉英附子灤城侯堅英武陟人仕元為河南行樞密院知院洪武元年自陜州來降授沂州衛指揮僉事從右丞相徐逹平章常遇春定中原收北平追哈喇章國公至興和還取保定中山諸郡復追獲元知院呼必瑪勒等二年從徐平陜西三年征定西擊走王保保復從御史大夫湯和征察罕諾爾取東勝沙靜等處四年伐蜀克階文二州敗偽丞相戴夀等於成都五年曹國公李文忠征沙漠英與哈喇章戰於烏龍江破走之十一年又從西平侯沐英征西番擒三副使以功纍遷驍騎右衛十四年潁川侯傅友德征南以英為前鋒既克雲南進攻楚雄大理皆有功及攻圍烏蘇諸蠻土官實卜等以衆數萬拒戰英與麾下士奮擊斬數百人而死詔贈鎮國將軍指揮使堅鎮國將軍英之子也洪武中以功臣子選尚大名公主授駙馬都尉建文即位公主進封大長公主堅以軍功封灤城侯無何命耿炳文北征拜堅為左副將軍及與北兵戰於真定時炳文軍惟備西北其東南無備北師出其不意夾擊之炳文幾為所擒北將丘福攻子城堅領兵接戰互有勝負已而兵敗丘部內騎士薛祿引槊刺堅墜馬刀斫之堅大呼曰我李駙馬也祿生擒以獻文皇謂曰爾至親也今至此尚安逃乎械送北平道死子莊當襲爵公主時猶在懼禍至乃納其誥劵莊遂流寓南京娛情詩酒以夀終焉梅汝南侯思祖思祖者夏邑人也初為張士誠中書省左丞守淮安嵗丙午大將軍徐達既下髙郵進兵攻淮安思祖封府庫甲兵率衆來歸上嘉之授大都督府副使是年八月從達伐吳取浙西十月攻升山水寨克之降偽吳將吕珍得兵數萬十一月下湖州進圍蘇州吳元年九月城破士誠被執師還特降褒諭擢浙江行中書省右丞階資善大夫十月從征中原克山東沂州等郡洪武元年取大梁破陜州下潼關七月旋師徇取河北衛輝元守將平章龍二棄城走彰德師至彰德龍二復出走同知某等詣降達以思祖統和陽衛兵守之復得龍二部將楊義卿船八十餘艘未幾檄赴北平取未下州郡遂征山西二年晉冀悉平復從征陜西取奉元鳳翔平涼鞏昌四郡八月於邠州獲故元參政毛貴等三十人送大將軍斬之十二月中原平賜思祖白金十斤文幣十五襲三年四月擊走王保保軍於定西還自秦州破略陽入沔州取興元是年論功封汝南侯四年伐蜀五年征甘肅還命巡視山東陜西遼東諸處城池十四年九月四川水盡源通塔平散毛諸洞長官作亂命思祖為征南副將軍同江夏侯周德興率兵討之未幾諸洞夷悉平十五年復同傅友德克平雲南置貴州都指揮使司以思祖署都指揮使上以雲南初平欲使重臣鎮之又命思祖署雲南布政使司事思祖善撫輯民夷安之十月丁丑思祖薨賜葬鍾山之隂子義武德衛指揮升遼東都指揮使余指揮思銘思銘者商城人也元末以義兵歸附授平章職事守禦金剛臺甲辰八月詔思銘領所部兵從征是年平司空山程德權有功乙巳擢陸安衛指揮同知仍司金剛臺事復擒德權餘黨祝平章等檻送中書省誅之洪武元年思銘如京師推恩授兄子端廣東川廣衛鎮撫勤湖廣銅鼓衛鎮撫思銘益自感奮九月從總戎宋公渡懷慶澤潞等處二年復命攻桃花尾尖二寨平之事聞封思銘父法為明威將軍指揮僉事母鄭氏德人已而復從大將軍取魯臺陜西鳳翔諸郡賜緋衣一襲綵榻一面調守平涼明年收王保保歸徙寧夏衛給誥世襲五年復徙華山衛八年正月坐事左遷寧夏指揮僉事三月復歸華山十一年詔征西番至中途病子享襲劉指揮先先字光祖密縣人也仕元為平章政事元亡以所部兵來歸從鄂國公常遇春信國公湯和收河北諸郡洎西戡晉絳敗王保保兵復從大將軍達克陜西秦鳳環慶諸州洪武初由平涼入覲授驍騎前衛指揮僉事明年復從征迤北調驍騎左衛七年守茶陵衛加授廣威將軍十四年調征雲南所至身先士卒大小五十餘戰俘獲斬馘甚衆雲南平置烏撒衛指揮使司擢先為指揮同知以鎮之時治所新設涖事精勤蠻獠畏服進懷逺將軍卒於官年六十三子廣積官驃騎將軍右軍都督府都督僉事何莊毅德德者光州人也至正末太祖龍興德杖䇿來歸從上定江左諸郡轉征吳楚屢立竒功授驍騎衛千户吳元年七月沅陵人向珍八作亂德率兵討之至官廳巖珍八以衆逆戰德擊敗之進拔其寨而斬珍八八月逆黨周文貴率划船三百餘艘復攻辰州德使别將與戰於西門外自將輕騎直抵其寨攻破之獲張千户等百餘人文貴退保麻陽德追擊之又俘其萬户等四十四人文貴遁去是年拜虎賁衛指揮僉事既定中原升指揮同知率兵守遼東召還改虎賁右衛指揮同知尋擢大都督府都督僉事洪武十三年改立五軍遂為左軍都督府都督僉事十七年扈從北征還七月己亥以疾卒於家年五十二賜葬鍾山之隂追封廬江侯諡莊毅梅榮定殷殷汝南侯思祖從子恭謹有謀能騎射洪武十一年尚寧國公主為駙馬都尉諸駙馬中髙皇尤愛殷嘗受密命輔建文靖難兵起殷充總兵官鎮守淮安悉心防禦文皇假道殷割使人耳鼻口授詞答文皇曰留汝口與殿下言君父恩義文皇竟不得道淮安乃渡泗水破盱眙出六合至京師即帝位殷尚擁重兵淮上上迫公主招殷公主嚙指血為書遣中使達殷殷得書慟哭詢建文所在中使曰去矣殷曰君存與存君亡與亡吾姑忍俟之乃還京見上上曰駙馬勞苦曰勞而無功永樂二年冬都御史陳瑛言殷招藏亡命私匿姦人與女秀才劉氏朋邪呪詛幾得罪明年冬入朝殷仇家都督談深指揮趙曦令人擠殷死笪橋下曦誣殷自投水死都督許成發其事上怒罪深曦二人對曰此上命也奈何殺臣上大怒立命力士持金瓜落二人齒斬之諡殷榮定初公主謂上殺殷牽衣大哭問駙馬所在上笑曰為公主蹤迹賊無自苦公主謹護二子順昌景福上以順昌為中府都督景福指揮旗手衛僉事賜手書二甥曰朕不念爾母爾安得至今日二甥後改孝陵衛指揮使宣德中與世襲曽孫純字一之以博學稱登王華榜進士為中都副留守有損齋備忘集百川學海行於世或曰公主嘗貽書阻靖難兵文皇不答兵至淮北與公主書言興師不得已故令遷居太平門外勿罹兵禍公主亦不答公主髙皇后長女陳建曰殷有才智太祖最眷注臨崩皇太孫與殷侍側太祖首囑太孫曰燕王不可忽次謂殷曰汝老成忠信可托幼主乃出誓詔及遺詔授之曰敢有違天者汝其為朕伐之至是靖難兵漸南逼建文乃令招募淮南民兵合軍士號四十萬以殷統臨淮上扼燕師燕王遺殷書以進香至金陵為辭殷答曰進香皇考有禁遵者為孝不遵者為不孝王大怒復書言今興兵以誅君側之惡天命所歸實非人所能阻殷割使者耳鼻不復報書口授數語曰留汝口回去説知其詞甚峻野史氏曰公不負髙皇之托能盡忠於建文於義甚篤愚謂建文去矣便是公靖節之日也改頭换面另事新主初志謂何即不然蹈方鐡之憤烈慘苦所傷亦多故不如早自決之為愈也窺公之意仍欲得一當以報是未可知駙馬勞苦勞而無功此二語猶可想見君臣中姻戚之意雖無慘禍勢必殺公借他人之手存公主之顔亦霜雪中陽和也張忠武玉玉字世美祥符人也以元樞密知院來歸太祖禮遇甚厚玉感奮思效洪武二十一年從征博裕勒海子喀爾喀之地以功授濟南衛副千戶又從征盆鴻特穆爾至延安延州進安慶衛指揮僉事二十四年北逐元人之擾邊境者至鴉寒山而還調燕山左護衛明年轉都指揮同知三十一年文皇舉靖難之師首用玊䇿攻北平九門三日城內外悉定師將出上問玉何之對曰薊州要地不先平將為後患薊平餘不足圖師至薊諭之不下玉環城而攻薊守馬宣率衆出戰遂執宣殺之并執指揮毛某玊知其才釋之送詣北平是夜玉趨遵化簡勇敢士四鼓登陳開其城門將士皆入城中始覺守將率兵拒戰執其將斬之餘不殱一人將吏悉隨玉上謁而永平密雲皆望風輸欵諜報長興侯耿炳文率兵二十萬屯真定玉自請往覘還言軍無紀律不足慮也若徑趨彼雖衆新集我軍乘其未備一鼓可破也上曰然明日遂抵真定接戰炳文大敗俘其左副將軍李堅右副將軍寧忠及都督顧成等斬首三萬餘級上謂玉曰此行汝之功也非汝與吾意合不及此是時江隂侯吳髙以遼東兵攻永平城甚急而曹國公李景隆引兵數十萬將下北平上與玊謀先援永平既至髙望風棄輜重而去玊從上追之俘獲甚衆玉因言大寧去此不逺請移軍襲之遂攻大寧自辰至午城破斬其都指揮朱鑑執都指揮房寬下令撫輯城中頃刻而定乃趨北平而景隆兵已圍城數日玉請先擊然後入援於是徑搗景隆營大戰三日城中亦鼓譟出內外夾攻景隆軍不支遁去復攻廣昌蔚州大同諸城皆下無何景隆收潰散卒號百萬且復至玉曰兵貴神速先事者勝請往駐白溝河以待後三日景隆果至玉擊之斬馘無算景隆敗退保濟南玉乘勝追躡圍其城既而解圍攻滄州獲其大將徐凱進攻東昌而東昌兵已列上以數千騎驍出陳後忽被圍衝擊而出玉不知上所在突入陳大戰連殺百數十人玉亦被創而沒時年五十有八上聞哭之慟既旋師諸將皆侍語及東昌事上曰勝負兵家常事不足計所恨艱難之際失張玉良輔耳吾迄今寢不帖席食不下咽乃澘然淚下諸將感泣上既踐祚顧侍臣曰張玊才備智勇論靖難功當第一惜其早沒贈奉天靖難推誠宣力武臣特進榮祿大夫右柱國追封榮國公諡忠顯昭皇嗣位加封河間王改諡忠武配享成祖廟子三人長輔自有傳次輗天順初以翊戴功封文安侯卒子斌嗣坐咒詛國除軏與兄輗同日封太平侯卒子瑾嗣成化初以冒功國除野史氏曰忠武自拔來歸擇主而事可謂智矣又事文皇得展其知略不但大將諸事可否進止衆論未定者數語立決得君如此須以死酬知東昌戰沒得死所矣視其子輔死土木未可一概論也張忠烈輔輔字文弼祥符人河間忠武王冢子也器宇雄壯顧盼有威文皇靖難時屢立戰功封信安伯加新城侯永樂五年安南國陳王為黎季犛篡弒輔為元帥統兵八十萬往問其罪既入境賊沿江列柵六七百里水陸拒守王師拒江口破其堅壁遂拔多城進攻交州入之乘勝引兵蹙清化城覆其巢穴降夷民十餘萬季犛遁入海屯兵鹹子關賊來襲逆擊敗之繼督舟師往攻斬馘數萬級窮追竒羅海口生擒季犛并其二子蒼澄餘衆降附交南平得郡縣一百三十四戶三百一十二萬輔建議復古郡縣置交趾都布按三司統鎮之凱還進爵英國公七年餘孽簡定僣偽號煽衆復叛惟交州完守又命輔征之率師二十萬獲簡定於吉利柵之山而歸九年賊陳季擴倡亂復陳氏再命輔往討賊聞王師至走海洋據險荷花口輔率兵促之至愛子江登岸賊設象伏以俟輔偵知之以戒先驅羣象來衝一矢落其象奴再矢披其象鼻象奔還自相蹂踐大軍乘之擒斬無算遂獲陳季擴以獻是役也取勝於至險之中衆以為神既而以輔鎮守其地盡平餘冦宣廟時漢府密遣人與公謀公即縛其人白於宣廟覺之既早故易於撲滅宣廟愈重之後死於土木之難公寡言笑重章縫之士為本朝武臣之冠天子曽稱其知禮卒年七十三嵗追封定興王諡忠烈野史氏曰先輩論定關中必曰馮鄧取江左必曰預濬至如公一平交趾三縛渠魁易草莽為桑麻變雕題為華夏豐功偉烈又豈定關中取江左可同日而語哉惜也不死於交趾而死於土木人猶以為有遺恨云任僖武禮禮臨漳人洪武初授燕山右護衛總旗建文時文皇征懷來等處禮以功擢副千戶又從戰於白溝河克東昌藁城臨德及金川等九門纍擢都指揮同知永樂初上北伐加驃騎將軍逐北冦布尼雅錫哩至靜虜鎮而還升都指揮使十二年二十年俱從上北伐升中府都督僉事命率兵討哈喇及歸轉左都督正統改元充總兵官守甘肅會敵至禮擊之大敗復追至石城盡殱其黨是年封寧逺伯又招沙州都督訥格等全部來降詔許世襲成化元年正月禮薨贈寧逺侯諡僖武子夀襲夀坐失機國除馬招逺伯亮亮淇縣人洪武中授燕山左護衛小旗建文初從文皇靖難平密雲雄縣大寧等處授都指揮僉事及上即位升陜西都指揮同知八年從征阿嚕台二十年車駕北征亮復從封半壁山而還洪熙改元升右都督宣德初戡平會州以功進左都督正統九年征流沙河逆冦斬俘甚衆是年五月封招逺伯十一年七月薨以流爵國除子驎授指揮使徐武康伯理理者西平人也國初從諸將定江左諸郡積官至永清左衛指揮僉事調營州中護衛文皇舉兵靖難將下大寧理從間道詣軍門請見遂從上戰於白溝河破雄縣滄州藁城定兩淮入京大小十餘戰理皆賈勇爭先所向克捷纍擢都督僉事壬午封武康伯賜白金三十斤文綺二十襲寶鏹二千五百貫并貂蟬冠復還守北京理寬厚馭下士樂為用永樂六年薨子禎嗣禎薨子勇嗣勇無子國除梁保定伯銘附子蠡國公瑤銘字自新汝陽人也父來仕元為錢塘縣尉嵗丙午率所部來歸從克溫台等郡授某衛百戶洪武末銘以蔭改補燕山前衛革除間北平城被圍銘戰拒甚力以功歷升後軍都督僉事侍昭皇監國於南京坐事下獄已而宥之命往廣東備倭及昭皇嗣位升都督同知鎮守寧夏封保定伯宣德元年從安逺侯栁升往交趾卒於道子瑤瑤字惟善方數載悼父客死不憚險逺奉其喪歸稍長章皇念其世功詔許襲父爵瑤既襲爵益自奮勵命領五軍營紀律明肅士卒屬心正統十三年鄧茂七叛以薦充副總兵征之事寧會湖貴苗蠻冦邊瑶復佩平蠻將軍印率四省師往𠞰至則擒偽苗王韋同烈等披山通道追奔所及每戰皆捷進攻零香寨誅賊首苗銀虎等萬餘人又攻靖州東山口及龍家隘斬獲渠魁伍林仲原等數千級焚戰艦百餘艘於是閩越湖貴之地悉平景泰間進封保定侯掌都督右軍府事天順初出鎮陜西三邊純皇即位召還仍掌都督左軍府事無何疾作薨追封蠡國公諡襄靖子傳嗣傳薨子宗嗣宗薨子任嗣任薨子永福嗣薨子繼璠嗣房思恩侯寬寬者陳州人也洪武中以功纍官指揮僉事革除間守大寧城靖難師至倉卒閉門拒守文皇引數騎循繞其城適至西南隅城忽崩文皇麾勇士先登衆蟻附而上遂執寬寬懼歸附是時李景隆聞文皇克大寧引兵來襲文皇遣張玉將中軍朱能將左軍李彬將右軍徐忠將前軍寬即將後軍十月師入松亭關而景隆軍鄭村壩遣都督陳暉帥兵追躡文皇命玊等逆擊之衆大敗至夜景隆遁去踰年師還北平玉等進秩有差而寬升北平都司都指揮使及上即位封思恩侯賜白金文綺寶鏹并貂蟬冠服子孫世襲指揮使張彭城伯昶昶字仲舒永城人也父麒指揮使永樂九年追封彭城伯諡恭靖後又贈彭城侯乃誠孝昭皇后之父也子三長即昶昶冠時昭皇為世子昶備宿衛夙夜侍惟謹文皇靖難師起昶東取大寧及戰鄭村壩連大捷以功授義勇中衛指揮同知遼東兵攻薊州昶擊敗之追至榆口而還是時北平城被圍甚急昶且戰且守及上入繼大統轉本衛指揮使三年調府軍右衛二十二年升中軍都督府左都督昭皇即位封彭城伯明年侍衛章皇謁孝陵歸命總督操練左哨軍馬正統元年薨葬宛平壽安山之原子八人輔輅輗軏軾轍䡕轅輔先卒孫瑾嗣瑾卒子信嗣信卒子欽嗣張惠安升升字叔暉麒季子初以守城功授義勇衛千戶永樂三年升羽林前衛指揮僉事調府庫衛七年授誥封昭勇將軍十二年隨駕北征二十二年升後軍都督同知洪熙元年升左都督宣德元年宣宗征武定州三年巡邊俱命分守北京四年上優禮至親命輟左府事朔望奉朝請凡朝廷有大政事亦得預議正統五年封惠安伯嵗祿一千一百石賜誥劵子孫世襲六年正月以疾卒夀六十有三訃聞遣官諭祭敕有司賻葬太皇太后遣官致祭升為人端重孝友之德夙著於家閨門整肅教諸子有方平居簡默臨事卓有定見歷事四朝公勤忠謹未嘗有過宣廟為皇太孫時往來兩京及隨事文皇帝北征皆命以保衛出入起居深有規益其居顯官恆自謙抑每升拜祗畏如不勝其臨政事必咨詢同官審擇而行不恃已長遇文學士必加禮敬服食儉素絶無富貴態而急於利人常施藥石以療人疾為糜粥以濟飢者少留心載籍至老不倦見古忠臣孝子端人正士每遇事輒以訓諸子故子孫世守其家法云子鞃嗣鞃卒子琮嗣琮卒無子弟瑛嗣瑛卒無子弟瓚嗣瓚卒子偉嗣偉卒子鑭嗣野史氏曰公居官居家敬慎謙抑武功而有文德者也垂裕後昆世守勿替至甲申大難閣門殉義更於祖德有光愈見貽謀之善吕揮僉毅毅項城人始為濟陽衛百戶文皇靖內難毅從征以功積官至指揮同知永樂三年升都指揮僉事與黃中同治兵廣西又同以兵送前安南王孫陳天平歸國中違上指使毅不能爭敗績於雞陵既皆宥其罪仍以本職從征以毅過薄命充鷹揚將軍交趾平毅與有勞命掌交趾都司事毅深沉有勇略與賊戰深入陷陳死焉朱武襄謙附子武毅永謙者夏邑人也初為鳳陽留守左衛指揮僉事纍從北伐以功擢萬全都司都指揮使尋遷都督僉事兼右參將仍守其地時萬全城圮敵每至人心震恐謙修築是為新城邊人至今賴之正統四年謙用薦充總兵官鎮守宣府會敵入冦斬獲渠魁以下千餘級久之不敢犯景泰初論功封撫寧伯未幾額森欲奉上皇南還舉朝以為詐不從獨謙上書懇請景皇持不敢發召諸大臣問吏部尚書王直亦以迎復為對上不懌曰當時大位是卿等強朕為之今將置朕何地少保于謙對曰大位已定孰敢異心但欲遣使答禮少紓邊患耳上意始釋曰從汝從汝乃遣李實羅綺奉敕迎復語在北使録中明年二月謙薨進封為侯諡武襄永宇景昌謙之長子少警敏嗣爵初景皇命掌後府左都督事天順八年總理神機營兼管三千營成化二年逆賊劉通苗龍等竊拒荆襄僣稱尊號屢征不克上怒以永統總兵官同工部尚書白圭都御史王恕王儉都督李震鮑政喜信太監唐慎少監林貴都指揮王信劉清田廣率兵往討是年三月至南漳詢之土人謂賊之巢穴在萬山中豆沙河之境於是決䇿深入時永以疾暫留控扼圭慎震儉自南漳進兵貴政自逺安進兵信政自房縣進兵恕清自榖城進兵賊見我師侵逼通徙夀陽欲出陜西龍徙大市欲出逺安永等調兵趨夀陽截其奔路通乃退保大市與龍兵合閏三月二十二日廣進至雁坪遇賊擊之追至古路山明日廣與諸軍皆會進攻斬賊首劉聰及偽都司苗虎等百餘人追至格夔山賊將家屬退保後巖山二十四日賊據險懸架輥木礧石各執鎗牌器械以抗我師永震等攻其右信信等攻其左政等衝其中清等襲其後四面夾攻賊下木石如雨永等往來督戰士卒爭奮扳崖涉澗蟻附而登鏖戰纍日呼聲震山谷賊遂大敗擒通等二千五百七十餘人斬首二千二百六十餘級俘獲賊屬子女萬一千六百有竒招撫脅從流移萬八千五百有竒南土既寧上降敕褒論永進爵為侯圭等升賞有差十四年加永太子太保或投匿名書言永圖不軌永乞解兵柄不許其冬手敕加太傅太子太師永治軍嚴肅所至多奏功前後八佩將印勛名無與比𢎞治九年二月薨追封宣平王諡武毅子暉嗣暉薨子麒嗣坐劾降為侯麒薨子嶽嗣李興寧伯震震者南陽人左府都督僉事謙之子也正統五年初襲指揮使九年征烏蘭哈達以功擢都指揮僉事已從王驥征雲南麓川事平升都指揮同知景泰間以參將平沅州麻陽天柱江東靖州卭水橫坡平州諸處逆冦斬俘記隆陳添仔及偽稱苗王韋同烈等一萬四千餘人纍遷都督僉事天順四年充總兵鎮守武岡州是年擒偽稱太宗妖賊李天保五年復平西延連山道州諸冦斬馘八千六百有竒成化七年擢右都督同都御史項忠撫捕荆襄流民事竟乃上疏曰荆襄地連河南川陜延蔓數千里山深地廣易為屯聚自洪武初命申國公鄧愈誅夷之後禁革山場無人敢入永樂以來流移之衆嵗集月聚巢穴其中無慮百萬今臣奉敕撫捕其有貫址姓氏者謹依詔旨省諭出山復業陸續共得九十三萬八千餘人其餘混處賊巢無籍檢察四散奔走者又莫知其數其內小王洪有衆五百屯於均州龍潭溝李鬍子有衆六百屯於竹山官渡已令官軍分道首擒二賊餘多散亡及諸軍前後共斬首千餘級并八山俘獲脅附之黨二萬八千七百餘人充戍湖廣各衛計可得軍五千并其族屬附籍收管給田屯種庶恩威並濟反側可安矣奏入上嘉恱震進左都督十二年以平清水江逆冦功封興寧伯食祿一千石明年汪直用事信任錦衣衛千戶吳綬其兄參將經與震有隙乃奏震嘗私遺項忠造室侵地下錦衣獄拷掠備至震遂誣服革爵徙居南京二十年召還復其爵仍命間住震鬱鬱不樂竟以病終梁武莊震震新野人世榆林衛指揮使忠勇好讀兵書嘉靖七年升署都指揮僉事協守寧夏興武營慣戰敢先登八年進遊擊將軍益憤志撫士卒訓練東西接應有斬首功十一年進副總兵延綏十三年以斬首功歷升都督同知十四年升總兵鎮守陜西當是時大同宣府不靖十五年升右都督改總兵大同大同自五堡之役殺巡撫張文錦參將賈鑑尋又殺總兵李瑾鎮巡每甘言煦之稍不如意即反唇瞪目或飛章訛語相搖撼震聞命率家丁五百人馳至雲中申明約束曰我無爾凌爾無我叛王法軍令具在我不敢破紀綱誤國其家丁時時向鎮兵語曰爾敢蔑主將者恃衆耳兒郎輩無不一當五百步內恐爾不得用其衆鎮兵稍斂縮十六年春震率兵出玊林川斬首一百四十進左都督又出黑門山貓兒莊各斬首八十敘一子百户十八年震鳩卒給餉修五堡軍中不敢譁震益身先之與甘苦五堡竟復敵不敢近震卒以五堡功贈太子太保諡武莊家丁無所歸守臣以聞令入伍與衣糧邊將頗得其力野史氏曰兵之勇怯惟視乎將之能否將無節制則身且先犯王法軍令烏能馭衆乎五百家丁練習亦非易事能練習此輩便能統馭衆軍古來名將全在此處見長武莊亦賢矣哉中州人物考卷六
