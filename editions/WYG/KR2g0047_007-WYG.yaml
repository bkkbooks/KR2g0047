body:
  text: 中州人物考卷七容城孫竒逢撰隠逸岳純孝仲明仲明固始人宋鄂王七世孫也洪武初徙家於大梁仲明少負清節隠居不仕嘗廬居於墓側者九年有司以孝㢘舉朝廷三召不起賜號純孝先生今三召祠故址尚存所著有遺安集丘布衣鐸鐸字文振祥符人誠意伯劉基弟子也通儒書兼習醫家言至正末父誠為湖廣儒學提舉鐸侍母留呉越間欲往從之㑹江右兵起武昌陷二浙繹騷鐸憂懼不知所為乃避地四明暨江南皆歸職方復奉母至南京已而其父亦至自武昌鐸賣藥市中以資養未幾弟鈞為㑹稽上虞廵檢鐸與父母皆往㑹稽母疾鐸晝夜泣禱乞以身代及殁哀慟幾絶卜葬鳴鳳山哭曰母生鐸咫尺不離膝下今殁可委體魄於無人之墟乎乃結廬墓側朝夕上食如生時當寒夜月黑悲風蕭颼恐母岑寂輒廵墓號曰鐸在斯鐸在斯其地多虎聞鐸哭聲輒避去㑹稽人異之稱為真孝子云先是鐸在四明從祖父母居汴者八人貧不能自存鐸咸迎養死皆返葬人以為難其姑適河南匡氏者年十八夫亡誓不再適鐸義之養其終身其制行峻絶皆𩔖此張布衣宗魯宗魯鈞州人四嵗失明二十遭亂負母路氏避難其妻扶掖以行嵗飢宗魯賣卜以為養日給不足則令妻採野蔬以繼之天下既定宗魯奉母還故鄉竭力供養母卒仍求其前母曹沈呉三氏遺骸合葬焉洪武中禮臣請表其門文皇聞之曰生事死葬之禮宗魯瞽者乃能盡之豈不足為人子勸乎親製詩褒之王布衣中中者登封人也家業農母殁廬墓三年未嘗櫛髪易衣墓側無水浚井四丈餘不得泉中環井再拜籲禱泉水湧出鄉里以為孝感也洪武中旌表文皇嘗謂曰夫學所以涵養其性非性由學而有也世固有樸魯之民不能盡孝以事親而諉曰不知書豈非自誣其性哉亦有讀書學文而質行反不及者此文過之弊也然則中固可嘉其不如中者亦可勉矣朱睦㮮曰余嘗觀御製孝順事實所錄者古今僅二百有七人而宗魯中皆預焉夫二子者亦惟履人之常而已乃䝉二聖褒諭史氏採錄豈非幸哉巖藪之士事親守身以名行自礪𩔖此而不顯者奚少要之在遇與不遇耳周布衣炳炳舞陽人事母焦氏至孝母嘗病篤炳哀號籲天愿以身代遂愈後復病滯下思食獐肉炳四出求之不得是日晚忽有獐入其家即取供母母病復瘥人以為孝感所致宣徳間詔修五倫書而炳與魏敏皆與焉敏見第八卷皇甫布衣仲和仲和者睢州人也精天文推歩之學文皇北征袁忠徹以相仲和以占從師至漠北不見敵上意欲還師召仲和占之曰今日未中敵至上問自何方曰自東南勝負如何曰王師始却終勝召忠徹問之一如仲和之言上怒曰汝二人朋比欺我乎即械之曰今日敵不至二人皆死乃命中人往覘日中不至復召二人占對如初居頃之中人奔告曰敵大至矣時初得安南神鎗一敵直前即以神鎗擊之二敵繼進復中鎗而斃敵乃按兵不動頃之敵衆齊發上登髙望之召總兵譚廣曰東南隅不少却乎廣率精兵舞牌徃砍馬足敵稍却已而疾風揚沙兩不相見敵引去上欲乗夜引還二人曰不可明日敵必來輸欵竢其降整師而去明日敵果詣軍門伏曰不意乗輿在是也上以幣賜之乃還正統十四年仲和老矣學士曹鼐與隣時有㫖親征北敵鼐急歸召仲和與議曰胡王兩尚書方率百官諌尚可止乎仲和曰不能止也紫微垣星皆動矣曰事将若何仲和曰以老夫計之當先治内而後行曰已有㫖某監國仲和曰不如立儲君而後行曰東宫駕幼且未易立也仲和曰恐終不免於立及上北伐果值土木之難敵騎逼城下城中人皆哭仲和登髙望謂家人曰雲頭不南向乎曰然曰大将氣至敵将退矣明日楊洪自宣府石亨自大同将兵入援敵遂遁胡給事智智字尚明光山人成化丙戌進士歴戸科給事中數上封事彈劾時宰念親老一旦乞歸既登途忽聞父喪一痛幾絶匍匐抵家而母亦卒智哀毁骨立幾不能生服闋親友勸之仕智曰二親既殁更出何為乃扁其堂曰知足自號雲山道人築舍於城南百里外白沙闗竟日掩扉靜坐玩易如此者二十有八年丁巳元旦拜天地畢端坐而逝自通籍以來凡俸金租餘悉以贍宗黨之貧者子孫一無所遺其忠孝大節恬退髙風真有超乎流俗者矣閻郎中倫倫字天叙息縣人弱冠舉於鄉父殁哀毁骨立及塟遂築室於塋側居之晨夕悲號哀感行路成化戊戌登進士歴官禮部郎中遂堅意以疾乞歸為人清慎端敏不樂仕進優游田里累徴不起士論髙之野史氏曰隠逸不必盡不仕者也陳太丘陶彭澤不以仕而妨其隠胡閻二公入官未久歸里即堅卧不出而終身之慕二公一致予謂此方是真隠逸張舉人景純景純字文粹南陽人成化丙午舉人天資穎敏志向精専凡天文地理性命道徳之學無不精究曉悉著書立言名重天下為當時學者所宗王文荘夙負重望毎歎服其人未仕而卒左舉人國璣國璣字舜齊尉氏人也生而穎異七嵗即能詩解音律讀書日數千言弱冠入京師就姊夫李夢陽學六年業畢歸補開封郡學生正徳十一年舉於鄉其聲稱籍甚而四方好古之士不逺數百里來訪其至都下諸公卿大夫又爭迎致之與之游者或累日忘歸獲其片紙隻字輒藏以為寳顧數竒累試不利嘉靖十四年復試禮闈其答䇿問以為今之不治者文過實也文過實處則行誼不修出則治功不成惟務抗名華世而已其意若有所指典文者不恱遂擯斥之維時吏部尚書許讚都御史王廷相杜楠毛伯温皆欲薦入官辭不就於是歸汴上考六籍之源委究微言之未絶㕘諸子之異同達天人之隠奥居六年頗畢其志所著有經義賦頌碑誄序記五七言詩各累萬言門人逺近來受業者葢不可勝紀十九年都御史富平李宗樞為按察使時嘗欲擬文待詔故事薦於朝㑹李以喪免不果年六十一終學者稱之曰中川先生官舉人思恕思恕字子仁光山人嘉靖乙夘舉於鄉喜任俠走馬燕山有封狼居胥意歸而母彭殁思恕哀毁幾絶結廬墓旁有白鳥冬笋之祥居廬時百家之言無不涉獵而尤喜讀易因而有悟遂絶意仕進南之楚與天台耿氏兄弟焦弱侯楊道南游數年還居天中山房黙坐研思至忘寝食遺友書曰始吾從羣書入茫乎莫得今從靜中討出端倪方信此心原與天地萬物無兩道其在兹乎士人熈然宗之所居白沙闗山連兩省民俗頑梗乃結社其間講明正學發揮髙皇帝聖諭六言聴者如堵亡何有四十八人者雞冠佩刀請見曰某等柴山盜魁也習聞先生之教愿自洗濯以歸聖化奈鼎鑊何言畢環拜而泣童僕皆走趨思恕從容謂曰律自首者免爾果洗心來者乎無遺后悔歸試思之詰朝詣社如是者三乃以聞之邑邑聞之郡太守史桂芳異其事召四十八人者至如向語太守請於中丞御史待以不死葢隆慶己巳間事也明年兩臺疏薦思恕孝友詔下徴用㑹病卒從祀鄉賢野史氏曰士而得志則為帝王師不得志不過家庭孝弟禮讓而止因思之孝弟為仁之本即堯舜之時雍風動亦只完其為孝子為悌弟而已矣士而以隱逸稱者即夫子所謂宗族稱孝鄉黨稱弟者也不於此得力而以幽僻枯寂之人當之豈聖門所謂隠居求志者哉張明經襲仁襲仁字體元光州人也七世祖竒字滄洲有破賊功以㕘議致仕襲仁少沉潜穎異稍長入州庠其學無所不窺一以六經為要誠敬為主庸行為先偶寄興詩文則有天然逸致時喻侍郎時劉給諌繪方為諸生數從之游後各貴顯襲仁竟以里選不仕講學老焉生平不近貨色或欲試其守俟醉以妓共閉一室中襲仁鼾睡達曙惟賦栁色花香爭侑酒澹然一笑却忘情又其下第詩云床頭金盡無餘物惟有逼人劍氣寒此足以想見其為人矣以居喪逾禮幾於喪明卒年六十七學者稱為復菴先生所著有閒居管窺諸儒語抄史綱撮竒藏於家朱進士長世長世字興公光州人生而穎異性仁考崇禎己夘以弱冠登鄉薦值中原冦變父令避亂江東癸未成進士九月丁外艱明年闖賊陷京師每夜號不止河南諸地盡委冦巢長世間道奉母而南觀朝政嘆曰君父大仇未雪京師未復臣子之恥也遇當事輒正色言之無何歸隠田里以逸民自負寄狂於酒夜半悲號人不解其故憂憤成疾卒年三十三龔舉人業新業新號海旭光州人天啟辛酉舉人當國變業新在江南嗚咽悲泣者累日病劇且死戒其子曰國勢不可為為官不可不如歸耕業新居里嘗奮勇抗叛帥左良玊之師城頼以全自童年事二人以孝聞友愛同氣一時名士多從游者所著有易解行世其與人心口爽直排難解紛人稱為魯仲連至利人濟物擲千金如敝屣早年喪妻不忍再娶諸生寓江南者舉業新行實請於學政御史凌公炯准祀社祠野史氏曰興公海旭俱以鬱憤死身隠矣而心未得逸有主辱臣死之意焉然身非應死之身而時無可行之義非以節死仍以隠死張舉人民表附阮太學漢聞秦布衣鎬民表字林宗中牟人宫保孟男之子也舉萬厯辛夘鄉試負才能文章落筆即抗古人藏書數萬卷皆手自㸃定喜飲及草書飲少許即頽然揮洒如雲烟醒視之自謂有神助郡邑大夫有以地方利病詢者人諷以葛巾野服見民表曰吾既以孝㢘舉也葛巾野服非孝㢘服也吾不能學衆之矯時方舉賢良方正同里宦於朝者欲以其名聞民表曰吾既以孝㢘舉也倒行逆施吾不能學衆之偽郡邑諸使徴請恐后民表皆峻辭拒之自稱旃然漁隠避居郭外蒲津之旁日與友人阮漢聞秦鎬等蕩漾其中或乗敗車無頂幔一老㹀牽之朗吟車中油然自放人無由測其淺深汲引後進孜孜若不逮以故四方從游者常數十百人壬午闖賊圍汴有勸之去者民表曰死則死耳奈何以身為衆倡時廵撫髙素重民表日命人視於城上以覘一城安危民表雖耄日率門人子弟拮据矢石間不少怠以故五閱月士民食盡卒無叛志比水灌城民表急取所著詩文自負之結木筏以登求援者多筏重竟没於水長子允集罵賊死次子允隼與門人文大士同溺死三子允䧶年十一依浮木賴廵按王舟濟得免後門人周亮工撫之成立復其産且徴求民表遺詩梓之阮漢聞字太冲原浙人家於京師過尉氏愛阮舊里遂家焉所謂詩文欝欝卓爍而氣澹韻孤浩浩然時人莫之知也冦劇洛漢聞料賊形勢川谷扼塞圖其畧上之當事㑹卧疾據床猶劃地作筴冦懾漢聞名㑹掠尉氏城陷罵賊死其著述朱宗正睦㮮梓之皆没於水門人張昌祚繕其稿避地於南周元亮重為之梓秦鎬字子京汝陽人有詩名與張民表阮漢聞友善並以曠達稱時號天中三君子云野史氏曰予兩同林宗赴公車結社蕭寺中每酒後談文賦詩佐以諧語意曠如也余來中州林宗久為地下人與此中人士游徃徃道三子之高恨未覩其著述詳其行事可慨也理舉人鬯和鬯和字寒石西華人好古嗜竒博聞強記身長七尺鬚髥如㦸初姓李時闖氛猖熾鬯和恥與同姓遂從理學使者考驗不合坐黜名後聞其賢乃許之自是姓理中崇禎壬午鄉試值中原亂避地河朔嘗徃來太行百泉間有所題咏輒嗚咽悲憤人莫知其心之所存也甲申後嘗勸大臣奮義旅不遂乃攜家南徙張公鳳翔撫蘇松素知其名薦鬯和為監紀推官與俱鬯和外柔内剛有所推問或謀議大事多引經證𫝊無不允當鳳翔大倚重之不踰年長江不守鬯和從唐藩如閩然性恬退不樂仕進以母在流移轉徙就一官為寄殊非其志也人𫝊其如閩時授行在職方司主事奉命檄䖍兵既至而䖍州亂城亦隨陷鬯和從城上自投下死之子習奉祖母以歸疑者猶謂遁海外莫知所終云張庠生鳳質鳳質字文冲臨潁諸生也家貧有田八十畆嘗躬耕以養父母非其力不食時方匱乏親故或有贈遺謝不受卿士大夫咸敬重之然性褊急不為流俗所喜父惟修事親孝鳳質故能以孝世其家無子一女十八嵗而孀亦能以孝事鳳質庚子疾革謂其女曰忠孝節義人倫所重我不愧汝祖汝不愧我女且我頭顱如故而死可以含笑九原矣尋卒中州人物考卷七
